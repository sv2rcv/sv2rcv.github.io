<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2234;--border:#1e2d45;--accent:#3b82f6;--accent2:#06b6d4;--correct:#10b981;--wrong:#ef4444;--text:#e2e8f0;--muted:#64748b;--gold:#f59e0b;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
#screen-welcome{align-items:center;justify-content:center;padding:40px 20px;}
.logo-area{text-align:center;margin-bottom:40px;}
.logo-icon{width:72px;height:72px;margin:0 auto 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 40px rgba(59,130,246,.3);}
.logo-title{font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,36px);font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.logo-sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;max-width:620px;width:100%;}
.section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.cat-card{border:2px solid var(--border);border-radius:var(--radius);padding:22px 18px;cursor:pointer;transition:all .2s;background:var(--surface2);}
.cat-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.cat-card.selected{border-color:var(--accent);background:rgba(59,130,246,.1);}
.cat-badge{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);margin-bottom:6px;}
.cat-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.cat-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.divider{border:none;border-top:1px solid var(--border);margin:22px 0;}
.mode-toggle{display:flex;gap:12px;margin-bottom:28px;}
.mode-btn{flex:1;padding:14px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;transition:all .2s;text-align:center;line-height:1.5;}
.mode-btn .mi{font-size:20px;display:block;margin-bottom:4px;}
.mode-btn .mn{font-weight:600;color:var(--text);display:block;margin-bottom:2px;}
.mode-btn:hover,.mode-btn.selected{border-color:var(--accent2);background:rgba(6,182,212,.08);}
.start-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:white;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;}
.start-btn:hover{transform:translateY(-2px);}
.start-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;border-top:1px solid var(--border);margin-top:auto;}
#screen-exam{padding:0;}
.exam-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:10;}
.progress-wrap{flex:1;display:flex;flex-direction:column;gap:6px;}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s;}
.header-score{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent2);white-space:nowrap;}
.exam-body{flex:1;padding:28px 22px;max-width:800px;margin:0 auto;width:100%;}
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.q-num{font-size:12px;color:var(--muted);}
.q-chapter-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.chapter-A{background:rgba(59,130,246,.15);color:var(--accent);}
.chapter-B{background:rgba(6,182,212,.15);color:var(--accent2);}
.chapter-G{background:rgba(245,158,11,.15);color:var(--gold);}
.chapter-D{background:rgba(16,185,129,.15);color:var(--correct);}
.question-text{font-family:'DM Serif Display',serif;font-size:clamp(17px,2.5vw,21px);line-height:1.55;margin-bottom:20px;}
.question-image-wrap{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.question-image-wrap img{max-width:100%;max-height:340px;border-radius:var(--radius);border:1px solid var(--border);display:block;margin:0 auto;}
.img-placeholder{border:2px dashed var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center;margin-bottom:0;background:rgba(255,255,255,.02);}
.img-placeholder .img-ph-icon{font-size:32px;margin-bottom:10px;}
.img-placeholder .img-ph-file{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:4px;}
.img-placeholder .img-ph-hint{font-size:11px;color:var(--muted);}
.question-no-image{padding-bottom:24px;border-bottom:1px solid var(--border);margin-bottom:0;}
.answers-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;margin-top:24px;}
.answer-btn{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface2);cursor:pointer;transition:all .2s;text-align:left;width:100%;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text);line-height:1.5;}
.answer-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(59,130,246,.07);transform:translateX(4px);}
.answer-btn:disabled{cursor:default;}
.answer-btn.selected{border-color:var(--accent);background:rgba(59,130,246,.1);}
.answer-btn.correct{border-color:var(--correct);background:rgba(16,185,129,.1);}
.answer-btn.wrong{border-color:var(--wrong);background:rgba(239,68,68,.1);}
.answer-btn.reveal-correct{border-color:var(--correct);background:rgba(16,185,129,.07);}
.ans-letter{width:28px;height:28px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;flex-shrink:0;color:var(--muted);}
.answer-btn.correct .ans-letter,.answer-btn.reveal-correct .ans-letter{background:var(--correct);color:white;}
.answer-btn.wrong .ans-letter{background:var(--wrong);color:white;}
.ans-text{flex:1;}
.result-badge{display:none;font-size:18px;flex-shrink:0;}
.answer-btn.correct .result-badge,.answer-btn.wrong .result-badge{display:block;}
.feedback-box{display:none;padding:14px 18px;border-radius:var(--radius);font-size:13px;margin-bottom:20px;border:1px solid;align-items:center;gap:10px;}
.correct-fb{background:rgba(16,185,129,.08);border-color:var(--correct);color:var(--correct);}
.wrong-fb{background:rgba(239,68,68,.08);border-color:var(--wrong);color:#fca5a5;}
.action-row{display:flex;gap:12px;flex-wrap:wrap;}
.confirm-btn{padding:14px 28px;background:var(--surface2);border:2px solid var(--accent);border-radius:var(--radius);color:var(--accent);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.confirm-btn:hover{background:rgba(59,130,246,.15);}
.next-btn{padding:14px 28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:white;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.next-btn:hover{transform:translateY(-1px);}
#screen-results{align-items:center;justify-content:center;padding:40px 20px;}
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 36px;max-width:540px;width:100%;text-align:center;}
.results-icon{font-size:60px;margin-bottom:16px;}
.results-title{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;margin-bottom:8px;}
.results-title.pass{color:var(--correct);}.results-title.fail{color:var(--wrong);}
.results-subtitle{font-size:13px;color:var(--muted);margin-bottom:36px;}
.score-display{background:var(--surface2);border-radius:16px;padding:28px;margin-bottom:28px;border:1px solid var(--border);}
.score-fraction{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;line-height:1;margin-bottom:6px;}
.score-fraction.pass{color:var(--correct);}.score-fraction.fail{color:var(--wrong);}
.score-pct{font-size:17px;color:var(--muted);margin-bottom:18px;}
.score-bar-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.score-bar-fill{height:100%;border-radius:4px;transition:width 1s;}
.score-bar-fill.pass{background:linear-gradient(90deg,var(--correct),#34d399);}
.score-bar-fill.fail{background:linear-gradient(90deg,var(--wrong),#f87171);}
.score-bar-threshold{font-size:11px;color:var(--muted);}
.chapter-breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-bottom:28px;}
.chap-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;}
.chap-stat-label{font-size:10px;color:var(--muted);margin-bottom:4px;}
.chap-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.chap-stat-sub{font-size:11px;color:var(--muted);}
.results-actions{display:flex;gap:12px;}
.btn-outline{flex:1;padding:14px;border:2px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{flex:1;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:white;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
@media(max-width:480px){.category-grid{grid-template-columns:1fr;}.welcome-card,.results-card{padding:24px 16px;}.results-actions{flex-direction:column;}.exam-body{padding:20px 14px;}}
</style>
</head>

, "img": null}, {"chapter": "A", "num": 74, "question": "Το σήμα πληροφορίας σε ένα λαμβανόμενο διαμορφωμένο ΑM σήμα, απεικονίζεται:", "answers": ["Στην περιβάλλουσα του σήματος.", "Στους μηδενισμούς της περιβάλλουσας του σήματος.", "Στη φάση του σήματος.", "Στην πόλωση του ηλεκτρομαγνητικού κύματος."], "correct": 1, "img": null}, {"chapter": "A", "num": 76, "question": "\"Ηλεκτρομαγνητική ακτινοβολία\" είναι το φαινόμενο κατά το οποίο, από μια πηγή, εκπέμπεται ενέργεια στο χώρο με τη μορφή ηλεκτρομαγνητικών κυμάτων. Η ενέργεια μεταφέρεται μέσω του χώρου με τη μορφή ηλεκτρομαγνητικών κυμάτων.", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 1, "img": null}, {"chapter": "A", "num": 77, "question": "Αν γίνει μία ηλιακή έκλαμψη (flare), πόσο γρήγορα περιμένουμε τα αποτελέσματά της να επηρεάσουν τη διάδοση των ραδιοκυμάτων;", "answers": ["Σε 1 λεπτό.", "Σε 10 ως 30 λεπτά.", "Σε 1 εβδομάδα.", "Ποτέ."], "correct": 2, "img": null}, {"chapter": "A", "num": 78, "question": "Αν η διάδοση στα 10μ είναι τώρα καλή για αρκετές μέρες, πότε θα περιμέναμε ξανά τέτοια διάδοση;", "answers": ["Σε 7 μέρες.", "Σε 14 μέρες.", "Σε 90 μέρες.", "Σε 28 μέρες."], "correct": 4, "img": null}, {"chapter": "A", "num": 79, "question": "Αν η κρίσιμη συχνότητα του στρώματος F2 είναι foF2=5Mhz, τότε η μέγιστη συχνότητα διάδοσης MUF μπορεί να είναι;", "answers": ["2 MHz", "18 MHz", "5 MHz", "50 MHz"], "correct": 2, "img": null}, {"chapter": "A", "num": 80, "question": "Αν η μέγιστη συχνότητα διάδοσης (MUF) είναι 15 MHz ποια μπάντα συχνοτήτων πρέπει να χρησιμοποιήσουμε για επιτυχή επικοινωνία;", "answers": ["Τα 15μ", "Τα 20μ", "Τα 80μ", "Τα 40μ"], "correct": 2, "img": null}, {"chapter": "A", "num": 82, "question": "Η διάδοση με παγίδευση των κυμάτων στην ατμόσφαιρα ποιες κυρίως συχνότητες επηρεάζει;", "answers": ["Τις HF.", "Τις MF.", "Μόνο τις μικροκυματικές.", "Από VHF και υψηλότερα."], "correct": 4, "img": null}, {"chapter": "A", "num": 83, "question": "Η διάδοση των ηλεκτρομαγνητικών κυμάτων επ on": "Ποια είναι η καλύτερη ώρα της ημέρας για διισημερινή διάδοση (Transequatorial Propagation- TEP) ;", "answers": ["Πρωί.", "Μεσημέρι.", "Απόγευμα.", "Αργά το βράδυ."], "correct": 3, "img": null}, {"chapter": "A", "num": 92, "question": "Ποια είναι η μέγιστη απόσταση που καλύπτεται συνήθως με μία αναπήδηση από το ιονοσφαιρικό στρώμα Es;", "answers": ["1000Km", "4000Km", "500Km", "2000Km"], "correct": 4, "img": null}, {"chapter": "A", "num": 93, "question": "Ποια είναι η μέγιστη απόσταση που καλύπτεται συνήθως με μία αναπήδηση από το ιονοσφαιρικό στρώμα F2;", "answers": ["4000Km", "1000Km", "10000Km", "2000Km"], "correct": 1, "img": null}, {"chapter": "A", "num": 94, "question": "Ποια είναι κατά προσέγγιση η μέγιστη απόσταση κατά μήκος της επιφάνειας της Γης που μπορούν να απέχουν δύο σταθμοί που επικοινωνούν με ανάκλαση στην Σελήνη;", "answers": ["800Κm εάν η Σελήνη είναι στο περίγειο.", "3200Κm εάν η Σελήνη είναι στο απόγειο.", "8000Κm εάν η Σελήνη είναι στο περίγειο.", "19000Κm εάν και οι δύο έχουν οπτική επαφή με την Σελήνη."], "correct": 4, "img": null}, {"chapter": "A", "num": 95, "question": "Ποια είναι περίπου η μέγιστη απόσταση ραδιοεπικοινωνίας με διισημερινή διάδοση;", "answers": ["8000Κm", "5000Km", "4000Km", "2000Km"], "correct": 1, "img": null}, {"chapter": "A", "num": 96, "question": "Ποια ευεργετική επίδραση στην ραδιοδιάδοση μπορεί να έχουν οι περίοδοι υψηλής γεωμαγνητικής δραστηριότητας;", "answers": ["Το σέλας (aurora) μπορεί να ανακλάσει τα κύματα VHF.", "Μεγαλύτερη ισχύς για τα σήματα HF που διέρχονται από πολικές περιοχές.", "Καλύτερη διάδοση σημάτων HF σε μεγάλες αποστάσεις.", "Εμποδίζεται η διάδοση μέσω πολλαπλών διαδρομών."], "correct": 1, "img": null}, {"chapter": "A", "num": 97, "question": "Ποια ζώνη συχνοτήτων είναι η καταλληλότερη για επικοινωνία μέσω ιονισμένων σωματιδίων μετεωριτών (Meteor burst communications) ;", "answers": ["1,8 - 1,9 MHz", "10 - 14 MHz", "28 - 148 MHz", "220 - 450 MHz"], "correct": 3, "img": null}, {"chapter": "A", "num": 98, "question": "Ποια μέθοδος εκπομπής είναι κατάλληλη για σελαϊκή διάδοση;", "answers": ["CW", "SSB", "FM", "RTTY"], "correct": 1, "img": null}, {"chapter": "A", "num": 99, "question": "Ποια χρονική ακολουθία εκπομπής - λήψης χρησιμοποιείται συνήθως κατά την προσπάθεια επαφής μέσω Γης-Σελήνης-Γης (EME) στα 144MHz;", "answers": ["Ένας σταθμός εκπέμπει για 2 λεπτά και στην συνέχεια λαμβάνει για 2 λεπτά.", "Ένας σταθμός εκπέμπει για 1 λεπτό και στην συνέχεια λαμβάνει για 1 λεπτό.", "Ένας σταθμός εκπέμπει για 2,5 λεπτά και στην συνέχεια λαμβάνει για 2,5 λεπτά.", "Ένας σταθμός εκπέμπει για 5 λεπτά και στην συνέχεια λαμβάνει για 5 λεπτά."], "correct": 1, "img": null}, {"chapter": "A", "num": 100, "question": "Ποια χρονική ακολουθία εκπομπής - λήψης χρησιμοποιείται συνήθως κατά την προσπάθεια επαφής μέσω Γης-Σελήνης-Γης (EME) στα 432MHz ;", "answers": ["Ένας σταθμός εκπέμπει για 2 λεπτά και στην συνέχεια λαμβάνει για 2 λεπτά.", "Ένας σταθμός εκπέμπει για 1 λεπτό και στην συνέχεια λαμβάνει για 1 λεπτό.", "Ένας σταθμός εκπέμπει για 2,5 λεπτά και στην συνέχεια λαμβάνει για 2,5 λεπτά.", "Ένας σταθμός εκπέμπει για 5 λεπτά και στην συνέχεια λαμβάνει για 5 λεπτά."], "correct": 3, "img": null}, {"chapter": "A", "num": 101, "question": "Ποια χρονική ακολουθία εκπομπής - λήψης χρησιμοποιείται συνήθως κατά την προσπάθεια επαφής μέσω ιονισμένων σωματιδίων μετεωριτών στα 144MHz ;", "answers": ["Ένας σταθμός εκπέμπει για 2 λεπτά και στην συνέχεια λαμβάνει για 2 λεπτά.", "Ένας σταθμός εκπέμπει για 1 λεπτό και στην συνέχεια λαμβάνει για 1 λεπτό.", "Ένας σταθμός εκπέμπει για 15 δευτερόλεπτα και στην συνέχεια λαμβάνει για 15 δευτερόλεπτα.", "Ένας σταθμός εκπέμπει για 30 δευτερόλεπτα και στην συνέχεια λαμβάνει για 30 δευτερόλεπτα."], "correct": 3, "img": null}, {"chapter": "A", "num": 102, "question": "Ποιες συχνότητες είναι οι βέλτιστες για ραδιοεπικοινωνίες με σκέδαση σε μετεωρίτες (MS);", "answers": ["1.8-1.9 MHz", "10-14 MHz", "50-145 MHz", "430-440 MHz"], "correct": 3, "img"  της κατεύθυνσης της κεραίας του άλλου σταθμού;", "answers": ["∆ιάδοση στρώματος E σποραδικού (Εs).", "∆ιισημερινή διάδοση (ΤΕΡ).", "∆ιάδοση κατά μήκος του μεγαλύτερου σε μήκος μέγιστου κύκλου της γης (long path-LP).", "∆ιάδοση βόρειου σέλας (Aurora)."], "correct": 3, "img": null}, {"chapter": "A", "num": 111, "question": "Ποιος τύπος διάδοσης συμβαίνει όταν τα ραδιοκύματα ταξιδεύουν κατά μήκος του διαχωριστικού μεταξύ φωτός και σκότους;", "answers": ["∆ιισημερινή διάδοση.", "Σποραδική -Ε.", "Γης-Σελήνης-Γης (EME).", "Gray-line."], "correct": 4, "img": null}, {"chapter": "A", "num": 112, "question": "Ποιος τύπος της ηλιακής ακτινοβολίας είναι κυρίως υπεύθυνος για τη δημιουργία ιονισμού στην εξωτερική ατμόσφαιρα;", "answers": ["Η θερμική.", "Η μικροκυματική.", "Η σωματιδιακή.", "Η υπεριώδης."], "correct": 4, "img": null}, {"chapter": "A", "num": 113, "question": "Πόσο μακρύτερα από το γεωμετρικό ορίζοντα διαδίδονται περίπου τα σήματα VHF/UHF (ραδιορίζοντας);", "answers": ["∆ύο φορές.", "Τέσσερις φορές.", "50 %.", "15 %."], "correct": 4, "img": null}, {"chapter": "A", "num": 114, "question": "Πότε είναι ισχυρότερη η διάδοση gray-line;", "answers": ["Κατά την διάρκεια ανατολής και δύσης του ηλίου.", "Όταν ο ήλιος είναι ακριβώς πάνω από την θέση του σταθμού εκπομπής.", "Όταν ο ήλιος είναι πάνω από το μέσο της διαδρομής μεταξύ πομπού και δέκτη.", "Όταν ο ήλιος είναι ακριβώς πάνω από την θέση του σταθμού λήψης."], "correct": 1, "img": null}, {"chapter": "A", "num": 115, "question": "Πότε συμβαίνει συνήθως διάδοση μέσω σποραδικού στρώματος Ε (Es);", "answers": ["Το χειμώνα.", "Την άνοιξη.", "Το καλοκαίρι.", "Όλες τις εποχές."], "correct": 3, "img": null}, {"chapter": "A", "num": 116, "question": "Πότε συμβαίνει συνήθως διισημερινή διάδοση (transequatorial propagation-TEP);", "answers": ["Τα χρόνια κοντά στο ηλιακό ελάχιστο.", "Τα χρόνια κοντά στο ηλιακό μέγιστο.", "Όταν συμβαίνει έκλειψη ηλίου.", "Όταν συμβαίνει έκλειψη σελήνης."], "correct": 2, "img": null}, {"chapter": "A", "num": 117, "question": "Πως μεταδίδεται η μορσική τηλεγραφία (morse telegraphy);", "answers": ["Με RTTY (radio teletype).", "Με AMTOR (amateur teleprinting over radio).", "Με FSTV (fast scan television).", "Με ραδιοκύματα CW (continuous wave telegraphy)."], "correct": 4, "img": null}, {"chapter": "A", "num": 118, "question": "Σε ποια περιοχή συχνοτήτων πρέπει να συντονιστείτε για να βρείτε σταθμούς Γης-Σελήνης-Γης (EME) στην μπάντα των 2 m;", "answers": ["144,000 - 144,001 MHz", "144,000 - 144,100 MHz", "144,100 - 144,300 MHz", "145,000 - 145,100 MHz"], "correct": 2, "img": null}, {"chapter": "A", "num": 119, "question": "Σε ποια περιοχή συχνοτήτων πρέπει να συντονιστείτε για να βρείτε σταθμούς Γης-Σελήνης-Γης (EME) στην μπάντα των 70 cm;", "answers": ["430,000 - 430,150 MHz", "430,100 - 431,100 MHz", "431,100 - 431,200 MHz", "432,000 - 432,100 MHz"], "correct": 4, "img": null}, {"chapter": "A", "num": 120, "question": "Σε Ποίο στρώμα της ιονόσφαιρας κυρίως δημιουργούνται ελεύθερα ηλεκτρόνια όταν ένας μετεωρίτης καίγεται στη γήινη ατμόσφαιρα;", "answers": ["F2", "F1", "E", "D"], "correct": 3, "img": null}, {"chapter": "A", "num": 121, "question": "Σε συνθήκες διάδοσης ελευθέρου χώρου, ο διπλασιασμός της απόστασης από τον πομπό εξασθενεί την ισχύ του λαμβανόμενου σήματος κατά:", "answers": ["3 dB", "6 dB", "9 dB", "10 dB"], "correct": 2, "img": null}, {"chapter": "A", "num": 122, "question": "Σε τι οφείλεται η διάδοση gray-line;", "answers": ["Ο ήλιος υπερθερμαίνει την ιονόσφαιρα προκαλώντας διάθλαση των κυμάτων.", "Κατά το λυκόφως, η ηλιακή απορρόφηση μειώνεται, ενώ ο ατμοσφαιρικός ιονισμός δεν μειώνεται αρκετά για να μειωθεί η μέγιστη συχνότητα διάδοσης.", "Κατά το σκότος, η ηλιακή απορρόφηση μειώνεται, ενώ ο ιονισμός της ατμόσφαιρας παραμένει σταθερός.", "Το απόγευμα ο ήλιος θερμαίνει την ιονόσφαιρα αυξάνοντας την διάθλαση των κυμάτων καθώς και την μέγιστη συχνότητα διάδοσης."], "correct": 2, "img": null}, {"chapter": "A", "num": 123, "question": "Στη διάρκεια του μέγιστου της ηλιακής δραστηριότητας ποιά είναι η επίδραση στις ραδιοεπικοινωνίες;", "answers": ["Τα σήματα στις συχνότητες HF γίνονται αδύνατα και παραμορφωμένα.", "Οι συχνότητες πάνω από 300 MHz μπορούν να χρησιμοποιηθούν σε μεγάλες αποστάσεις.", "Μειώνεται η εξασθένηση των σημάτων από μεγάλες αποστάσεις σε συχνότητες 20-50 MHz.", "Τα σήματα σε συχνότητες UHF εξασθενούν."], "correct": 3, "img": null}, {"chapter": "A", "num": 124, "question": "Τι από τα ακόλουθα μπορεί να προκαλέσει μια ηχώ στο λαμβανόμενο σήμα ενός απομακρυσμένου σταθμού;", "answers": ["Υψηλή απορρόφηση στο στρώμα D.", "Ιονισμένα σωματίδια μετεωριτών.", "Η συχνότητα εκπομπής είναι μεγαλύτερη από την μέγιστη συχνότητα διάδοσης.", "Λήψη σήματος σε περισσότερες από μία διαδρομές."], "correct": 4, "img": null}, {"chapter": "A", "num": 125, "question": "Τι δημιουργεί την ιονόσφαιρα;", "answers": ["Οι θερμοκρασιακές μεταβολές της εξώσφαιρας.", "Η ηλιακή ακτινοβολία.", "Οι καταιγίδες στην τροπόσφαιρα.", "Η απελευθέρωση αέριων χημικών ενώσεων από τις ανθρώπινες δραστηριότητες."], "correct": 2, "img": null}, {"chapter": "A", "num": 126, "question": "Τι δημιουργεί τις επιλεκτικές διαλείψεις;", "answers": ["Η διαφορά της ώρας ανάμεσα στους σταθμούς.", "Οι μικρές κινήσεις της κατευθυνόμενης κεραίας.", "Οι μεταβολές του ύψους της ιονόσφαιρας.", "Οι διαφορές της φάσης του σήματος ανάμεσα στις διάφορες συνιστώσες που λαμβάνονται την ίδια στιγμή από το δέκτη."], "correct": 4, "img": null}, {"chapter": "A", "num": 127, "question": "Τι είναι η διισημερινή διάδοση (Transequatorial Propagation- TEP);", "answers": ["Η διάδοση μεταξύ των πόλων της γης.", "Η διάδοση μεταξύ σημείων που περίπου ισαπέχουν από το μαγνητικό ισημερινό.", "Η διάδοση μεταξύ σημείων με το ίδιο γεωγραφικό πλάτος.", "Η διάδοση μεταξύ σημείων με το ίδιο γεωγραφικό μήκος."], "correct": 2, "img": null}, {"chapter": "A", "num": 128, "question": "Τι είναι η ιονόσφαιρα;", "answers": ["Ένα άλλο όνομα για το κάτω στρώμα της ατμόσφαιρας που περιέχει τ  "img": null}, {"chapter": "A", "num": 323, "question": "Πότε έχουμε διαμόρφωση συχνότητας (FM) ενός φέροντος κύματος ;", "answers": ["Όταν η συχνότητα του φέροντος κύματος μεταβάλλεται ανάλογα με το πλάτος της ακουστικής συχνότητας.", "Όταν το πλάτος του φέροντος κύματος μεταβάλλεται ανάλογα με το πλάτος της ακουστικής συχνότητας.", "Όταν το πλάτος της ακουστικής συχνότητας μεταβάλλεται ανάλογα με το πλάτος του φέροντος κύματος.", "Όταν η φάση του φέροντος κύματος μεταβάλλεται ανάλογα με το πλάτος της ακουστικής συχνότητας."], "correct": 1, "img": null}, {"chapter": "A", "num": 324, "question": "Πότε έχουμε διαμόρφωση φάσης (PM) ενός φέροντος κύματος;", "answers": ["Όταν η συχνότητα του φέροντος κύματος μεταβάλλεται ανάλογα με το πλάτος της ακουστικής συχνότητας.", "Όταν το πλάτος του φέροντος κύματος μεταβάλλεται ανάλογα με το πλάτος της ακουστικής συχνότητας.", "Όταν το πλάτος της ακουστικής συχνότητας μεταβάλλεται ανάλογα με το πλάτος του φέροντος κύματος.", "Όταν η φάση του φέροντος κύματος μεταβάλλεται ανάλογα με το πλάτος της ακουστικής συχνότητας."], "correct": 4, "img": null}, {"chapter": "A", "num": 325, "question": "Πότε έχουμε υπερδιαμόρφωση σε μια διαμόρφωση πλάτους (ΑΜ);", "answers": ["Όταν ο δείκτης διαμόρφωσης m είναι ίσος με το 0 (m = 0).", "Όταν ο δείκτης διαμόρφωσης m είναι ίσος με το 1 (m = 1).", "Όταν ο δείκτης διαμόρφωσης m είναι μεγαλύτερος από το 1 (m > 1).", "Όταν ο δείκτης διαμόρφωσης m είναι μικρότερος από το 1 (m < 1)."], "correct": 3, "img": null}, {"chapter": "A", "num": 326, "question": "Πώς ονομάζεται η ικανότητα αποθήκευσης ενέργειας σ' ένα ηλεκτρικό πεδίο;", "answers": ["Αυτεπαγωγή.", "Αντίσταση.", "Σύνθετη αγωγιμότητα.", "Χωρητικότητα."], "correct": 4, "img": null}, {"chapter": "A", "num": 327, "question": "Πώς ονομάζεται η ικανότητα αποθήκευσης ενέργειας σ' ένα μαγνητικό πεδίο;", "answers": ["Σύνθετη αγωγιμότητα.", "Χωρητικότητα.", "Αντίσταση.", "Αυτεπαγωγή."], "correct": 4, "img": null}, {"chapter": "A", "num": 328, "question": "  αντίσταση του;", "answers": ["E = I / R ( τάση = ένταση / αντίσταση )", "E = R / I ( τάση = αντίσταση / ένταση )", "E = I x R ( τάση = ένταση x αντίσταση )", "E = I / P ( τάση = ένταση / ισχύς )"], "correct": 3, "img": null}, {"chapter": "A", "num": 334, "question": "Σ' ένα πίνακα ενδείξεων, στον οποίο οι τιμές εμφανίζονται σε KHz, έχουμε μια ένδειξη 28.450 KHz. Τι ένδειξη θα είχαμε αν οι τιμές εμφανιζόταν σε Hz;", "answers": ["284.500 Hz", "28.450.000 Hz", "284.500.000 Hz", "284.500.000.000 Hz"], "correct": 2, "img": null}, {"chapter": "A", "num": 335, "question": "Στη διαμόρφωση πλάτους (ΑΜ) πότε ο δείκτης διαμόρφωσης είναι ίσος με τη μονάδα (m = 1).", "answers": ["Όταν το πλάτος του φέροντος κύματος Ec είναι ίσο με το πλάτος της διαμορφώνουσας συχνότητας Em (Ec = Em).", "Όταν το πλάτος του φέροντος κύματος Ec είναι διπλάσιο από το πλάτος της διαμορφώνουσας συχνότητας Em (Ec = 2Em).", "Όταν το πλάτος της διαμορφώνουσας συχνότητας Em είναι διπλάσιο από το πλάτος του φέροντος κύματος Ec (Em = 2Ec).", "Όταν το πλάτος της διαμορφώνουσας συχνότητας Em είναι το μισό από το πλάτος του φέροντος κύματος Ec (Em = 1/2Ec)."], "correct": 1, "img": null}, {"chapter": "A", "num": 336, "question": "Στον παλμογράφο στην εικόνα διαμορφωμένου AM φέροντος μετρούμε μέγιστη τάση 80V και ελάχιστη 20V. Το ποσοστό διαμόρφωσης του φέροντος είναι:", "answers": ["60%", "20%", "25%", "125%"], "correct": 1, "img": null}, {"chapter": "A", "num": 337, "question": "Τα ηλεκτρομαγνητικά κύματα με συχνότητες 30-300MHz χαρακτηρίζονται:", "answers": ["Βραχέα (HF)", "Υπερβραχέα (VHF)", "Μεσαία (MF)", "Μακρά (LF)"], "correct": 2, "img": null}, {"chapter": "A", "num": 338, "question": "Τα ηλεκτρομαγνητικά κύματα μεταφέρουν:", "answers": ["Ενέργεια μόνον του ηλεκτρικού πεδίου", "Ενέργεια μόνον του μαγνητικού πεδίου", "Ενέργεια ηλεκτρικού και μαγνητικού πεδίου", "Τίποτε από τα παραπάνω"], "correct": 3, "img": null}, {"chapter": "A", "num": 339, "question": "Τι καθορίζει την ένταση του μαγνητικού πεδίου γύ τηλεφωνικό σήμα μονής πλευρικής ζώνης;", "answers": ["Θα μειωθούν τα προϊόντα ενδοδιαμόρφωσης.", "Θα αυξηθεί η ποιότητα της συνομιλίας.", "Θα αναστραφεί τμήμα του μεταδιδόμενου σήματος.", "Το σήμα μπορεί να παραμορφωθεί και να καταλαμβάνει μεγαλύτερο εύρος ζώνης."], "correct": 4, "img": null}, {"chapter": "A", "num": 383, "question": "Τι είναι ένα «συντονισμένο κύκλωμα»;", "answers": ["Συνδυασμός ενός τρανζίστορ κι ενός πιεζοηλεκτρικού κρυστάλλου ώστε το κύκλωμα αυτό να λειτουργεί στην συχνότητα συντονισμού του κρυστάλλου. Μπορεί να χρησιμοποιηθεί στην βαθμίδα ισχύος εξόδου ενός πομπού VHF.", "Συνδυασμός πηνίου και πυκνωτή που αποθηκεύει ενέργεια σε μια συγκεκριμένη συχνότητα, τη «συχνότητα συντονισμού». Μπορεί να χρησιμοποιηθεί για να επιλέξει ένα σήμα σε μια συχνότητα και να απορρίψει σήματα σε άλλες συχνότητες.", "Το κύκλωμα σταθεροποίησης τάσης που χρησιμοποιείται σε ενισχυτές υψηλών συχνοτήτων (HF).", "Συνδιασμός αντιστάσεων και πυκνωτών που δημιουργεί κύκλωμα εξομάλυνσης σε μια συγκεκριμένη συχνότητα, τη \"συχνότητα συντονισμού\". Χρησιμοποιείται στα τροφοδοτικά."], "correct": 2, "img": null}, {"chapter": "A", "num": 384, "question": "Τι είναι ένα φίλτρο (Filter);", "answers": ["Το κύκλωμα που επιτρέπει να περνά το ρεύμα που έχει τιμή από μια συγκεκριμένη στάθμη ισχύος και πάνω (π.χ. το \"φίλτρο 5 mW\" αφήνει να περνούν ρεύματα μεγαλύτερα των 5 mW, ενώ κόβει τα ασθενέστερα ρεύματα).", "Ένα είδος κυκλώματος εξομάλυνσης.", "Ένα κύκλωμα που επιτρέπει μερικές συχνότητες να περνούν με μικρή απώλεια ενώ περικόπτει άλλες συχνότητες. Συνήθως κατασκευάζονται από μερικά συντονισμένα κυκλώματα.", "Το κύκλωμα που ενισχύει τις ραδιοσυχνότητες και περικόπτει τις ακουστικές συχνότητες. Χρησιμοποιείται στους ταλαντωτές συμβολής (BFO)."], "correct": 3, "img": null}, {"chapter": "A", "num": 385, "question": "Τι είναι ο διευκρινιστής συχνότητας;", "answers": ["Κύκλωμα παραγωγής σημάτων FM.", "Κύκλωμα φιλτραρίσματος σημάτων γειτονικών συχνοτήτων.", "Κύκλωμα αυτόματης μεταγωγής συχνότητας.", "Κύκλωμα ανίχνευσης σημάτων FM."], "correct": 4, "img": null}, {"chapter": "A", "num": 386, "question": "Τι είναι το Modem;", "answers": ["Η χειροκίνητη λειτουργία (Mode Manual).", "Συσκευή για να συνδέει ο ραδιοερασιτέχνης την έξοδο του πομπού του στο δημόσιο τηλεφωνικό δίκτυο.", "∆ιαμορφωτής / Αποδιαμορφωτής (Modulator / Demodulator). Ένα κύκλωμα που παίρνει δεδομένα (data) και τα διαμορφώνει σε φορέα-σήμα ή αποδιαμορφώνει το σήμα για να ανακτηθούν τα δεδομένα.", "Συσκευή ψηφιοποίησης σήματος που συνδέει το μικρόφωνο με τον ραδιοερασιτεχνικό πομποδέκτη ώστε να πραγματοποιήσουμε ψηφιακή διαμόρφωση φωνής."], "correct": 3, "img": null}, {"chapter": "A", "num": 387, "question": "Αν η εισερχόμενη σε μια κεραία ισχύς είναι 100W και τα στάσιμα 3:1, ποια ισχύς εκπέμπεται από την κεραία αυτή;", "answers": ["100 Watt", "75 Watt", "50 Watt", "25Watt"], "correct": 2, "img": null}, {"chapter": "A", "num": 388, "question": "Αν τα στάσιμα κύματα σε μια κεραία είναι 2:1, τι ποσοστό της εισερχόμενης ισχύος σε αυτήν επιστρέφει προς τον πομπό;", "answers": ["56 %", "11 %", "7%", "1%"], "correct": 2, "img": null}, {"chapter": "A", "num": 389, "question": "Αν το κέρδος (gain) μιας κεραίας είναι 13 dbi, η εισερχόμενη σε αυτήν ισχύς 100 W και τα στάσιμα 1:1, τότε ποιά είναι η ενεργός ισοτροπικά εκπεμπόμενη ισχύς από την κεραία αυτή μέσα στον κύριο λοβό της;", "answers": ["2000 Watt", "1000 Watt", "500 Watt", "100 Watt"], "correct": 1, "img": null}, {"chapter": "A", "num": 390, "question": "Αν χρησιμοποιούμε ένα κατακόρυφο δίπολο το επίπεδο του ηλεκτρικού πεδίου είναι:", "answers": ["Οριζόντιο ως προς το έδαφος.", "Κάθετο με το έδαφος.", "∆ιαγώνιο 45 μοίρες δεξιόστροφα.", "∆ιαγώνιο 45 μοίρες αριστερόστροφα."], "correct": 2, "img": null}, {"chapter": "A", "num": 391, "question": "Για τη σύνθετη αντίσταση εισόδου (Z=R+jX) στη συχνότητα συντονισμού μιας κατακόρυφης κεραίας ισχύει:", "answers": ["R=0", "Χ=0", "R=Χ", "Z=0"], "correct": 2, "img": null}, {"chapter": "A", "num": 392, "question": "Γιατί είναι σημαντικό να έχουμε μικρό SWR σε ένα κεραιοσύστημα που χρησιμοποιεί ομοαξονικό καλώδιο τροφοδοσίας;", "answers": ["Για να μειωθούν οι παρεμβολές στα τηλεοπτικά σήματα.", "Για την βέλτιστη μεταφορά ισχύος.", "Για να αυξηθεί ο χρόνος ζωής της κεραίας.", "Για να μην αλλάζει πόλωση το σήμα."], "correct": 2, "img": null}, {"chapter": "A", "num": 393, "question": "Γιατί τα ομοαξονικό καλώδιο χρησιμοποιείται πιο συχνά σε εγκαταστάσεις ραδιοερασιτεχνών σε σχέση με άλλες γραμμές μεταφοράς;", "answers": ["Είναι εύκολο στην χρήση και την εγκατάσταση.", "Εμφανίζει λιγότερες απώλειες από άλλες γραμμές μεταφοράς.", "Μπορεί να δεχτεί μεγαλύτερη ισχύ από άλλες γραμμές μεταφοράς.", "Προσαρμόζεται πιο εύκολα στα φορτία."], "correct": 1, "img": null}, {"chapter": "A", "num": 394, "question": "Γιατί χρησιμοποιούμε στα μικροκύματα κυματοδηγούς αντί για ομοαξονικά καλώδια;", "answers": ["Γιατί έχουν χαρακτηριστική αντίσταση 50 Ohm.", "Γιατί έχουν μικρότερες απώλειες.", "Γιατί έχουν πιο στιβαρή κατασκευή.", "Γιατί δεν έχουν σταθερή χαρακτηριστική αντίσταση."], "correct": 2, "img": null}, {"chapter": "A", "num": 395, "question": "Γιατί χρησιμοποιούνται σε δίπολα κυματοπαγίδες (trap dipole);", "answers": ["Για να αυξήσουν το κέρδος (gain) του διπόλου.", "Για να αυξήσουν την ισχύ που μπορεί να δεχθεί το δίπολο.", "Για να συντονίσουν το δίπολο σε περισσότερες από μία συχνότητες.", "Για να βελτιώσουν την προσαρμογή (matching) του διπόλου."], "correct": 3, "img": null}, {"chapter": "A", "num": 396, "question": "Εάν η συχνότητα εκπομπής μιας κεραίας είναι 21 MHz τότε το απαιτούμενο μήκος ενός διπόλου είναι περίπου:", "answers": ["9,00 μ", "8,5 μ", "8μ", "7,5 μ"], "correct": 4, "img": null}, {"chapter": "A", "num": 397, "question": "Εάν η συχνότητα συντονισμού μιας κεραίας διπόλου (λ/2) είναι 60 MHz τότε το συνολικό μήκος της είναι περίπου:", "answers": ["2,5 μ", "60 μ", "70 μ", "30 μ"], "correct": 1, "img": null}, {"chapter": "A", "num": 398, "question": "Η ακτινοβολία ενός καθέτου διπόλου λ/2 στο οριζόντιο επίπεδο:", "answers": ["Είναι συγκεντρωμένη προς μια κύρια κατεύθυνση.", "Εμφανίζει μηδενισμούς ανά 30 μοίρες.", "Εμφανίζει εναλλάξ μέγιστα και ελάχιστα ανά 30 μοίρες.", "Είναι ομοιόμορφη προς όλες τις κατευθύνσεις."], "correct": 4, "img": null}, {"chapter": "A", "num": 399, "question": "Η απόδοση μιας κεραίας της οποίας η αντίσταση ακτινοβολίας Rrad = 95 Ω και η αντίσταση απωλειών είναι Rloss= 5 Ω, είναι περίπου:", "answers": ["60%", "30%", "10%", "95%"], "correct": 4, "img": null}, {"chapter": "A", "num": 400, "question": "Ισοδύναμη ισοτροπικά ακτινοβολούμενη ισχύς (e.i.r.p.):", "answers": ["Είναι το γινόμενο της ισχύος που εκπέμπεται από την κεραία και της απολαβής της κεραίας ως προς μία ισοτροπική κεραία σε δεδομένη κατεύθυνση (απόλυτη ή ισοτροπική απολαβή).", "Είναι το γινόμενο της ισχύος που εκπέμπει η κεραία και της συχνότητας λειτουργίας του πομπού.", "", ""], "correct": 1, "img": null}, {"chapter": "A", "num": 402, "question": "Να προσδιορίσετε τον αριθμό των παρασιτικών στοιχείων της στοιχειοκεραίας του σχήματος:", "answers": ["1", "2", "3", "4"], "correct": 4, "img": "SV_Q402.jpg"}, {"chapter": "A", "num": 403, "question": "Ποια από τις ακόλουθες μετρήσεις χαρακτηρίζει μια μη-προσαρμοσμένη γραμμή μεταφοράς;", "answers": ["SWR < 1:1.", "Συντελεστής ανάκλασης μεγαλύτερος από 1.", "∆ιηλεκτρική σταθερά μεγαλύτερη από 1.", "SWR > 1:1."], "correct": 4, "img": null}, {"chapter": "A", "num": 404, "question": "Ποια γραμμή μεταφοράς έχει τις λιγότερες απώλειες;", "answers": ["Η ομοαξονική με συμπαγές πολυεθυλενικό διηλεκρτικό (solid dielectric).", "Η παράλληλη με πλήρες πολυεθυλενικό διηλεκτρικό διαχωρισμού.", "Η ομοαξονική με αφρώδες πολυεθυλενικό διηλεκτρικό (foam).", "Η παράλληλη με αραιούς αποστάτες (spacers)."], "correct": 4, "img": null}, {"chapter": "A", "num": 405, "question": "Ποια είναι η αντίσταση εισόδου στη συχνότητα συντονισμού ενός μήκους λ/4 ομοαξονικής γραμμής 50 Ohm με ανοικτό πέρας;", "answers": ["Βραχυκύκλωμα", "Ανοιχτό κύκλωμα", "50 Ohm", "25 Ohm"], "correct": 1, "img": null}, {"chapter": "A", "num": 406, "question": "Ποια είναι η αντίσταση εισόδου στη συχνότητα συντονισμού ενός μήκους λ/4 ομοαξονικής γραμμής 50 Ohm με βραχυκυκλωμένο πέρας;", "answers": ["50 Ohm", "100 Ohm", "Βραχυκύκλωμα", "Ανοικτό κύκλωμα"], "correct": 4, "img": null}, {"chapter": "A", "num": 407, "question": "Ποια είναι η διαφορά ανάμεσα σε μια ομοαξονική και σε μια ανοιχτή -παράλληλη γραμμή μεταφοράς;", "answers": ["Η χαρακτηριστική τους αντίσταση", "Ο συντελεστής ταχύτητας", "Ο βαθμός θωράκισης και οι απώλειες της γραμμής", "Το βάρος ανά μονάδα μήκους"], "correct": 3, "img": null}, {"chapter": "A", "num": 408, "question": "Ποια είναι η λειτουργία ενός συντονιστή κεραίας (antenna tuner);", "answers": ["Προσαρμόζει την σύνθετη αντίσταση εξόδου του πομποδέκτη με τη σύνθετη αντίσταση εισόδου του κεραιοσυστήματος.", "Βοηθά έναν δέκτη να συντονιστεί αυτόματα στον σταθμό που μας φέρνει το ασθενέστερο σήμα.", "Συνδέει το κεραιοσύστημα με τον πομπό κατά την εκπομπή μας και με τον δέκτη κατά την λήψη.", "Μεταστρέφει έναν πομποδέκτη μεταξύ των διαφορετικών ειδών κεραιών που συνδέονται στην ίδια γραμμή τροφοδοσίας."], "correct": 1, "img": null}, {"chapter": "A", "num": 409, "question": "Ποια είναι περίπου η ωμική αντίσταση εισόδου σε ένα συντονισμένο δίπολο;", "answers": ["50 Ohm", "75 Ohm", "25 Ohm", "100 Ohm"], "correct": 2, "img": null}, {"chapter": "A", "num": 410, "question": "Ποια είναι περίπου η ωμική αντίσταση εισόδου σε ένα συντονισμένο κλειστό (folded) δίπολο;", "answers": ["50 Ohm", "100 Ohm", "200 Ohm", "300 Ohm"], "correct": 4, "img": null}, {"chapter": "A", "num": 411, "question": "Ποια ελάχιστη οριζόντια απόσταση πρέπει να απέχουν δύο κεραίες τύπου Yagi σε οριζόντια πόλωση ώστε να μη αλληλοεπηρεάζονται κατά τη λειτουργία τους;", "answers": ["Αρκεί να μην ακουμπούν τα στοιχεία τους.", "Ένα έως τρία μήκη κύματος.", "Εξαρτάται έντονα από το κέρδος των κεραιών και τη σχετική θέση τους οπότε προσδιορίζεται ανά περίπτωση.", "Είκοσι έως τριάντα μήκη κύματος."], "correct": 3, "img": null}, {"chapter": "A", "num": 412, "question": "Ποια περίπου απώλεια σήματος παρατηρείται αν χρησιμοποιούνται αντίστροφες πολώσεις ανάμεσα στην εκπομπή και στη λήψη;", "answers": ["0-3 db", "3-5 db", "5-8 db", "10-20db"], "correct": 4, "img": null}, {"chapter": "A", "num": 413, "question": "Ποια τιμή αντίστασης πρέπει να έχει μία γραμμή μήκους λ/4 ώστε να μετατρέπει την αντίσταση μιας γραμμής από 100 σε 50 Ohm;", "answers": ["25 Ohm", "50 Ohm", "75 Ohm", "100 Ohm"], "correct": 3, "img": null}, {"chapter": "A", "num": 414, "question": "Ποια τιμή έχει η χαρακτηριστική αντίσταση των συνηθισμένων ομοαξονικών καλωδίων που χρησιμοποιούνται στην υπηρεσία ραδιοερασιτέχνη;", "answers": ["25-75 Ohm", "75 Ohm", "50 Ohm", "25 Ohm"], "correct": 3, "img": null}, {"chapter": "A", "num": 415, "question": "Ποια τιμή έχει ο συντελεστής ταχύτητας μετάδοσης των συνηθισμένων ομοαξονικών καλωδίων με πολυεθυλενικό διηλεκτρικό;", "answers": ["100 % της ταχύτητας του φωτός", "67 %", "50 %", "25 %"], "correct": 2, "img": null}, {"chapter": "A", "num": 416, "question": "Ποιο είναι περίπου το θεωρητικό εμπροσθόφορο (forward) κέρδος μιας κεραίας Yagi 3 στοιχείων;", "answers": ["9,7 dBi", "7.3 dBd", "5,4 φορές το κέρδος ενός διπόλου.", "7,3 dBm"], "correct": 1, "img": null}, {"chapter": "A", "num": 417, "question": "Ποιο είναι το κέρδος ενός διπόλου (λ/2) στο κενό σε σχέση με την ισοτροπική κεραία;", "answers": ["1,55 dB", "2,15 dB", "3,05 dB", "4,30 dB"], "correct": 2, "img": null}, {"chapter": "A", "num": 418, "question": "Ποιο είναι το όφελος της κατακόρυφης στοίβαξης οριζόντια πολωμένων κεραιών Yagi;", "answers": ["Γρήγορη επιλογή μεταξύ οριζόντιας και κατακόρυφης πόλωσης.", "Ταυτόχρονη οριζόντιας και κατακόρυφης πόλωσης.", "Στενεύει ο κύριος λοβός στο αζιμουθιακό επίπεδο.", "Στενεύει ο κύριος λοβός στο επίπεδο γωνίας ανύψωσης."], "correct": 4, "img": null}, {"chapter": "A", "num": 419, "question": "Ποιο είναι το σημαντικότερο πλεονέκτημα μιας λογάριθμο-περιοδικής κεραίας;", "answers": ["Μεγάλο εύρος ζώνης.", "Μεγαλύτερο κέρδος σε σχέση με την κεραία Yagi.", "∆ιαφορισμός πόλωσης.", "∆εν εμφανίζει πλευρικούς λοβούς ακτινοβολίας."], "correct": 1, "img": null}, {"chapter": "A", "num": 420, "question": "Ποιος από τους ακόλουθους παράγοντες επηρεάζει την αντίσταση ακτινοβολίας μιας κεραίας;", "answers": ["Το μήκος της γραμμής μεταφοράς και το ύψος της κεραίας.", "Το ύψος της κεραίας, ο λόγος μήκους/διαμέτρου του αγωγού, η θέση και γειτονικά αγώγιμα αντικείμενα.", "Είναι φυσική σταθερά, όμοια για όλες τις κεραίες.", "Η δραστηριότητα ηλιακών κηλίδων και η ώρα της ημέρας."], "correct": 2, "img": null}, {"chapter": "A", "num": 421, "question": "Πόσο κέρδος έχει μια κεραία στο κενό σε σχέση με ένα δίπολο λ/2, εάν έχει κέρδος 6 dB σε σχέση με την ισοτροπική κεραία;", "answers": ["3,85 dB", "6,0 dB", "8,15 dB", "2,79 dB"], "correct": 1, "img": null}, {"chapter": "A", "num": 422, "question": "Πόσος είναι περίπου ο λόγος κατευθυντικότητας εμπρός προς πίσω (front to back ratio) σε μία κεραία τύπου Yagi;", "answers": ["15-25 db", "8-10 db", "5-8 db", "3-5 db"], "correct": 1, "img": null}, {"chapter": "A", "num": 424, "question": "Πού χρησιμοποιούνται οι μονάδες προσαρμογής κεραιών (tuners or couplers);", "answers": ["Σε περιπτώσεις μόνο συρμάτινων κεραιών.", "Σε περιπτώσεις γραμμών μεταφοράς με χαρακτηριστική αντίσταση διαφορετική από 50 Ohm.", "Σε περιπτώσεις που υπάρχουν υψηλά στάσιμα κύματα ανάμεσα στην κεραία και τη γραμμή μεταφοράς.", "Σε κάθε περίπτωση."], "correct": 3, "img": null}, {"chapter": "A", "num": 425, "question": "Πώς επηρεάζεται το εύρος ζώνης μιας κεραίας όταν αυξάνεται το κέρδος της;", "answers": ["Αυξάνεται γεωμετρικά.", "Αυξάνεται αναλογικά.", "∆εν επηρεάζεται.", "Μειώνεται."], "correct": 4, "img": null}, {"chapter": "A", "num": 426, "question": "Πώς επηρεάζεται το φυσικό μέγεθος ενός διπόλου λ/2 σε σχέση με την συχνότητα λειτουργίας;", "answers": ["Μεγαλώνει όσο αυξάνεται η συχνότητα.", "Πρέπει να είναι μεγαλύτερο για να αντέχει σε μεγαλύτερη ισχύ.", "Μικραίνει όσο αυξάνεται η συχνότητα.", "Μικραίνει όσο μειώνεται η συχνότητα."], "correct": 3, "img": null}, {"chapter": "A", "num": 427, "question": "Πώς συγκρίνεται η συνολική ακτινοβολία από μια ισοτροπική κεραία σε σχέση με την συνολική ακτινοβολία από μια κατευθυντική κεραία, όταν τροφοδοτούνται με την ίδια ισχύ;", "answers": ["Η συνολική ακτινοβολία της κατευθυντικής κεραίας αυξάνεται τόσες φορές όσο το κέρδος της κεραίας.", "Η συνολική ακτινοβολία της κατευθυντικής κεραίας αυξάνεται τόσες φορές όσο λόγος frontto-back.", "∆εν υπάρχει καμία διαφορά.", "Η ακτινοβολία της ισοτροπικής κεραίας είναι 2.15dB ισχυρότερη από αυτή της κατευθυντικής κεραίας."], "correct": 3, "img": null}, {"chapter": "A", "num": 428, "question": "Σε μια οριζόντια κεραία τύπου Yagi το οριζόντιο διάγραμμα ακτινοβολίας ή το κατακόρυφο είναι ευρύτερο;", "answers": ["Είναι τα ίδια.", "Το οριζόντιο.", "Το κατακόρυφο.", "Εξαρτάται από τη συχνότητα λειτουργίας της κεραίας."], "correct": 3, "img": null}, {"chapter": "A", "num": 429, "question": "Σε ποιες περιοχές συχνοτήτων χρησιμοποιούνται παραβολικές κεραίες;", "answers": ["Στα HF", "Στα VHF", "Από τα UHF και πάνω", "Από τα SHF και πάνω"], "correct": 3, "img": null}, {"chapter": "A", "num": 430, "question": "Σε ποιες περιοχές συχνοτήτων χρησιμοποιούνται συνήθως κυματοδηγοί;", "answers": ["Στα HF", "Στα VHF", "Στα UHF", "Στα SHF και πάνω"], "correct": 4, "img": null}, {"chapter": "A", "num": 431, "question": "Σε ποιες περιπτώσεις είναι απαραίτητη η χρήση καθέτου πόλωσης στα VHF;", "answers": ["Όταν έχουμε διάδοση πάνω από δάση.", "Όταν έχουμε διάδοση πάνω από θάλασσα.", "Όταν έχουμε ιονοσφαιρική διάδοση.", "Πάντοτε."], "correct": 2, "img": null}, {"chapter": "A", "num": 432, "question": "Σε τι διαφέρει ένα απλό δίπολο από ένα αναδιπλωμένο (folded);", "answers": ["Στην σύνθετη αντίσταση εισόδου.", "Στην ισχύ RF που μπορεί να δεχθεί.", "Στο ύψος που πρέπει να τοποθετηθεί.", "Στον τύπο της γραμμής μεταφοράς που πρέπει να χρησιμοποιηθεί."], "correct": 1, "img": null}, {"chapter": "A", "num": 433, "question": "Σε τι διαφέρει ένας προσαρμογέας αντίστασης (balun) από ένα προσαρμογέα κεραίας (tuner);", "answers": ["Στην χαρακτηριστική αντίσταση.", "Στην ισχύ RF που αντέχουν.", "Ο προσαρμογέας αντίστασης έχει σταθερή τιμή αντίστασης ενώ ο προσαρμογέας κεραίας έχει μεταβαλλόμενη (αυτόματα ή χειροκίνητα) τιμή.", "∆εν διαφέρουν."], "correct": 3, "img": null}, {"chapter": "A", "num": 434, "question": "Σε τι πλεονεκτεί μια κατακόρυφη κεραία ενός τετάρτου μήκους κύματος (ground plane) από ένα οριζόντιο δίπολο σε ικανό ύψος;", "answers": ["Στη σύνθετη αντίσταση εισόδου πού είναι σταθερή.", "Στο πανκατευθυντικό (omnidirectional) διάγραμμα και στη χαμηλή γωνία ακτινοβολίας.", "Στο κέρδος (gain) της κεραίας.", "Στη ισχύ RF που μπορεί να δεχθεί."], "correct": 2, "img": null}, {"chapter": "A", "num": 435, "question": "Σε τι πλεονεκτεί μία κεραία τύπου Yagi από το δίπολο;", "answers": ["Έχει μεγαλύτερο κέρδος (gain) τόσο στην εκπομπή όσο και στη λήψη, οπότε χρειαζόμαστε μικρότερη ισχύ εξόδου για μια επικοινωνία.", "Έχει μικρότερο εύρος συχνοτήτων λειτουργίας, οπότε απορρίπτει ισχυρότερα τις εκπομπές εκτός ραδιοερασιτεχνικών συχνοτήτων.", "Έχει κατευθυντικότητα, οπότε απορρίπτει τις παρεμβολές από τα πλάγια και το πίσω μέρος της κεραίας.", "Για όλους τους παραπάνω λόγους."], "correct": 4, "img": null}, {"chapter": "A", "num": 436, "question": "Τα στάσιμα κύματα σε μια γραμμή μεταφοράς δημιουργούνται όταν έχουμε:", "answers": ["Προσαρμοσμένη γραμμή μεταφοράς.", "Μη προσαρμοσμένη γραμμή μεταφοράς.", "Λειτουργία σε χαμηλές συχνότητες.", "Λειτουργία σε υψηλές συχνότητες."], "correct": 2, "img": null}, {"chapter": "A", "num": 437, "question": "Τι από τα ακόλουθα ισχύει για μια κεραία Yagi;", "answers": ["Ο ανακλαστήρας είναι συνήθως το μακρύτερο παρασιτικό στοιχείο.", "Ο κατευθυντήρας είναι συνήθως το μακρύτερο παρασιτικό στοιχείο.", "Ο ανακλαστήρας είναι συνήθως το μικρότερο παρασιτικό στοιχείο.", "Όλα τα στοιχεία πρέπει να έχουν το ίδιο μήκος."], "correct": 1, "img": null}, {"chapter": "A", "num": 438, "question": "Τι θα συμβεί αν μεγαλώσουμε το μήκος του βραχίονα και προσθέσουμε κατευθυντήρες σε μια κεραία Yagi;", "answers": ["Αυξάνεται το κέρδος.", "Αυξάνεται το SWR.", "∆ημιουργούνται πρόσθετοι πλευρικοί λοβοί ακτινοβολίας.", "Μειώνεται το κέρδος."], "correct": 1, "img": null}, {"chapter": "A", "num": 439, "question": "Τι θα συνδέσετε στον πομποδέκτη σας εάν θα θέλατε να τον μεταστρέφετε σε διάφορες κεραίες (εναλλακτική σύνδεση του πομποδέκτη με διάφορες κεραίες);", "answers": ["Ένα διακόπτη τερματικών-κόμβων (terminal-node switch).", "Ένα μεταγωγικό διακόπτη κεραιών.", "Ένα πολυφασικό διακόπτη.", "Ένα υψιπερατό φίλτρο συνδεδεμένο με «μαχαιρωτό» διακόπτη."], "correct": 2, "img": null}, {"chapter": "A", "num": 440, "question": "Τι θα χρησιμοποιούσατε για να συνδέσετε μια κεραία διπλής μπάντας (dual-band) με έναν κινητό πομποδέκτη που έχει ξεχωριστές εξόδους VHF και UHF;", "answers": ["Ένα μετρητή SWR με δύο δείκτες.", "Ένα τηλεφωνικό προσαρμογέα διπλής ενέργειας.", "∆ίδυμο υψιπερατό φίλτρο.", "Ένα δυπλέκτη (duplexer)."], "correct": 4, "img": null}, {"chapter": "A", "num": 441, "question": "Τι καθορίζει την πόλωση μιας κεραίας;", "answers": ["Ο προσανατολισμός του μαγνητικού πεδίου.", "Το εύρος του κεντρικού λοβού ακτινοβολίας.", "Ο προσανατολισμός του ηλεκτρικού πεδίου.", "Το μέγιστο κέρδος του κεντρικού λοβού ακτινοβολίας."], "correct": 3, "img": null}, {"chapter": "A", "num": 442, "question": "Τι μπορεί να συμβεί εάν μια κατευθυντική κεραία χρησιμοποιηθεί σε διαφορετικό εύρος συχνοτήτων σε σχέση με αυτό για το οποίο έχει σχεδιαστεί;", "answers": ["Θα παρουσιάσει αυξημένο κέρδος.", "Θα παρουσιάσει μειωμένο κέρδος.", "Το κέρδος μπορεί να παρουσιάσει σημαντικές διακυμάνσεις.", "Θα καταστραφεί."], "correct": 3, "img": null}, {"chapter": "A", "num": 443, "question": "Τι μπορεί να συμβεί όταν δεν έχουμε  στον πομπό;", "answers": ["50 W", "25 W", "10 W", "5W"], "correct": 2, "img": null}, {"chapter": "A", "num": 452, "question": "Αν στη διάρκεια μιας εκπομπής μονής πλευρικής ζώνης ( SSB) χωρίς συμπίεση φωνής (compression) η ισχύς στο βαττόμετρο του πομποδέκτη είναι 20 W, πόση εκτιμάται ότι είναι η ισχύς εξόδου κορυφής του πομπού;", "answers": ["10 W", "20 W", "40 W", "100 W"], "correct": 4, "img": null}, {"chapter": "A", "num": 453, "question": "Αν στην είσοδο ενός μίκτη εφαρμοστούν δυο ημιτονικά σήματα με συχνότητες 8kHz και 10kHz, τότε στην έξοδο του μίκτη προκύπτει:", "answers": ["Ημίτονο 20kHz", "Ημίτονο 80kHz", "Ημίτονο 18kHz", "Τετραγωνικός παλμός"], "correct": 3, "img": null}, {"chapter": "A", "num": 454, "question": "Για να μετρήσουμε με μεγαλύτερη ακρίβεια το πλάτος ενός σήματος στον παλμογράφο:", "answers": ["Ρυθμίζουμε τον επιλογέα Volts/div σε χαμηλότερη τιμή.", "Χρησιμοποιούμε εξωτερικό σκανδαλιστή (external trigger).", "Ρυθμίζουμε κατάλληλα τον επιλογέα time/div ανάλογα με τη μορφή του σήματος.", "Ρυθμίζουμε τον επιλογέα ΑC/DC/GND στη θέση AC."], "correct": 1, "img": null}, {"chapter": "A", "num": 455, "question": "Για τη μέτρηση της τάσης μιας αντίστασης το πολύμετρο πρέπει να συνδεθεί στο κύκλωμα:", "answers": ["Σε σειρά.", "Παράλληλα.", "Εξαρτάται από το κύκλωμα.", "∆εν έχει σημασία ο τρόπος σύνδεσης."], "correct": 2, "img": null}, {"chapter": "A", "num": 456, "question": "Γιατί πρέπει να χρησιμοποιούμε ψηφιακό συχνόμετρο για να μετράμε τη συχνότητα της εκπομπής μας στα βραχέα κύματα;", "answers": ["Για να ελέγχουμε με την απαιτούμενη από τους κανονισμούς ακρίβεια την συχνότητα της εκπομπής μας.", "Για να δούμε αν συμπίπτουν οι ενδείξεις του συχνόμετρου με αυτές του πομποδέκτη.", "Για να βεβαιωθούμε ότι δεν έχει στάσιμα η κεραία εκπομπής.", "Για κανένα από τους παραπάνω λόγους."], "correct": 1, "img": null}, {"chapter": "A", "num": 457, "question": "Γιατί στις μετρήσεις ισχύος εξόδου πομπού πρέπει να χρησιμοποιούμε ένα τεχνητό φορτίο (dummy load) 50 πορούμε να κάνουμε;", "answers": ["Να προτείνουμε την αντικατάσταση του τηλεφώνου με ένα άλλο που να πληροί τις προδιαγραφές της Ευρ. 'Ένωσης για την ηλεκτρομαγνητική συμβατότητα (ΕΜC).", "Να σταματήσουμε τις εκπομπές στη συγκεκριμένη συχνότητα.", "Να μειώσουμε την ισχύ εξόδου στο 20%.", "Να γειώσουμε το τηλέφωνο."], "correct": 1, "img": null}, {"chapter": "A", "num": 511, "question": "Όταν η εκπομπή παρεμβάλλεται στα ηχεία ενός ενισχυτή Ηi-Fi, με ή χωρίς τη συνοδεία της μουσικής, σε ποια πιθανότερη αιτία οφείλεται αυτό;", "answers": ["Στη σύμπτωση με τη συχνότητα εκπομπής.", "Σε φώραση στα κυκλώματα του ενισχυτή.", "Στις αρμονικές του πομπού.", "Σε ενδοδιαμόρφωση στα κυκλώματα του ενισχυτή."], "correct": 2, "img": null}, {"chapter": "A", "num": 512, "question": "Ποια είναι τα αίτια της παρεμβολής από μια ραδιοερασιτεχνική εκπομπή;", "answers": ["Από τις αρμονικές του πομπού.", "Από τις παρασιτικές εκπομπές του πομπού.", "Από το επιθυμητό σήμα εκπομπής.", "Από όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 513, "question": "Ποια είναι τα αίτια παρεμβολών από ένα ραδιοερασιτεχνικό σταθμό σε οικιακές ηλεκτρονικές συσκευές;", "answers": ["Ένταση ηλεκτρομαγνητικού πεδίου από το σταθμό στην οικιακή συσκευή μεγαλύτερη από το προδιαγραφόμενο όριο αντοχής της.", "Οι ανεπιθύμητες αρμονικές και παρασιτικές εκπομπές του σταθμού.", "Η μεγάλη γειτνίαση σταθμού και συσκευής.", "Όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 514, "question": "Ποια είναι τα βασικά μέτρα για την πρόληψη ή και εξάλειψη των παρεμβολών σε μία συσκευή;", "answers": ["Η αποσύζευξη της συσκευής από τον πομπό.", "Το φιλτράρισμα των γραμμών εισόδου και εξόδου της συσκευής.", "Η καλύτερη θωράκιση της συσκευής.", "Όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 515, "question": "Ποια ηλεκτρονικά καταναλωτικά μηχανήματα είναι ποιό ανθεκτικά σε παρεμβολές;", "answers": ["Τα βιομηχανικού τύπου χωρίς πιστοποίηση της Ευρ. Ένωσης.", "Όσα έχουν κατασκευασθεί παλαιότερα.", "Όσα περιέχουν ημιαγωγούς.", "Όσα έχουν πιστοποίηση για αντοχή σε παρεμβολές (EMC) από την Έυρ. Ένωση."], "correct": 4, "img": null}, {"chapter": "A", "num": 518, "question": "Ποιος είναι ο απλούστερος τρόπος για να μειώσουμε τις παρασιτικές εκπομπές από μια ψηφιακή τερματική συσκευή;", "answers": ["Με γείωση της συσκευής.", "Με θωράκιση της συσκευής.", "Με τοποθέτηση συσφιγγόμενων φεριτικών φίλτρων στα καλώδια της συσκευής.", "Με αναδιάταξη της θέσης της συσκευής."], "correct": 3, "img": null}, {"chapter": "A", "num": 519, "question": "Ποιου τύπου εξωτερικό φίλτρο πρέπει να χρησιμοποιήσουμε σε ένα δέκτη γενικής κάλυψης που παρεμβάλλεται από τις εκπομπές των ραδιοφωνικών σταθμών της περιοχής;", "answers": ["Χαμηλοπερατό (lowpass) 30 MHz.", "Υψιπερατό (highpass) 80 MHz.", "Αποκοπής ζώνης (bandstop) 80-110 MHz.", "Μεσοπερατό (bandpass) 80-110 MHz."], "correct": 3, "img": null}, {"chapter": "A", "num": 520, "question": "Ποιου τύπου φίλτρο πρέπει να χρησιμοποιήσουμε σε ένα πομπό VHF για να βελτιώσουμε την εξασθένηση των παρασιτικών εκπομπών του;", "answers": ["Υψιπερατό (highpass).", "Χαμηλοπερατό (lowpass).", "Ζωνοπερατό (bandpass).", "Αποκοπής ζώνης (bandstop)."], "correct": 3, "img": null}, {"chapter": "A", "num": 521, "question": "Ποιου τύπου φίλτρο πρέπει να χρησιμοποιήσουμε σε ένα πομπό βραχέων κυμάτων (HF) για να βελτιώσουμε την εξασθένιση των αρμονικών εκπομπών του;", "answers": ["Ζωνοπερατό (bandpass).", "Χαμηλοπερατό (lowpass).", "Υψιπερατό (highpass).", "Αποκοπής ζώνης (bandstop)."], "correct": 2, "img": null}, {"chapter": "A", "num": 522, "question": "Πώς μπορούμε να αυξήσουμε την αντοχή σε παρεμβολές σε ένα ραδιοερασιτεχνικό δέκτη βραχέων κυμάτων (HF);", "answers": ["Με ρυθμιζόμενα φίλτρα προεπιλογής.", "Με κεραία μόνο για τις ραδιοερασιτεχνικές συχνότητες.", "Με προενισχυτή με υψηλή προστασία σε παράγωγα ενδοδιαμόρφωσης (intercept point).", "Με όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 523, "question": "Πώς ονομάζουμε την ικανότητα μιας (ηλεκτρονικής ή ηλεκτρικής) διάταξης, συσκευής ή συστήματος να λειτουργεί ικανοποιητικά στο ηλεκτρομαγνητικό περιβάλλον, χωρίς να προκαλεί απαράδεκτες ηλεκτρομαγνητικές διαταραχές στο περιβάλλον αυτό;", "answers": ["Ατρωσία.", "Ηλεκτρομαγνητική συμβατότητα.", "Μαγνητική εναρμόνιση.", "Ηλεκτρική εναρμόνιση."], "correct": 2, "img": null}, {"chapter": "A", "num": 524, "question": "Σε ποια αιτία μπορεί να οφείλεται η παρεμβολή σε πιστοποιημένες για EMC ηλεκτρονικές συσκευές;", "answers": ["Στη μεγάλη ένταση του ηλεκτρομαγνητικού πεδίου στη θέση της συσκευής (field strength).", "Στις αρμονικές του πομπού (harmonics).", "Στις παρασιτικές εκπομπές του πομπού (spurious emissions).", "Σε όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 525, "question": "Σε ποια αιτία μπορεί να οφείλεται το παροδικό ξεκλείδωμα του βρόγχου κλειδώματος φάσης (PLL) σε ένα πομποδέκτη VHF;", "answers": ["Σε βλάβη.", "Σε πολύ ισχυρό ηλεκτρομαγνητικό πεδίο.", "Σε κακή ρύθμιση του κυκλώματος αυτού.", "Σε όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 526, "question": "Σε ποια αιτία οφείλεται η πλήρης απευαισθητοποίηση ενός δέκτη όταν η κεραία του γειτνιάζει με την κεραία ενός πομπού;", "answers": ["Στις αρμονικές του πομπού.", "Στην σύμπτωση των συχνοτήτων πομπού και δέκτη.", "Στην πλήρη παρεμβολή (blocking).", "Στην κακή γείωση του πομπού ή του δέκτη."], "correct": 3, "img": null}, {"chapter": "A", "num": 527, "question": "Σε ποια αιτία οφείλεται κυρίως η ταυτόχρονη λήψη στην ίδια ραδιοερασιτεχνική συχνότητα ενός ραδιοφωνικού σταθμού και ενός επαγγελματικού ραδιοδικτύου;", "answers": ["Σε αρμονικές εκπομπές του ραδιοφωνικού σταθμού.", "Σε φαινόμενα ενδοδιαμόρφωσης (intermodulation) στο δέκτη.", "Σε παρασιτικές εκπομπές του ραδιοδικτύου.", "Σε φαινόμενα πλήρους παρεμβολής (blocking) του δέκτη."], "correct": 2, "img": null}, {"chapter": "A", "num": 528, "question": "Σε ποιες περιπτώσεις χρειάζεται επιπλέον θωράκιση μια συσκευή;", "answers": ["Αν είναι δέκτης και λαμβάνει σήματα χωρίς να έχει κεραία.", "Αν είναι πομπός και παρενοχλεί τη τηλεόραση του γείτονα παρόλο που εκπέμπει σε τεχνητό φορτίο (dummy load).", "Αν δεν πληροί τις προδιαγραφές EMC της Ευρ. Ένωσης.", "Όλες τις παραπάνω περιπτώσεις."], "correct": 4, "img": null}, {"chapter": "A", "num": 529, "question": "Σε τι οφείλεται πιθανόν η παρεμβολή οριζόντιων γραμμών στη τηλεόραση του γείτονα όταν εκπέμπουμε;", "answers": ["Στον τηλεοπτικό πομπό.", "Στην κεραία της τηλεόρασης.", "Στην ραδιοερασιτεχνική κεραία εκπομπής.", "Στην εκπομπή αρμονικών από το ραδιοερασιτεχνικό πομπό."], "correct": 4, "img": null}, {"chapter": "A", "num": 530, "question": "Στην είσοδο ενός μη γραμμικού ενισχυτή εφαρμόζονται 2 φέροντα με συχνότητες 200kHz και 100kHz. Ποια από τις παρακάτω συχνότητες προκύπτει ως προϊόν ενδοδιαμόρφωσης 3ης τάξης;", "answers": ["700kHz", "300kHz", "600kHz", "900kHz"], "correct": 2, "img": null}, {"chapter": "A", "num": 531, "question": "Τα συστήματα εκκίνησης μηχανών προκαλούν:", "answers": ["Λευκό θόρυβο.", "Παρεμβολές σε συγκεκριμένη ζώνη συχνοτήτων.", "Παρεμβολές στενής ζώνης.", "Παρεμβολές ευρείας ζώνης."], "correct": 3, "img": null}, {"chapter": "A", "num": 532, "question": "Τα φαινόμενα της ηλεκτρομαγνητικής συμβατότητας αφορούν όλο τον ραδιοερασιτεχνικό εξοπλισμό;", "answers": ["Ναι.", "Όχι.", "Αφορούν όλο το ηλεκτρονικό ή ηλεκτρικό εξοπλισμό, εκτός από τα παθητικά στοιχεία (π.χ. καλώδια, μπαταρίες, εξοπλισμό που περιέχει μόνο ωμικά φορτία χωρίς οποιαδήποτε συσκευή αυτόματης μεταγωγής κ.λ.π.).", "Όχι εφόσον ο εξοπλισμός είναι γειωμένος."], "correct": 3, "img": null}, {"chapter": "A", "num": 533, "question": "Τι είναι η «Ηλεκτρομαγνητική διαταραχή»;", "answers": ["Το ηλεκτρομαγνητικό φαινόμενο που μπορεί να προκαλέσει διαταραχές της λειτουργίας μιας (ηλεκτρονικής ή ηλεκτρικής) διάταξης, συσκευής ή συστήματος.", "Η ικανότητα μιας ηλεκτρονικής συσκευής να λειτουργεί χωρίς να υποβαθμίζεται η ποιότητα της λειτουργίας της, παρά την αυξομείωση της τάσης του ηλεκτρικού δικτύου της ∆ΕΗ.", "Η ικανότητα ενός πομποδέκτη να λειτουργεί ικανοποιητικά στο ηλεκτρομαγνητικό του περιβάλλον.", "Τα παράσιτα σε ένα δέκτη."], "correct": 1, "img": null}, {"chapter": "A", "num": 535, "question": "Τι πρέπει πρώτιστα να κάνουμε αν η εκπομπή του σταθμού επηρεάζει τη λειτουργία του τροφοδοτικού του;", "answers": ["Να γειώσουμε το πομπό.", "Να φιλτράρουμε με φερρίτες τη γραμμή 220V του τροφοδοτικού.", "Να μειώσουμε με χαμηλοπερατό (lowpass) φίλτρο τις αρμονικές του πομπού.", "Να φιλτράρουμε με φερρίτες ή και χαμηλοπερατό φίλτρο τη γραμμή συνεχούς ρεύματος από το τροφοδοτικό κοντά στον πομπό."], "correct": 4, "img": null}, {"chapter": "A", "num": 536, "question": "Το ζωνοπερατό φίλτρο στην είσοδο ενός δέκτη:", "answers": ["Προστατεύει το σήμα από παρεμβολές στην ίδια ζώνη συχνοτήτων.", "Προστατεύει το σήμα από παρεμβολές σε γειτονικές ζώνες συχνοτήτων.", "Προστατεύει το σήμα από το λευκό θόρυβο.", "Αποκόπτει το φέρον."], "correct": 2, "img": null}, {"chapter": "A", "num": 537, "question": "Το μέγεθος SIR εκφράζει:", "answers": ["Το λόγο της ισχύος του σήματος προς την παρεμβολή.", "Το φασματικό περιεχόμενο ενός σήματος.", "Την ανθεκτικότητα ενός σήματος στο θόρυβο.", "Την ποιότητα ενός δέκτη."], "correct": 1, "img": null}, {"chapter": "A", "num": 538, "question": "Γιατί σε έναν πομπό, χρησιμοποιούμε τον ενισχυτή ακουστικών συχνοτήτων (audio frequency amplifier);", "answers": ["Για να προσαρμόζει την αντίσταση του μικροφώνου στον πομπό μας.", "Για να ενισχύει το σήμα της φωνής από το μικρόφωνο σε μια στάθμη κατάλληλη να οδηγήσει την δίοδο Varicap (ή άλλα στοιχεία) ώστε να προκληθεί η διαμόρφωση στον ταλαντωτή ραδιοσυχνοτήτων (RF oscillator).", "Για να «συντονίζει» καλύτερα το μικρόφωνο.", "Για να ενισχύει το σήμα της φωνής από το μικρόφωνο σε μια στάθμη κατάλληλη να οδηγήσει απευθείας τον ενισχυτή ισχύος (Power Amplifier) ραδιοσυχνοτήτων."], "correct": 2, "img": null}, {"chapter": "A", "num": 539, "question": "Εάν ο κινητός πομποδέκτης σας λειτουργεί στο αυτοκίνητό σας αλλά όχι στο σπίτι σας, τι θα έπρεπε να ελέγξετε πρώτα;", "answers": ["Την παροχή ηλεκτρικού ρεύματος (τροφοδοσία).", "Το μεγάφωνο.", "Το μικρόφωνο.", "Την κεραία σας με μετρητή στασίμων κυμάτων (SWR)."], "correct": 1, "img": null}, {"chapter": "A", "num": 540, "question": "Ένας ενισχυτής τάξης C για ποιες τιμές της φάσης ενός ημιτονικού κύματος εισόδου άγει;", "answers": ["90 έως 150 μοίρες.", "180 μοίρες.", "180 έως 360 μοίρες.", "360 μοίρες."], "correct": 1, "img": null}, {"chapter": "A", "num": 541, "question": "Ένας ενισχυτής τάξης C μπορεί να χρησιμοποιηθεί και σαν πολλαπλασιαστής συχνότητας, δίνοντας στην έξοδό του:", "answers": ["Συχνότητα διπλάσια της συχνότητας εισόδου.", "Οποιοδήποτε πολλαπλάσιο της συχνότητας εισόδου.", "Γινόμενο δυο συχνοτήτων εισόδου.", "Ακέραιο πολλαπλάσιο της συχνότητας εισόδου."], "correct": 4, "img": null}, {"chapter": "A", "num": 542, "question": "Ένας πομπός 20W που χρησιμοποιεί κεραία 13dBi, πόση ισχύ EIRP εκπέμπει;", "answers": ["33W", "33dBW", "400W", "260W"], "correct": 3, "img": null}, {"chapter": "A", "num": 543, "question": "Η απόσταση από μια κεραία εκπομπής όπου ο χώρος χαρακτηρίζεται \"μακρινό πεδίο\" (far field) εξαρτάται:", "answers": ["Από την ισχύ εκπομπής και το μήκος κύματος.", "Τις διαστάσεις της κεραίας και τη συχνότητα εκπομπής.", "Τις διαστάσεις και την αντίσταση εισόδου της κεραίας.", "Το υλικό και τις διαστάσεις της κεραίας."], "correct": 2, "img": null}, {"chapter": "A", "num": 545, "question": "Η κυματομορφή στην έξοδο ενός ραδιοφωνικού πομπού απεικονίζεται στον παλμογράφο όπως φαίνεται στο σχήμα. Με βάση την εικόνα αυτή, η διαμόρφωση είναι:", "answers": ["ΑΜ", "FM", "PM", "Τίποτα από τα παραπάνω"], "correct": 1, "img": "SV_Q545.jpg"}, {"chapter": "A", "num": 547, "question": "Θα πρέπει να υπάρχει σε όλους τους πομπούς, ως τελική βαθμίδα (πριν από την κεραία), ένα βαθυπερατό φίλτρο για να περικόπτονται (και συνεπώς να μη μεταδίδονται) τα ανεπιθύμητα σήματα;", "answers": ["Ναι.", "Όχι. ∆εν πρέπει να υπάρχει φίλτρο.", "Όχι. ∆εν χρειάζεται βαθυπερατό αλλά υψιπερατό φίλτρο.", "Όχι. ∆εν χρειάζεται βαθυπερατό αλλά ζωνοπερατό φίλτρο."], "correct": 1, "img": null}, {"chapter": "A", "num": 548, "question": "Ο απλούστερος πομπός για την παραγωγή CW κώδικα Morse αποτελείται από:", "answers": ["Ένα ταλαντωτή, διακόπτη μίκτη και φίλτρο.", "Έναν ταλαντωτή και ένα διακόπτη.", "Έναν ταλαντωτή κι έναν ενισχυτή.", "Ένα φίλτρο, έναν ενισχυτή κι ένα διακόπτη."], "correct": 2, "img": null}, {"chapter": "A", "num": 549, "question": "Ο ενισχυτής ισχύος (Power Amplifier - PA) ενός πομπού, ενισχύει το σήμα χαμηλής στάθμης που «βγαίνει» από ένα διαμορφωτή (modulator) στην επιθυμητή ισχύ ώστε να μεταφερθεί στην κεραία μας για εκπομπή (transmission):", "answers": ["Σωστό αλλά προσοχή! Ο ενισχυτής ισχύος πρέπει να δίνει ενίσχυση τουλάχιστον 1 Watt.", "Λάθος", "Σωστό.", "Λάθος. Ο ενισχυτής ισχύος ευρίσκεται μόνο σε οπτικοακουστικά συστήματα (π.χ. σε ενισχυτές HiFi)."], "correct": 3, "img": null}, {"chapter": "A", "num": 550, "question": "Οι παρασιτικές εκπομπές ενός πομπού οφείλονται κατά κύριο λόγο:", "answers": ["Στη μη γραμμική συμπεριφορά του τελικού ενισχυτή.", "Στην βαθμίδα ενδιάμεσων συχνοτήτων (IF).", "Στην αστάθεια του τοπικού ταλαντωτή.", "Σε ατέλειες των καλωδίων."], "correct": 1, "img": null}, {"chapter": "A", "num": 551, "question": "Ποιος είναι ο προτιμότερος από τους ακόλουθους 4 τρόπους μετάδοσης data μιας φωτογραφίας;", "answers": ["Καταλληλότερη είναι η διαμόρφωση AM ή FM.", "Με CW (Continuous Wave Telegraphy).", "Με ψηφιακό SSB (Digital Single Side Band).", "SSTV (Slow Scan TV)."], "correct": 4, "img": null}, {"chapter": "A", "num": 552, "question": "Πώς μπορεί να ελαχιστοποιηθεί η παρενόχληση των συχνοτήτων (εκπομπή στον αέρα) κατά τη διάρκεια μιας δοκιμής συσκευών εκπομπής του σταθμού;", "answers": ["Επιλογή μιας μη κατειλημμένης συχνότητας .", "Χρήση ενός τεχνητού φορτίου (dumy load).", "Χρήση χαμηλής ισχύος.", "Αποσύνδεση της κεραίας."], "correct": 2, "img": null}, {"chapter": "A", "num": 553, "question": "Σ’ ένα πομπό, ο ταλαντωτής (RF oscillator) περικόπτει την ανεπιθύμητη πλευρική ζώνη και επιτρέπει την διέλευση της επιθυμητής. ∆ηλαδή επιτρέπει είτε την άνω πλευρική ζώνη {upper sideband - USB) ή την κάτω (lower sideband - LSB). Σωστό ή λάθος;", "answers": ["Σωστό.", "Λάθος. Οι ιδιότητες του στοιχείου όπως αναφέρονται, αφορούν το φίλτρο πλευρικής ζώνης (Side Band Filter).", "Λάθος. Το στοιχείο αυτό είναι το ενεργό φίλτρο που χρησιμοποιείται στους πομπούς ως τελική βαθμίδα (πριν από την κεραία).", "Λάθος. Το στοιχείο αυτό είναι ο μίκτης (mixer)."], "correct": 2, "img": null}, {"chapter": "A", "num": 554, "question": "Σ’ ένα πομπό, το φίλτρο πλευρικής ζώνης (Side Band Filter) ελέγχεται από κρύσταλλο (ή είναι VFO) και παράγει το βασικό σήμα ραδιοσυχνοτήτων (RF signal) σε χαμηλή στάθμη:", "answers": ["Σωστό.", "Λάθος. Οι ιδιότητες του στοιχείου όπως αναφέρονται, αφορούν τον ταλαντωτή ραδιοσυχνοτήτων (RF oscillator).", "Λάθος. Το στοιχείο αυτό είναι ο μίκτης (mixer).", "Λάθος. Το στοιχείο αυτό είναι το ενεργό φίλτρο που χρησιμοποιείται στους πομπούς ως τελική βαθμίδα (πριν από την κεραία)."], "correct": 2, "img": null}, {"chapter": "A", "num": 555, "question": "Σε ένα πομπό FM όταν ο δείκτης διαμόρφωσης είναι μεγαλύτερος του 100%, τότε λέμε ότι έχουμε:", "answers": ["Παραμόρφωση", "Υποδιαμόρφωση", "Υπερδιαμόρφωση", "Αναδίπλωση"], "correct": 3, "img": null}, {"chapter": "A", "num": 556, "question": "Σε ένα πομπό FΜ η συχνότητα του φέροντος πρέπει να είναι:", "answers": ["Πολύ μεγαλύτερη από το εύρος ζώνης του σήματος πληροφορίας.", "Πολύ μικρότερη από το εύρος ζώνης του σήματος πληροφορίας.", "Ίση με το εύρος ζώνης του σήματος πληροφορίας.", "Ίση με το ήμισυ του εύρους ζώνης του σήματος πληροφορίας."], "correct": 1, "img": null}, {"chapter": "A", "num": 557, "question": "Σε ένα πομπό ΑΜ η συχνότητα του φέροντος πρέπει να είναι:", "answers": ["Πολύ μικρότερη από το εύρος ζώνης του σήματος πληροφορίας.", "Πολύ μεγαλύτερη από το εύρος ζώνης του σήματος πληροφορίας.", "Ίση με το εύρος ζώνης του σήματος πληροφορίας.", "Ίση με το ήμισυ του εύρους ζώνης του σήματος πληροφορίας"], "correct": 2, "img": null}, {"chapter": "A", "num": 558, "question": "Σε μια αναλογική διαμόρφωση η συχνότητα του φέροντος πρέπει να είναι:", "answers": ["Ίση με το εύρος ζώνης του σήματος πληροφορίας.", "Πολύ μικρότερη από το εύρος ζώνης του σήματος πληροφορίας.", "Πολύ μεγαλύτερη από το εύρος ζώνης του σήματος πληροφορίας.", "∆εν υπάρχει περιορισμός."], "correct": 3, "img": null}, {"chapter": "A", "num": 559, "question": "Σε ποιο είδος πομπών δεν χρησιμοποιούνται οι ενισχυτές τάξης C:", "answers": ["FM", "AM", "SSB", "CW"], "correct": 3, "img": null}, {"chapter": "A", "num": 560, "question": "Στη διαμόρφωση FM το φέρον:", "answers": ["Έχει μεταβαλλόμενη φάση.", "Έχει σταθερό πλάτος.", "Έχει σταθερή συχνότητα.", "Είναι ακέραιο πολλαπλάσιο του εύρους ζώνης του σήματος πληροφορίας."], "correct": 2, "img": null}, {"chapter": "A", "num": 561, "question": "Στο σχήμα απεικονίζεται η εικόνα που δίνει στον παλμογράφο ένα διαμορφωμένο κατά ΑΜ φέρον. Από το σχήμα συμπεραίνουμε ότι:", "answers": ["Είναι διαμόρφωση μονής πλευρικής ζώνης.", "Το φέρον έχει πολύ υψηλή συχνότητα.", "Το ποσοστό διαμόρφωσης είναι 50%.", "Το φέρον είναι καταπιεσμένο."], "correct": 4, "img": "SV_Q561.jpg"}, {"chapter": "A", "num": 562, "question": "Το Low Pass Filter (LPF) παρέχει σήμα σταθερής συχνότητας το οποίο είναι ακριβές και χρησιμοποιείται ως συχνότητα αναφοράς. Η συχνότητα του σήματος εξόδου εξαρτάται από την συχνότητα του κρυστάλλου:", "answers": ["Σωστό.", "Λάθος. Είναι ο Crystal Controlled Oscillator.", "Σωστό . Σε συνεργασία με το φωρατή.", "Λάθος. Είναι το Low Pass Filter (LPF)."], "correct": 2, "img": null}, {"chapter": "A", "num": 563, "question": "Υπάρχει σε όλους τους πομπούς, ως τελική βαθμίδα (πριν από την κεραία), ένα ζωνοπερατό φίλτρο για καλύτερη ποιότητα εκπομπής;", "answers": ["Ναι.", "Μόνο στους πομπούς FM.", "Μόνο στους πομπούς AM.", "Όχι."], "correct": 4, "img": null}, {"chapter": "A", "num": 564, "question": "Υπάρχει σε όλους τους πομπούς, ως τελική βαθμίδα (πριν από την κεραία), ένας ταλαντωτής ;", "answers": ["Λάθος.", "Λάθος. Υπάρχει μεν ταλαντωτής αλλά μόνο στους φορητούς πομπούς FM.", "Λάθος. Υπάρχει μεν ταλαντωτής αλλά μόνο στους πομπούς AM / SSB.", "Σωστό."], "correct": 1, "img": null}, {"chapter": "A", "num": 565, "question": "Υπάρχουν 2 βασικοί τύποι ταλαντωτών ραδιοσυχνοτήτων. Κρυστάλλου και μεταβαλλόμενης συχνότητας (VFO). Αυτοί έχουν διαφορετικά χαρακτηριστικά που προσδιορίζουν τον καταλληλότερο τύπο για μια συγκεκριμένη εφαρμογή;", "answers": ["Σωστό.", "Λάθος.", "Όχι. Οι ταλαντωτές αυτοί έχουν ακριβώς τα ίδια χαρακτηριστικά.", "Όχι. Ο ένας ελέγχεται από κρύσταλλο και ο άλλος είναι μεταβαλλόμενης τάσης."], "correct": 1, "img": null}, {"chapter": "B", "num": 566, "question": "Για πόσο διάστημα συνήθως μπορεί να εκχωρηθεί ένα ειδικό διακριτικό κλήσης «μικρής διάρκειας»;", "answers": ["Για πάντα.", "Για χρονικό διάστημα έως και δέκα πέντε (15) ημέρες.", "Για όσο βρίσκεται εν ζωή ο ραδιοερασιτέχνης.", "Μέχρι την χορήγηση άλλου ειδικού διακριτικού στον ίδιο ραδιοερασιτέχνη."], "correct": 2, "img": null}, {"chapter": "B", "num": 567, "question": "∆ιακριτικό κλήσης με πρόθεμα SV σε ποία ραδιοερασιτεχνική Ελληνική κατηγορία αντιστοιχεί;", "answers": ["στην κατηγορία SV0.", "στην κατηγορία 1 (CEPT).", "στην κατηγορία εισαγωγικού επιπέδου (Entry Level).", "σε καμία."], "correct": 2, "img": null}, {"chapter": "B", "num": 568, "question": "∆ιακριτικό κλήσης με πρόθεμα SΥ σε ποία ραδιοερασιτεχνική Ελληνική κατηγορία αντιστοιχεί;", "answers": ["στην κατηγορία εισαγωγικού επιπέδου (entry level).", "στην κατηγορία 1 (CEPT).", "στην ενδιάμεση κατηγορία (NOVICE).", ""], "correct": 1, "img": null}, {"chapter": "B", "num": 569, "question": "Η κατάληξη (επίθεμα) \"ΑΒΥ\" μπορεί να εμπεριέχεται σε διακριτικά :", "answers": ["Μόνο ραδιοερασ ρμολογούνται, τοποθετούνται και προορίζονται να χρησιμοποιούνται σε μια προκαθορισμένη τοποθεσία.", "Τη διασφάλιση της ανθρώπινης ζωής ή περιουσίας."], "correct": 1, "img": null}, {"chapter": "G", "num": 699, "question": "Με τον όρο «σταθερή εγκατάσταση» εννοούμε :", "answers": ["Την ικανότητα του εξοπλισμού να λειτουργεί χωρίς να υποβαθμίζεται η ποιότητα της λειτουργίας του παρά την ύπαρξη ηλεκτρομαγνητικής διαταραχής.", "Το σύνολο όλων των ηλεκτρομαγνητικών φαινομένων, τα οποία είναι δυνατόν να παρατηρηθούν σε μια δεδομένη τοποθεσία.", "Το συγκεκριμένο συνδυασμό διαφόρων τύπων συσκευών και, ενδεχομένως, άλλων διατάξεων, που συναρμολογούνται, τοποθετούνται και προορίζονται να χρησιμοποιούνται μονίμως σε μια προκαθορισμένη τοποθεσία.", "Όλα τα παραπάνω."], "correct": 3, "img": null}, {"chapter": "G", "num": 700, "question": "Μιλώντας για ηλεκτρομαγνητική συμβατότητα, με τον όρο «ατρωσία» εννοούμε:", "answers": ["Τον συνδυασμό συσκευών και, ανάλογα με την περίπτωση, άλλων διατάξεων, που προορίζονται να λειτουργούν σε διάφορες τοποθεσίες.", "Την ικανότητα του εξοπλισμού να λειτουργεί χωρίς να υποβαθμίζεται η ποιότητα της λειτουργίας του παρά την ύπαρξη ηλεκτρομαγνητικής διαταραχής.", "Την αντοχή των συσκευών απέναντι σε ακραίες καιρικές συνθήκες (υγρασία, θερμοκρασία, κραδασμούς κ.λ.π.)", "Το ηλεκτρομαγνητικό φαινόμενο που μπορεί να υποβαθμίσει τη λειτουργία εξοπλισμού."], "correct": 2, "img": null}, {"chapter": "G", "num": 701, "question": "Ο Ραδιοερασιτεχνικός σταθμός σχεδιάζεται και κατασκευάζεται κατά τρόπον ώστε να εξασφαλίζεται ότι:", "answers": ["Λειτουργεί ικανοποιητικά στο ηλεκτρομαγνητικό του περιβάλλον χωρίς να προκαλεί απαράδεκτες ηλεκτρομαγνητικές διαταραχές σε άλλον εξοπλισμό που ευρίσκεται στο περιβάλλον αυτό.", "Έχει το αναμενόμενο επίπεδο ατρωσίας στις ηλεκτρομαγνητικές διαταραχές, που να του επιτρέπει να λειτουργεί χωρίς απαράδεκτη υποβάθμιση της λειτουργίας του.", "Η ισχύς εκπομπής είναι η μέγιστη δυνατή για την εξασφάλιση επικοινωνίας.", "Οι 1 και
