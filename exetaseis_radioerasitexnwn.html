ι του Συμβουλίου.", "Η οδηγία 99/5/ΕΚ του Ευρωπαϊκού Κοινοβουλίου και του Συμβουλίου, της 9 Μαρτίου 1999.", "Η οδηγία 89/336/ΕΟΚ", "Η οδηγία 2004/108/ΕΚ του Ευρωπαϊκού Κοινοβουλίου και του Συμβουλίου."], "correct": 2, "img": null}, {"chapter": "G", "num": 707, "question": "Σε περίπτωση τροποποίησης ραδιοερασιτεχνικού εξοπλισμού ο ραδιοερασιτέχνης οφείλει:", "answers": ["Να τοποθετεί επί του πλαισίου την σήμανση CE.", "Να στέλνει τον εξοπλισμό στην Νομαρχία για έλεγχο.", "Να διασφαλίζει ότι ικανοποιεί τις βασικές απαιτήσεις όλων των σχετικών διατάξεων της νομοθεσίας.", "∆εν έχει περαιτέρω υποχρέωση γιατί πλέον θεωρείται ιδιοκατασκευή."], "correct": 3, "img": null}, {"chapter": "G", "num": 708, "question": "Σε ποιες περιπτώσεις πρέπει οι ραδιοερασιτεχνικές συσκευές να καλύπτουν τις απαιτήσεις για την Ηλεκτρομαγνητική Συμβατότητα (EMC);", "answers": ["Μόνο όταν οι συσκευές είναι Εργοστασιακές.", "Μόνο όταν η θέση λειτουργίας του σταθμού είναι κοντά σε νοσοκομεία-σχολεία.", "Σε κάθε περίπτωση.", "Μόνο για την κατηγορία 1 (CEPT) που έχουμε εκπομπή στα βραχέα."], "correct": 3, "img": null}, {"chapter": "G", "num": 709, "question": "Σε ποιες περιπτώσεις πρέπει οι ραδιοερασιτεχνικές συσκευές να φέρουν την σήμανση CE;", "answers": ["Μόνο σε περίπτωση που οι ραδιοερασιτεχνικές συσκευές είναι εργοστασιακές.", "Όταν πρόκειται για ιδιοκατασκευές.", "Σε καμία περίπτωση.", "Στην 1 και 2 απάντηση."], "correct": 1, "img": null}, {"chapter": "G", "num": 710, "question": "Τι είναι η \"Ηλεκτρομαγνητική Συμβατότητα\";", "answers": ["Είναι Τεχνικό Χαρακτηριστικό.", "Είναι Φυσικό Χαρακτηριστικό.", "Είναι Σύμβαση και Πλαίσιο Λειτουργίας.", "Είναι ευχή."], "correct": 3, "img": null}, {"chapter": "G", "num": 711, "question": "Τι σημαίνει η σήμανση \"CE\" επί των εργοστασιακών συσκευών;", "answers": ["Ότι η συσκευή είναι κατάλληλη για χρήση από άτομα χωρίς να χρειάζεται η άδεια του ραδιοερασιτέχνη (free circulation).", "Ότι εξάγεται από άλλη χώρα (China Export).", "Είναι ο τύπος της συσκευής.", "Ότι πλήροι τις ουσιώδεις απαιτήσεις όλων των οδηγιών που αφορούν την υπόψη συσκευή."], "correct": 4, "img": null}, {"chapter": "G", "num": 712, "question": "0 κάτοχος αδείας κατηγορίας \"εισαγωγικού επιπέδου\" μπορεί:", "answers": ["Να εκπέμπει σε όλες τις εκχωρημένες ζώνες συχνοτήτων στην υπηρεσία ραδιοερασιτέχνη.", "Να εκπέμπει σε όλες τις εκχωρημένες ζώνες συχνοτήτων στην υπηρεσία ραδιοερασιτέχνη μέσω δορυφόρου.", "Να εκπέμπει σε όλες τις ζώνες που αναφέρονται στις δύο προηγούμενες διατυπώσεις.", "Να εκπέμπει μόνο στις ζώνες που προβλέπονται από τον \"Κανονισμό Ραδιοερασιτεχνών\" για την κατηγορία αυτή."], "correct": 4, "img": null}, {"chapter": "G", "num": 713, "question": "0 κάτοχος της κατηγορίας 1 μπορεί:", "answers": ["Να κάνει χρήση όλων των εκχωρημένων υποζωνών συχνοτήτων στην υπηρεσία ραδιοερασιτέχνη.", "Να κάνει χρήση όλων των εκχωρημένων υποζωνών συχνοτήτων στην υπηρεσία ραδιοερασιτέχνη μέσω ∆ορυφόρου.", "Να εκπέμπει σε όλο το φάσμα ραδιοσυχνοτήτων.", "Η 1 και 2 απάντηση."], "correct": 4, "img": null}, {"chapter": "G", "num": 714, "question": "Για να λάβει κάποιος μέρος στις εξετάσεις για την απόκτηση πτυχίου πρέπει να είναι:", "answers": ["Πολίτης κράτους μέλους της Ευρωπαϊκής Κοινότητας.", "Πολίτης του Ευρωπαϊκού Οικονομικού Χώρου.", "Πολίτης άλλων χωρών πλην Ευρωπαϊκής Ένωσης και Ευρωπαϊκού Οικονομικού Χώρου εφόσον διαθέτει άδεια παραμονής και εργασίας στην Ελλάδα.", "Οποιοδήποτε από τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "G", "num": 715, "question": "Για τα Ελληνικά ραδιοερασιτεχνικά πτυχία, τι από τα παρακάτω ισχύει;", "answers": ["Τα πτυχία ραδιοερασιτεχνών «Κατηγορίας 1» ισχύουν σε κάθε χώρα της ITU ενώ τα πτυχία \"Εισαγωγικού Επιπέδου\" ισχύουν μόνο στην Ευρώπη.", "Τα πτυχία ραδιοερασιτεχνών «Κατηγορίας 1» ισχύουν μόνο για την Ελλάδα ενώ τα πτυχία \"Εισαγωγικού Επιπέδου\" ισχύουν σε όλη την Ευρώπη.", "Τα πτυχία ραδιοερασιτεχνών «Κατηγορίας 1» είναι εναρμονισμένα πτυχία HAREC σύμφωνα με τη Σύσταση T/R 61-02 της CEPT ενώ τα πτυχία \"Εισαγωγικού Επιπέδου\" είναι εναρμονισμένα με την Αναφορά 89 της Επιτροπής Ηλεκτρονικών Επικοινωνιώντης", ""], "correct": 3, "img": null}, {"chapter": "G", "num": 716, "question": "Επιτρέπεται η ραδιοερασιτεχνική χρήση στην υποζώνη συχνοτήτων 29,7-30,005 ΜΗz;", "answers": ["Απαγορεύεται. Η υποζώνη συχνοτήτων 29,7-30,005 MHz, σύμφωνα με τον Εθνικό Κατάλογο Κατανομής Συχνοτήτων έχει απονεμηθεί σε άλλες υπηρεσίες ραδιοεπικοινωνιών.", "Επιτρέπεται εφόσον διαπιστωθεί ότι η υποζώνη αυτή δεν είναι κατειλημμένη από άλλους χρήστες.", "Επιτρέπεται διότι οι συχνότητες αυτές χρησιμοποιούνται από ασύρματα μικρόφωνα και άλλα SRD μικρής σπουδαιότητας.", "Απαγορεύεται κοντά σε νοσοκομεία και κλινικές διότι οι συχνότητες αυτές χρησιμοποιούνται από Ενεργά Ιατρικά Εμφυτεύματα. Αν ο ραδιοερασιτέχνης βρίσκεται σε μεγάλη απόσταση από νοσοκομείο, μπορεί να την χρησιμοποιήσει."], "correct": 1, "img": null}, {"chapter": "G", "num": 717, "question": "Εργοστασιακή τηλεπικοινωνιακή συσκευή, που δεν πληροί τις βασικές απαιτήσεις του Π∆ 44/2002 περί ραδιοεξοπλισμού και τηλεπικοινωνιακού τερματικού εξοπλισμού και δε φέρει σήμανση CE:", "answers": ["∆εν μπορεί να εισαχθεί σε καμία περίπτωση στη χώρα.", "Μπορεί να την κατέχει και να την λειτουργεί μόνο αδειούχος ραδιοερασιτέχνης.", "Μπορεί να παρουσιάζεται μόνο σε εκθέσεις ή επιδείξεις, με την προϋπόθεση ότι θα υπάρχει εμφανής επισήμανση ότι δεν μπορεί να κυκλοφορήσει στο εμπόριο ή να τεθεί σε κυκλοφορία.", "Μπορεί να την κατέχει ένας ραδιοερασιτέχνης σαν εφεδρική."], "correct": 3, "img": null}, {"chapter": "G", "num": 718, "question": "Η ανταπόκριση μεταξύ ραδιοερασιτεχνικών σταθμών περιλαμβάνει:", "answers": ["Μετάδοση μουσικής και φωνητικών προγραμμάτων.", "Αποκλειστικά μεταβίβαση και λήψη ανακοινώσεων τεχνικού περιεχομένου.", "Ανταλλαγή πληροφοριών προσωπικού περιεχομένου.", "∆ιαφημιστικά και προπαγανδιστικά προγράμματα."], "correct": 2, "img": null}, {"chapter": "G", "num": 719, "question": "Η διάρκεια ισχύος της άδειας λειτουργίας σταθμού είναι:", "answers": ["Ισόβια", "∆εκαετής", "Εξαετής", "Εξαετής με τετραετή παράταση"], "correct": 2, "img": null}, {"chapter": "G", "num": 720, "question": "Η εγκατάσταση ραδιοεξοπλισμού με δυνατότητες πέραν των νομίμως οριζομένων ορίων συχνοτήτων και ισχύος:", "answers": ["Είναι ελεύθερη χωρίς διατυπώσεις.", "Είναι ελεύθερη μετά τη λήψη βεβαίωσης από τη Κεντρική Υπηρεσία του ΥΜΕ.", "Είναι ελεύθερη εφόσον διαθέτει όργανα ρύθμισης και ελέγχου με ακρίβεια μέτρησης καλύτερη από 10% με σκοπό την διαφύλαξη των προβλεπόμενων ορίων.", "Είναι ελεύθερη εφόσον προέρχεται από τροποποίηση ερασιτεχνικού ραδιοεξοπλισμού."], "correct": 3, "img": null}, {"chapter": "G", "num": 721, "question": "Η λήξη ισχύος της άδειας λειτουργίας ραδιοερασιτεχνικού σταθμού, τι συνέπειες έχει για τον κάτοχο της;", "answers": ["Με τη λήξη ισχύος της ραδιοερασιτεχνικής άδειας αίρονται όλα τα δικαιώματα άσκησης ραδιοερασιτεχνικών δραστηριοτήτων εκτός από την χρησιμοποίηση ραδιοερασιτεχνικών αναμεταδοτών.", "Με τη λήξη ισχύος της ραδιοερασιτεχνικής άδειας αίρεται αυτομάτως κάθε δικαίωμα άσκησης ραδιοερασιτεχνικών δραστηριοτήτων, συμπεριλαμβανόμενων και των δικαιωμάτων εγκατάστασης κεραίας ραδιοερασιτεχνικού σταθμού.", "Ο ραδιοερασιτέχνης πρέπει να ζητήσει την σφράγιση των πομποδεκτών του από την αρμόδια υπηρεσία της Περιφέρειας.", "Με τη λήξη ισχύος της ραδιοερασιτεχνικής άδειας, ο κάτοχος της πρέπει να μεριμνήσει για την ακύρωση του πτυχίου του."], "correct": 2, "img": null}, {"chapter": "G", "num": 722, "question": "Η χρήση ψευδών διακριτικών κλήσης ή ψευδών και ανεξακρίβωτων ειδήσεων επιτρέπεται:", "answers": ["Την πρωταπριλιά για εθιμικούς λόγους.", "Σε περιπτώσεις ειδικών μυστικών ανταποκρίσεων.", "Ποτέ.", "Για λόγους εθνικής ασφάλειας."], "correct": 3, "img": null}, {"chapter": "G", "num": 723, "question": "Ο ερασιτέχνης απαγορεύει τη χρήση του σταθμού του:", "answers": ["Στους ανηλίκους.", "Στους συνοικούντες και συγγενείς του.", "Σε οποιονδήποτε που δεν διαθέτει τα νόμιμα προσόντα και όταν δεν είναι παρών ο ίδιος.", "Σε αλλοδαπούς."], "correct": 3, "img": null}, {"chapter": "G", "num": 724, "question": "Ο ερασιτέχνης τηρεί ημερολόγιο λειτουργίας του σταθμού όπου αναγράφει:", "answers": ["Την ημερομηνία, ώρα, διάρκεια της ανταπόκρισης.", "Το διακριτικό κλήσης του σταθμού, την ισχύ και τη συχνότητα λειτουργίας.", "Τον τύπο εκπομπής και τον τόπο εγκατάστασης του σταθμού.", "όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "G", "num": 725, "question": "Οι άδειες λειτουργίας ερασιτεχνικού σταθμού έχουν διάρκεια:", "answers": ["30 ετών", "ισόβιες", "3 ετών", "10 ετών"], "correct": 4, "img": null}, {"chapter": "G", "num": 727, "question": "Οριστική ανάκληση η αναστολή της άδειας λειτουργίας αναλόγως της βαρύτητας της παράβασης γίνεται:", "answers": ["Όταν ο ερασιτεχνικός σταθμός χρησιμοποιείται για εμπορικούς σκοπούς η διαφημίσεις.", "Όταν ο αδειούχος είναι υπαίτιος παρεμβολής ή επιζήμιας παρεμβολής.", "Όταν ο αδειούχος εκπέμπει μουσική η φωνητικά προγράμματα με η χωρίς αμοιβή.", "Για οτιδήποτε από τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "G", "num": 728, "question": "Ποια είναι η αρμόδια Αρχή για τα θέματα ραδιοεξοπλισμού (δηλαδή για την εφαρμογή του Π.∆. 44/2002 περί του ραδιοεξοπλισμού και τηλεπικοινωνιακού τερματικού εξοπλισμού κλπ);", "answers": ["Ο Συνήγορος του Πολίτη.", "Η Εθνική Επιτροπή Τηλεπικοινωνιών και Ταχυδρομείων (ΕΕΤΤ).", "Οι υπηρεσίες Μεταφορών και Επικοινωνιών των Περιφερειών.", "Η Αρχή ∆ιασφάλισης Απορρήτου των Επικοινωνιών (Α∆ΑΕ)."], "correct": 2, "img": null}, {"chapter": "G", "num": 730, "question": "Ποιο είναι το ελληνικό πρότυπο που αφορά την συνεγκατάσταση κεραιών ραδιοεπικοινωνιών;", "answers": ["Το ΕΝ 300113", "Το ΕΛΟΤ 1422", "Το ΕΝ 300086", "Το ΕΛΟΤ 1244"], "correct": 2, "img": null}, {"chapter": "G", "num": 731, "question": "Ποιοι από τους παρακάτω φορείς έχουν δικαίωμα να λάβουν άδεια;", "answers": ["Η Εθνική Επιτροπή Τηλεπικοινωνιών και Ταχυδρομείων.", "Η Γενική Γραμματεία Πολιτικής Προστασίας.", "Τα τμήματα των τριτοβάθμιων εκπαιδευτικών ιδρυμάτων με αντικείμενο τις ασύρματες επικοινωνίες.", "Οποιοσδήποτε από τους παραπάνω."], "correct": 4, "img": null}, {"chapter": "G", "num": 732, "question": "Ποιοι μπορεί να είναι μέλη της Εξεταστικής Επιτροπής για την απόκτηση πτυχίου ραδιοερασιτέχνη;", "answers": ["Ραδιοηλεκτρολόγοι Α και Β κατηγορίας.", "Οι κάτοχοι πτυχίου ΑΕΙ ΤΕΙ, ηλεκτρονικού, ηλεκτρολόγου και τηλεπικοινωνιακού.", "Ραδιοερασιτέχνες κατηγορίας 1 και ραδιοτηλεγραφητές επαγγελματίες.", "Υπάλληλοι της αρμόδιας Περιφερειακής υπηρεσίας."], "correct": 4, "img": null}, {"chapter": "G", "num": 733, "question": "Ποιος από τους παρακάτω δεν έχει δικαίωμα να λειτουργεί σταθμό ραδιοερασιτέχνη;", "answers": ["Αυτός που του έχει αφαιρεθεί οριστικά η άδεια.", "Πρόσωπα άνω των 65 ετών.", "Τα μη κερδοσκοπικά σωματεία και σύλλογοι ραδιοερασιτεχνών.", "Η Γενική Γραμματεία Πολιτικής Προστασίας."], "correct": 1, "img": null}, {"chapter": "G", "num": 734, "question": "Ποιος δημόσιος φορέας είναι αρμόδιος για την προφύλαξη του κοινού από ηλεκτρομαγνητικά πεδία;", "answers": ["Η Εθνική Επιτροπή Επικοινωνιών και Ταχυδρομείων (ΕΕΤΤ).", "Η Αρμόδια Περιφερειακή Υπηρεσία (ΑΠΥ).", "Η Εθνική Επιτροπή Ατομικής Ενέργειας (ΕΕΑΕ).", "Το Υπουργείο Υποδομών Μεταφορών και ∆ικτύων (ΥΥΜ∆)."], "correct": 3, "img": null}, {"chapter": "G", "num": 735, "question": "Ποιος είναι ο σκοπός του Προτύπου ΕΛΟΤ 1422;", "answers": ["Να δώσει κατευθύνσεις και υποδείξεις για την σύνταξη μελετών, την κατασκευαστική διαμόρφωση των εγκαταστάσεων ηλεκτρονικών επικοινωνιών που χρησιμοποιούν ραδιοεξοπλισμό και οι κεραίες τους εγκαθίστανται στην ίδια τοποθεσία.", "Να δώσει κατευθύνσεις και υποδείξεις για την συντήρηση και λειτουργία των εγκαταστάσεων ηλεκτρονικών επικοινωνιών που χρησιμοποιούν ραδιοεξοπλισμό και οι κεραίες τους εγκαθίστανται στην ίδια τοποθεσία.", "Οι 1 και 2 απαντήσεις.", "Να απαγορεύει την τοποθέτηση κεραιών στην ίδια τοποθεσία για να μην παρεμβάλονται και αλληλοδημιουργούν προβλήματα."], "correct": 3, "img": null}, {"chapter": "G", "num": 736, "question": "Ποιος έχει δικαίωμα να λειτουργεί ραδιοερασιτεχνικό σταθμό;", "answers": ["Όποιος έχει νόμιμη άδεια άσκησης επαγγέλματος ραδιοηλεκτρολόγου.", "Οι επαγγελματίες ραδιοτηλεγραφητές.", "Όποιος έχει λάβει άδεια από τον ιδιοκτήτη του σταθμού.", "Ο κάτοχος σχετικής άδειας ραδιοερασιτέχνη."], "correct": 4, "img": null}, {"chapter": "G", "num": 737, "question": "Ποιος χορηγεί τα ειδικά ραδιοερασιτεχνικά χαρακτηριστικά κλήσης;", "answers": ["Η Εθνική Επιτροπή Τηλεπικοινωνιών και Ταχυδρομείων.", "Η Κεντρική Υπηρεσία Υπουργείου Υποδομών Μεταφορών και ∆ικτύων προς τις ∆ιευθύνσεις Μεταφορών και Επικοινωνιών των Περιφερειών.", "Η Εθνική Επιτροπή Ελέγχου Ακτινοβολίας.", "Η Κεντρική Επιτροπή του Υπουργείου Αμύνης."], "correct": 2, "img": null}, {"chapter": "G", "num": 738, "question": "Πόσων χρονών πρέπει να είναι κανείς τουλάχιστον για να πάρει άδεια λειτουργίας ραδιερασιτεχνικού σταθμού;", "answers": ["12 ετών.", "Ενήλικος και για τις δύο.", "21 για τη κατηγορία 1 και 18 για τη κατηγορία εισαγωγικού επιπέδου.", "Οτιδήποτε από τα παραπάνω."], "correct": 1, "img": null}, {"chapter": "G", "num": 739, "question": "Πού υποβάλλεται η αίτηση για τη συμμετοχή στις εξετάσεις για την απόκτηση πτυχίου;", "answers": ["Στις ∆ιευθύνσεις Μεταφορών και Επικοινωνιών της Περιφέρειας που υπάγεται ο τόπος της μόνιμης κατοικίας του υποψηφίου.", "Στην Κεντρική Υπηρεσία του Υπουργείου Υποδομών, Μεταφορών και ∆ικτύων.", "Στην Υπηρεσία αλλοδαπών.", "Στο ∆ήμο η κοινότητα του υποψηφίου."], "correct": 1, "img": null}, {"chapter": "G", "num": 741, "question": "Σε περίπτωση ανάγκης οι σταθμοί ραδιοερασιτεχνών χρησιμοποιούνται για παροχή ραδιοεπικοινωνιακής συνδρομής από:", "answers": ["Την Αστυνομία.", "Το Εθνικό Κέντρο Άμεσης Βοήθειας.", "Την Πυροσβεστική -Λιμενικό.", "Όποιες από τις αρμόδιες κρατικές υπηρεσίες αυτό ζητηθεί."], "correct": 4, "img": null}, {"chapter": "G", "num": 742, "question": "Σε ποιές από τις παρακάτω περιπτώσεις εκτάκτων αναγκών μπορούν να χρησιμοποιηθούν ραδιοερασιτεχνικοί σταθμοί για να παράσχουν επικοινωνιακή βοήθεια;", "answers": ["Σε θεομηνίες (σεισμοί, πλημμύρες κλπ).", "Εκτάκτως, σε περιπτώσεις που έτερος σταθμός δεν μπορεί να λάβει επαρκώς τα σήματα άλλων σταθμών κατά την διάρκεια διεθνών διαγωνισμών.", "Σε μεγάλα εορταστικά γεγονότα.", "Σε περίπτωση βλάβης του οχήματος του ραδιοερασιτέχνη προκειμένου να ειδοποιήσει την οδική βοήθεια."], "correct": 1, "img": null}, {"chapter": "G", "num": 743, "question": "Η Ελληνική άδεια \"Κατηγορίας 1\" είναι ισοδύναμη-αντίστοιχη:", "answers": ["Με την άδεια CEPT της Σύστασης T/R 61-01.", "Με την άδεια \"NOVICE\".", "Με την άδεια \"ENTRY LEVEL\" που προβλέπεται στο ECC-REPORT-89.", ""], "correct": 1, "img": null}, {"chapter": "G", "num": 745, "question": "Οι \"χώρες CEPT\" είναι χώρες της Ευρώπης και της Αφρικής:", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 2, "img": null}, {"chapter": "G", "num": 746, "question": "Ποιοι αλλοδαποί έχουν δικαίωμα λειτουργίας «φορητών» και «κινητών» ραδιοερασιτεχνικών σταθμών κατά την διάρκεια της προσωρινής παραμονής τους στην Ελλάδα χωρίς να απαιτείται έκδοση Ελληνικής άδειας;", "answers": ["Ραδιοερασιτέχνες που είναι κάτοχοι ισχύουσας ραδιοερασιτεχνικής άδειας της αλλοδαπής γενικά.", "Ραδιοερασιτέχνες που είναι κάτοχοι ισχύουσας ραδιοερασιτεχνικής άδειας της αλλοδαπής που έχει εκδοθεί σύμφωνα με την Σύσταση T/R 61-01 της CEPT και τούτο αναγράφεται επί της αδείας τους.", "Αδειούχοι ραδιοερασιτέχνες που είναι υπήκοοι χώρας η οποία δεν ανήκει στη CEPT αλλά με την οποία υφίσταται ισχύουσα συμφωνία αμοιβαιότητας.", "Οι 2 και 3 απάντησεις."], "correct": 4, "img": null}, {"chapter": "G", "num": 747, "question": "Τα ραδιοερασιτεχνικά πτυχία κατηγορίας \"NOVICE\" χώρας CEPT, θεωρούνται ισοδύναμα με τα ελληνικά πτυχία \"Εισαγωγικού Επιπέδου\" (Entry Level):", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 2, "img": null}, {"chapter": "G", "num": 752, "question": "Με τον όρο \"κατασκευή κεραίας\" νοείται:", "answers": ["Το σύστημα των κεραιών εκπομπής και λήψης ραδιοσημάτων μετά των κατασκευών στήριξής τους, εξαρτημάτων και παρελκομένων.", "Τα παθητικά κάτοπτρα ανάκλασης ραδιοσημάτων.", "Ο φωτισμός ασφαλείας ή/και το αλεξικέραυνο.", "Όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "G", "num": 753, "question": "Ο ραδιοερασιτέχνης υποχρεούται να έχει διαρκώς αναρτημένη κοντά στη βάση της κεραίας του, ευανάγνωστη ανεξίτηλη πινακίδα, στην οποία θα αναγράφονται τα στοιχεία του και το διακριτικό κλήσης του:", "answers": ["Όχι, δεν έχει τέτοια υποχρέωση.", "Ναι, υποχρεούται.", "Υποχρεούται μόνο αν η κεραία είναι εγκατεστημένη σε κοινόχρηστο χώρο πολυκατοικίας.", "Υποχρεούται μόνο αν η κεραία είναι εγκατεστημένη σε περιοχή εκτός αστικών περιοχών."], "correct": 2, "img": null}, {"chapter": "G", "num": 754, "question": "Οι χώρες CEPT είναι χώρες της ∆ιεθνούς Ένωσης Τηλεπικοινωνιών Περιοχή 1 (ITU Region 1):", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 1, "img": null}, {"chapter": "G", "num": 755, "question": "Σε περιπτώσεις παύσης της νόμιμης λειτουργίας του ραδιοερασιτεχνικού σταθμού για οποιονδήποτε λόγο (ανάκληση, παύση ισχύος της άδειας κλπ), τι υποχρεώσεις έχει ο κάτοχος του σταθμού σε σχέση με τις κεραίες του;", "answers": ["Καμία υποχρέωση.", "Οφείλει να \"κατεβάσει\" μόνο τις κατευθυντικές κεραίες του.", "Οφείλει να κατεδαφίζει τις κεραίες του σταθμού του και να τις απομακρύνει από τον χώρο εγκατάστασής τους, εφόσον του ζητηθεί από τους περίοικους.", "Οφείλει αμελλητί να κατεδαφίζει τις κατασκευές κεραίας του σταθμού και να τις απομακρύνει από τον χώρο εγκατάστασής τους, αποκαθιστώντας τυχόν ζημίες ή φθορές."], "correct": 4, "img": null}, {"chapter": "G", "num": 756, "question": "Σε ποια γεωγραφική περιοχή της IΑRU ανήκει η Ελλάδα:", "answers": ["Στην περιοχή 1.", "Στην περιοχή 2.", "Στην περιοχή 3.", "Σε όλες τις περιοχές γιατί είναι χώρα της ΕΕ."], "correct": 1, "img": "SV_Q756.jpg"}, {"chapter": "G", "num": 757, "question": "Σε ποιες περιπτώσεις οι ραδιοερασιτέχνες πρέπει να λειτουργούν τον σταθμό τους έτσι ώστε να μη δημιουργούνται ηλεκτρομαγνητικά πεδία που να υπερβαίνουν τις τιμές έκθεσης του κοινού που ορίζονται στην ΚΥΑ 53571/3839/2000 (ΦΕΚ Β’1105);", "answers": ["Σε κάθε περίπτωση και σε όλες τις θέσεις στο περιβάλλον του σταθμού στις οποίες είναι ελεύθερη και δυνατή η πρόσβαση του γενικού πληθυσμού, σε συνδυασμό και με τα οριζόμενα από τις ισχύουσες νομικές διατάξεις.", "Μόνο όταν η ραδιοερασιτεχνική κεραία είναι εγκατεστημένη σε κοινόχρηστο χώρο πολυκατοικίας. Πρέπει όμως να τηρούνται και οι λοιπές ισχύουσες νομικές διατάξεις.", "Όταν η ραδιοερασιτεχνική κεραία είναι εγκατεστημένη σε χώρο εντός αστικής περιοχής.", "∆εν υπάρχει καμία υποχρέωση αν η ραδιοερασιτεχνική κεραία ευρίσκεται εντός κτήματος ή εν γένει εντός ιδιοκτησίας του ραδιοερασιτέχνη."], "correct": 1, "img": null}, {"chapter": "G", "num": 758, "question": "Τι ονομάζουμε \"σταθμό ραδιοερασιτέχνη\";", "answers": ["Ένας ή περισσότεροι πομποί ή δέκτες συμπεριλαμβανομένων κεραιών και παρελκομένων, σε ορισμένη θέση, που είναι αναγκαίοι για τη διεξαγωγή της υπηρεσίας ραδιοερασιτέχνη.", "Η Υπηρεσία ραδιοεπικοινωνίας που έχει ως σκοπό την αυτοδιδασκαλία, την αλληλοεπικοινωνία, την έρευνα και την τηλεπικοινωνιακή υποστήριξη επιχειρήσεων βοήθειας σε περιπτώσεις εκτάκτων αναγκών.", "Τη μετάδοση, εκπομπή ή λήψη σημάτων γραπτού κειμένου, εικόνων και ήχων κάθε είδους, που πραγματοποιείται με ασύρματα ραδιοηλεκτρικά συστήματα.", "Ο σταθμός που εκπέμπει στα FM τραγούδια και λοιπά ψυχαγωγικά προγράμματα."], "correct": 1, "img": null}, {"chapter": "G", "num": 759, "question": "Τι ονομάζουμε \"υπηρεσία ραδιοερασιτέχνη μέσω δορυφόρου\";", "answers": ["Ο σταθμός που εκπέμπει στα FM τραγούδια και λοιπά ψυχαγωγικά προγράμματα.", "Την τηλεπικοινωνιακή υποστήριξη επιχειρήσεων βοήθειας σε περιπτώσεις εκτάκτων αναγκών μέσω δορυφορικού τηλεφώνου (INMARSAT).", "Τη μετάδοση, εκπομπή ή λήψη σημάτων γραπτού κειμένου, εικόνων και ήχων κάθε είδους, που πραγματοποιείται με ασύρματα ραδιοηλεκτρικά συστήματα.", "Την υπηρεσία ραδιοεπικοινωνίας, που χρησιμοποιεί διαστημικούς σταθμούς σε δορυφόρους τη γης για τους ίδιους σκοπούς όπως η υπηρεσία ραδιοερασιτέχνη."], "correct": 4, "img": null}, {"chapter": "G", "num": 760, "question": "Τι ονομάζουμε \"υπηρεσία ραδιοερασιτέχνη\";", "answers": ["Ο σταθμός που εκπέμπει στα FM τραγούδια και λοιπά ψυχαγωγικά προγράμματα.", "Η Υπηρεσία ραδιοεπικοινωνίας που έχει ως σκοπό την αυτοδιδασκαλία, την αλληλοεπικοινωνία, την έρευνα και την τηλεπικοινωνιακή υποστήριξη επιχειρήσεων βοήθειας σε περιπτώσεις εκτάκτων αναγκών.", "Τη μετάδοση, εκπομπή ή λήψη σημάτων γραπτού κειμένου, εικόνων και ήχων κάθε είδους, που πραγματοποιείται με ασύρματα ραδιοηλεκτρικά συστήματα.", "Ένας ή περισσότεροι πομποί ή δέκτες συμπεριλαμβανομένων κεραιών και παρελκομένων, σε ορισμένη θέση, που είναι αναγκαίοι για τη διεξαγωγή της υπηρεσίας ραδιοερασιτέχνη."], "correct": 2, "img": null}],SY:[{"chapter": "A", "num": 1, "question": "Για ποιο λόγο μια ηλεκτροπληξία από εναλλασσόμενο ρεύμα μπορεί να προκαλέσει τον θάνατο;", "answers": ["Μπορεί να σταματήσει η καρδιά και να μην αντλεί αίμα λόγω του ρεύματος που περνάει μέσα από αυτή.", "Προκαλείται ρεύμα που διαπερνάει τον εγκέφαλο.", "Προκαλείται υπερθέρμανση ζωτικών οργάνων.", "Προκαλείται ηλεκτρόλυση του αίματος."], "correct": 1, "img": null}, {"chapter": "A", "num": 2, "question": "Για ποιο λόγο πρέπει το μεταλλικό σώμα του εξοπλισμού του σταθμού να συνδέεται στην γείωση;", "answers": ["Εμποδίζει το κάψιμο των ασφαλειών σε περίπτωση εσωτερικού βραχυκυκλώματος.", "Παρέχει γείωση αναφοράς τάσης για τα εσωτερικά κυκλώματα.", "Εξασφαλίζει ότι γειώνεται ο ουδέτερος αγωγός.", "Εξασφαλίζει ότι δεν θα εμφανιστούν επικίνδυνες τάσεις στο μεταλλικό σώμα."], "correct": 4, "img": null}, {"chapter": "A", "num": 5, "question": "Η εγκατάσταση κεραίας στην οροφή ενός κτιρίου:", "answers": ["∆εν επηρεάζει την αντικεραυνική προστασία του κτιρίου.", "Ενισχύει την αντικεραυνική προστασία του κτιρίου.", "Απαιτεί επιπλέον αντικεραυνική προστασία.", "Τίποτα από τα παραπάνω."], "correct": 3, "img": null}, {"chapter": "A", "num": 8, "question": "Κατά την εγκατάσταση της κεραίας του, ένας ραδιοερασιτέχνης πρέπει να λαμβάνει υπόψη", "answers": ["Την παρουσία ηλεκτροφόρων καλωδίων.", "Τις αποστάσεις από άλλες εγκατεστημένες κεραίες.", "Την τήρηση των ορίων ασφαλούς έκθεσης του κοινού σε ηλεκτρομαγνητικά πεδία.", "Όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 10, "question": "Με ποιο τρόπο επιδρούν τα ραδιοκύματα στο ανθρώπινο σώμα;", "answers": ["Θερμαίνονται οι ιστοί του σώματος.", "Μπορεί να προκαλέσουν καρκίνο.", "Μπορεί να προκαλέσουν λευχαιμία.", "Ψύχουν τους ιστούς του σώματος."], "correct": 1, "img": null}, {"chapter": "A", "num": 12, "question": "Μέχρι ποια απόσταση από το σημείο πτώσης κεραυνού υπάρχει αυξημένος κίνδυνος για ένα ραδιοερασιτεχνικό σταθμό σε λειτουργία;", "answers": ["Μέχρι 10m.", "Μέχρι 30m.", "Μέχρι 200m.", "∆εν υπάρχει όριο."], "correct": 3, "img": null}, {"chapter": "A", "num": 14, "question": "Οι ραδιοεκπομπές από ποιο είδος ακτινοβολιών αποτελούνται;", "answers": ["Από ιονίζουσες ακτινοβολίες.", "Από μη ιονίζουσες ακτινοβολίες.", "Και τα δύο.", "Τίποτε από αυτά."], "correct": 2, "img": null}, {"chapter": "A", "num": 16, "question": "Ποια από τις ακόλουθες συνθήκες προκαλεί την διακοπή του κυκλώματος των 220 -230 V από το ρελέ ασφαλείας;", "answers": ["Ρεύμα διαρρέει από τον αγωγό της φάσης στον αγωγό της γείωσης.", "Ρεύμα διαρρέει από τον αγωγό της φάσης στον ουδέτερο αγωγό.", "Ανίχνευση υπέρτασης.", ""], "correct": 1, "img": null}, {"chapter": "A", "num": 23, "question": "Ποια μέτρα πρέπει να λαμβάνει ο ραδιοερασιτέχνης για την προστασία του κοινού;", "answers": ["Να εξασφαλίζει τις κεραίες από πτώση σε χώρους πρόσβασης του κοινού.", "Οι ραδιοεκπομπές του να μη υπερβαίνουν τα επιτρεπόμενα όρια για το κοινό.", "Να έχει αντικεραυνική προστασία στις κεραίες, εφόσον υπερέχουν από τον περιβάλλοντα χώρο.", "Όλα τα παραπ  ηλεκτρομαγνητική ακτινοβολία."], "correct": 2, "img": null}, {"chapter": "A", "num": 47, "question": "Ένας \"δέκτης ραδιοφωνίας FM\" μπορεί να λάβει σήματα σε συχνότητες:", "answers": ["Στη ζώνη των FM (87.5-108MHz).", "Στη ζώνη των FM (87.5-108MHz) και χαμηλότερες.", "Στη ζώνη των FM (87.5-108MHz) και υψηλότερες.", "Εξαρτάται από το είδος της διαμόρφωσης."], "correct": 1, "img": null}, {"chapter": "A", "num": 66, "question": "Πώς ονομάζεται η ικανότητα του δέκτη να ξεχωρίζει, από τα πολλά σήματα που φτάνουν στην κεραία του και που διαφέρουν κατά συχνότητα, το σήμα του επιθυμητού σταθμού;", "answers": ["Ευαισθησία.", "Επιλεκτικότητα.", "Πιστότητα.", "Σταθερότητα συχνότητας."], "correct": 2, "img": null}, {"chapter": "A", "num": 67, "question": "Πώς ονομάζεται ο βαθμός της ικανότητας ενός δέκτη να ενισχύει ασθενή ρεύματα που φτάνουν στην κεραία του;", "answers": ["Ευαισθησία.", "Πιστότητα.", "Επιλεκτικότητα.", "Απόδοση."], "correct": 1, "img": null}, {"chapter": "A", "num": 72, "question": "Τα κύρια χαρακτηριστικά ενός δέκτη είναι:", "answers": ["Η επιλεκτικότητα και η ευαισθησία.", "Το κέρδος της κεραίας του και ο σηματοθορυβικός λόγος στην έξοδο.", "Η ικανότητα απόρριψης παρεμβολών και η επιλεκτικότητα.", "Η γραμμικότητα του ενισχυτή και η ευστάθεια του ταλαντωτή."], "correct": 1, "img": null}, {"chapter": "A", "num": 75, "question": "\"Ηλεκτρομαγνητική ακτινοβολία\" είναι το φαινόμενο κατά το οποίο από μια πηγή εκπέμπεται θερμική ενέργεια στο χώρο με τη μορφή ραδιενέργειας.", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 2, "img": null}, {"chapter": "A", "num": 76, "question": "\"Ηλεκτρομαγνητική ακτινοβολία\" είναι το φαινόμενο κατά το οποίο, από μια πηγή, εκπέμπεται ενέργεια στο χώρο με τη μορφή ηλεκτρομαγνητικών κυμάτων. Η ενέργεια μεταφέρεται μέσω του χώρου με τη μορφή ηλεκτρομαγνητικών κυμάτων.", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 1, "img": null}, {"chapter": "A", "num": 81, "question": "Η \"εμβέλεια\" ενός πομπού εξαρτάται:", "answers , "correct": 2, "img": null}, {"chapter": "A", "num": 337, "question": "Τα ηλεκτρομαγνητικά κύματα με συχνότητες 30-300MHz χαρακτηρίζονται:", "answers": ["Βραχέα (HF)", "Υπερβραχέα (VHF)", "Μεσαία (MF)", "Μακρά (LF)"], "correct": 2, "img": null}, {"chapter": "A", "num": 344, "question": "Τι παθαίνει το μήκος κύματος ενός σήματος όταν η συχνότητα του αυξάνεται;", "answers": ["Γίνεται μικρότερο.", "Γίνεται μεγαλύτερο.", "Παραμένει το ίδιο.", ""], "correct": 1, "img": null}, {"chapter": "A", "num": 345, "question": "Τι συμβαίνει όταν δεν υπάρχει προσαρμογή πομπού - γραμμής μεταφοράς - κεραίας σε μια εγκατάσταση σταθμού ασυρμάτου;", "answers": ["∆εν υπάρχει κανένα πρόβλημα.", "Έχουμε απώλεια ισχύος.", "Έχουμε μέγιστη μεταφορά ισχύος.", "Αλλάζει η αντίσταση της κεραίας."], "correct": 2, "img": null}, {"chapter": "A", "num": 355, "question": "Με ποια ταχύτητα διαδίδονται στο χώρο τα ηλεκτρομαγνητικά κύματα;", "answers": ["300 Km / sec", "300.000 Km / sec", "300.000 m / sec", "3.000 Km / sec"], "correct": 2, "img": null}, {"chapter": "A", "num": 374, "question": "Πόση είναι η ολική χωρητικότητα ( total capacitance) σε κύκλωμα πυκνωτών εν παραλλήλω όταν C1 = 100 mF και C2 = 100 mF;", "answers": ["200 mF", "1.15 mF", "50 mF", "2,150 mF"], "correct": 1, "img": null}, {"chapter": "A", "num": 384, "question": "Τι είναι ένα φίλτρο (Filter);", "answers": ["Το κύκλωμα που επιτρέπει να περνά το ρεύμα που έχει τιμή από μια συγκεκριμένη στάθμη ισχύος και πάνω (π.χ. το \"φίλτρο 5 mW\" αφήνει να περνούν ρεύματα μεγαλύτερα των 5 mW, ενώ κόβει τα ασθενέστερα ρεύματα).", "Ένα είδος κυκλώματος εξομάλυνσης.", "Ένα κύκλωμα που επιτρέπει μερικές συχνότητες να περνούν με μικρή απώλεια ενώ περικόπτει άλλες συχνότητες. Συνήθως κατασκευάζονται από μερικά συντονισμένα κυκλώματα.", "Το κύκλωμα που ενισχύει τις ραδιοσυχνότητες και περικόπτει τις ακουστικές συχνότητες. Χρησιμοποιείται στους ταλαντωτές συμβολής (BFO)."], "correct": 3, "img": null}, {"chapter": "A", "num": 388, "question": "Αν τα στάσιμα κύματα σε μια κεραία είναι 2:1, τι ποσοστό της εισερχόμενης ισχύος σε αυτήν επιστρέφει προς τον πομπό;", "answers": ["56 %", "11 %", "7%", "1%"], "correct": 2, "img": null}, {"chapter": "A", "num": 392, "question": "Γιατί είναι σημαντικό να έχουμε μικρό SWR σε ένα κεραιοσύστημα που χρησιμοποιεί ομοαξονικό καλώδιο τροφοδοσίας;", "answers": ["Για να μειωθούν οι παρεμβολές στα τηλεοπτικά σήματα.", "Για την βέλτιστη μεταφορά ισχύος.", "Για να αυξηθεί ο χρόνος ζωής της κεραίας.", "Για να μην αλλάζει πόλωση το σήμα."], "correct": 2, "img": null}, {"chapter": "A", "num": 396, "question": "Εάν η συχνότητα εκπομπής μιας κεραίας είναι 21 MHz τότε το απαιτούμενο μήκος ενός διπόλου είναι περίπου:", "answers": ["9,00 μ", "8,5 μ", "8μ", "7,5 μ"], "correct": 4, "img": null}, {"chapter": "A", "num": 400, "question": "Ισοδύναμη ισοτροπικά ακτινοβολούμενη ισχύς (e.i.r.p.):", "answers": ["Είναι το γινόμενο της ισχύος που εκπέμπεται από την κεραία και της απολαβής της κεραίας ως προς μία ισοτροπική κεραία σε δεδομένη κατεύθυνση (απόλυτη ή ισοτροπική απολαβή).", "Είναι το γινόμενο της ισχύος που εκπέμπει η κεραία και της συχνότητας λειτουργίας του πομπού.", "", ""], "correct": 1, "img": null}, {"chapter": "A", "num": 401, "question": "Μια κεραία μισού μήκους κύματος (λ/2) για τους 28,550 MHz, πόσο περίπου συνολικό μήκος έχει;", "answers": ["5 μ.", "28.550 μ.", "100 μ.", ""], "correct": 1, "img": null}, {"chapter": "A", "num": 402, "question": "Να προσδιορίσετε τον αριθμό των παρασιτικών στοιχείων της στοιχειοκεραίας του σχήματος:", "answers": ["1", "2", "3", "4"], "correct": 4, "img": "SY_Q402.jpg"}, {"chapter": "A", "num": 408, "question": "Ποια είναι η λειτουργία ενός συντονιστή κεραίας (antenna tuner);", "answers": ["Προσαρμόζει την σύνθετη αντίσταση εξόδου του πομποδέκτη με τη σύνθετη αντίσταση εισόδου του κεραιοσυστήματος.", "Βοηθά έναν δέκτη να συντονιστεί αυτόματα στον σταθμό που μας φέρνει το ασθενέστερο σήμα.", "Συνδέει το κεραιοσύστημα με τον πομπό κατά την εκπομπή μας και με τον δέκτη κατά την λήψη.", "Μεταστρέφει έναν πομποδέκτη μεταξύ των διαφορετικών ειδών κεραιών που συνδέονται στην ίδια γραμμή τροφοδοσίας."], "correct": 1, "img": null}, {"chapter": "A", "num": 414, "question": "Ποια τιμή έχει η χαρακτηριστική αντίσταση των συνηθισμένων ομοαξονικών καλωδίων που χρησιμοποιούνται στην υπηρεσία ραδιοερασιτέχνη;", "answers": ["25-75 Ohm", "75 Ohm", "50 Ohm", "25 Ohm"], "correct": 3, "img": null}, {"chapter": "A", "num": 423, "question": "Πόσους \"ανακλαστήρες\" συνήθως έχει μία κατευθυντική κεραία (YAGI);", "answers": ["Κανένα", "Τρεις", "Ένα", ""], "correct": 3, "img": null}, {"chapter": "A", "num": 424, "question": "Πού χρησιμοποιούνται οι μονάδες προσαρμογής κεραιών (tuners or couplers);", "answers": ["Σε περιπτώσεις μόνο συρμάτινων κεραιών.", "Σε περιπτώσεις γραμμών μεταφοράς με χαρακτηριστική αντίσταση διαφορετική από 50 Ohm.", "Σε περιπτώσεις που υπάρχουν υψηλά στάσιμα κύματα ανάμεσα στην κεραία και τη γραμμή μεταφοράς.", "Σε κάθε περίπτωση."], "correct": 3, "img": null}, {"chapter": "A", "num": 433, "question": "Σε τι διαφέρει ένας προσαρμογέας αντίστασης (balun) από ένα προσαρμογέα κεραίας (tuner);", "answers": ["Στην χαρακτηριστική αντίσταση.", "Στην ισχύ RF που αντέχουν.", "Ο προσαρμογέας αντίστασης έχει σταθερή τιμή αντίστασης ενώ ο προσαρμογέας κεραίας έχει μεταβαλλόμενη (αυτόματα ή χειροκίνητα) τιμή.", "∆εν διαφέρουν."], "correct": 3, "img": null}, {"chapter": "A", "num": 436, "question": "Τα στάσιμα κύματα σε μια γραμμή μεταφοράς δημιουργούνται όταν έχουμε:", "answers": ["Προσαρμοσμένη γραμμή μεταφοράς.", "Μη προσαρμοσμένη γραμμή μεταφοράς.", "Λειτουργία σε χαμηλές συχνότητες.", "Λειτουργία σε υψηλές συχνότητες."], "correct": 2, "img": null}, {"chapter": "A", "num": 438, "question": "Τι θα συμβεί αν μεγαλώσουμε το μήκος του βραχίονα και προσθέσουμε κατευθυντήρες σε μια κεραία Yagi;", "answers": ["Αυξάνεται το κέρδος.", "Αυξάνεται το SWR.", "∆ημιουργούνται πρόσθετοι πλευρικοί λοβοί ακτινοβολίας.", "Μειώνεται το κέρδος."], "correct": 1, "img": null}, {"chapter": "A", "num": 439, "question": "Τι θα συνδέσετε στον πομποδέκτη σας εάν θα θέλατε να τον μεταστρέφετε σε διάφορες κεραίες (εναλλακτική σύνδεση του πομποδέκτη με διάφορες κεραίες);", "answers": ["Ένα διακόπτη τερματικών-κόμβων (terminal-node switch).", "Ένα μεταγωγικό διακόπτη κεραιών.", "Ένα πολυφασικό διακόπτη.", "Ένα υψιπερατό φίλτρο συνδεδεμένο με «μαχαιρωτό» διακόπτη."], "correct": 2, "img": null}, {"chapter": "A", "num": 440, "question": "Τι θα χρησιμοποιούσατε για να συνδέσετε μια κεραία διπλής μπάντας (dual-band) με έναν κινητό πομποδέκτη που έχει ξεχωριστές εξόδους VHF και UHF;", "answers": ["Ένα μετρητή SWR με δύο δείκτες.", "Ένα τηλεφωνικό προσαρμογέα διπλής ενέργειας.", "∆ίδυμο υψιπερατό φίλτρο.", "Ένα δυπλέκτη (duplexer)."], "correct": 4, "img": null}, {"chapter": "A", "num": 443, "question": "Τι μπορεί να συμβεί όταν δεν έχουμε εξασφαλίσει σωστή προσαρμογή σύνδεσης της κεραίας μας με τον πομπό;", "answers": ["Μπορεί να καταστραφεί η κεραία μας.", "Μπορεί να προξενηθεί ζημιά στον πομπό.", "Μπορεί να υπερθερμανθεί το τροφοδοτικό του σταθμού μας και ακόμα να προκληθεί βραχυκύκλωμα στο δίκτυο της ∆ΕΗ.", "Το εκπεμπόμενο σήμα μας θα έχει μεγάλη παραμόρφωση."], "correct": 2, "img": null}, {"chapter": "A", "num": 445, "question": "Τι συμβαίνει όταν διοχετεύεται RF ενέργεια σε μη προσαρμοσμένη γραμμή μεταφοράς (mismatched transmission line);", "answers": ["Τίποτα το αξιόλογο.", "Όλη η RF ενέργεια μετατρέπεται σε θερμική ενέργεια.", "Όλη η RF ενέργεια ανακλάται στην \"mismatched transmission line\" και επιστρέφει πίσω.", "∆ημιουργούνται στάσιμα κύματα, (standing waves) αποτέλεσμα των οποίων είναι η απώλεια ενέργειας ή η εκπομπή της στον περιβάλλοντα χώρο της γραμμής μεταφοράς."], "correct": 4, "img": null}, {"chapter": "A", "num": 446, "question": "Τι συνδέει τον VHF πομποδέκτη σας με την κεραία σας;", "answers": ["Ένα «εικονικό» φορτίο (dummy load).", "Ένα καλώδιο γείωσης.", "Ένα καλώδιο ηλεκτρικής παροχής.", "Ένα ομοαξονικό καλώδιο τροφοδοσίας (feed line)."], "correct": 4, "img": null}, {"chapter": "A", "num": 448, "question": "Τι τύπος κεραίας εμφανίζεται στο σχήμα;", "answers": ["∆ίπολο.", "Παντοκατευθυντική κεραία.", "Yagi.", "Κλειστού βρόγχου."], "correct": 3, "img": "SY_Q448.jpg"}, {"chapter": "A", "num": 451, "question": "Αν η γέφυρα στασίμων κυμάτων δείχνει σε μια κεραία 3:1 και η ισχύς εξόδου του πομπού 100 W πόση είναι η ένδειξη της επιστρεφόμενης ισχύος από την κεραία στον πομπό;", "answers": ["50 W", "25 W", "10 W", "5W"], "correct": 2, "img": null}, {"chapter": "A", "num": 455, "question": "Για τη μέτρηση της τάσης μιας αντίστασης το πολύμετρο πρέπει να συνδεθεί στο κύκλωμα:", "answers": ["Σε σειρά.", "Παράλληλα.", "Εξαρτάται από το κύκλωμα.", "∆εν έχει σημασία ο τρόπος σύνδεσης."], "correct": 2, "img": null}, {"chapter": "A", "num": 465, "question": "Η μέγιστη επιτρεπόμενη ισχύς ανά ραδιοερασιτεχνική κατηγορία και συχνότητα σε τι μονάδες αναφέρεται στον \"Κανονισμό Ραδιοερασιτεχνών\";", "answers": ["Σε Watt μέσης ισχύος εξόδου του πομπού.", "Σε Watt ισχύος AC του τροφοδοτικού του πομπού.", "Σε Watt ισχύος εξόδου του πομπού σε συνεχή εκπομπή με το χειριστήριο μόνιμα πατημένο (key down).", "Σε Watt ισχύος εξόδου κορυφής του πομπού."], "correct": 4, "img": null}, {"chapter": "A", "num": 466, "question": "Η μέτρηση ακτινοβολίας μιας κεραίας τύπου \"διπόλου\" μπορεί να γίνει:", "answers": ["Με χρήση ψηφιακού πολύμετρου και ανεξάρτητα από το ηλεκτρομαγνητικό περιβάλλον λειτουργίας της κεραίας.", "Σε υπαίθριο χώρο και μακριά από άλλες πηγές ηλεκτρομαγνητικών κυμάτων.", "", ""], "correct": 2, "img": null}, {"chapter": "A", "num": 470, "question": "Με ποιο όργανο μετρήσεων μπορούμε να μετρήσουμε τάσεις και αντιστάσεις;", "answers": ["Με βολτόμετρο.", "Με γέφυρα στασίμων κυμάτων.", "Με πολύμετρο.", "Με παλμογράφο."], "correct": 3, "img": null}, {"chapter": "A", "num": 472, "question": "Μια γέφυρα στασίμων κυμάτων για συχνότητες VHF σε ποιες άλλες συχνότητες μετρά σωστά;", "answers": ["Στα HF", "Στα UHF", "Στα HF ως τα UHF", "Σε καμία από αυτές"], "correct": 4, "img": null}, {"chapter": "A", "num": 477, "question": "Όταν μετράμε με μια γέφυρα στασίμων την κεραία εκπομπής τι αλλάζει στα ηλεκτρικά χαρακτηριστικά της κεραίας;", "answers": ["Τα στάσιμα κύματα της κεραίας.", "Το κέρδος της κεραίας.", "Η συχνότητα συντονισμού της κεραίας.", "∆εν αλλάζει τίποτε στην κεραία."], "correct": 4, "img": null}, {"chapter": "A", "num": 481, "question": "Πως μετράται η ισχύς εξόδου κορυφής ενός πομπού HF;", "answers": ["Με ένα παλμογράφο.", "Με ένα βαττόμετρο δικτύου 50 ΗΖ.", "Με ένα ειδικό βαττόμετρο ισχύος κορυφής 2-30 MHz.", "Με μία γέφυρα στασίμων κυμάτων."], "correct": 3, "img": null}, {"chapter": "A", "num": 484, "question": "Πώς μετράμε την τιμή μιας αντίστασης άνθρακα;", "answers": ["Με πολύμετρο", "Με παλμογράφο", "Με συχνόμετρο", "Με γέφυρα στασίμων κυμάτων"], "correct": 1, "img": null}, {"chapter": "A", "num": 494, "question": "Τι μετρά η γέφυρα στασίμων κυμάτων;", "answers": ["Την τάση του τροφοδοτικού.", "Την ανακλώμενη ισχύ στην κεραία λήψης.", "Το λόγο στασίμων κυμάτων.", "Το λόγο της ισχύος εξόδου προς την ανακλώμενη ισχύ."], "correct": 3, "img": null}, {"chapter": "A", "num": 500, "question": "Αν κάνουμε παρεμβολές στην τηλεόραση του γείτονα και έχουμε τοποθετήσει φίλτρο εξασθένισης αρμονικών στον πομπό, τι επιπλέον μέτρα μπορούμε να λάβουμε;", "answers": ["Να σταματήσουμε τις εκπομπές.", "Να τοποθετήσουμε υψιπερατό (high pass) φίλτρο στην τηλεόραση, που να αποκόπτει τις συχνότητες εκπομπής.", "Να γειώσουμε την κεραία του σταθμού.", "Να γειώσουμε την κεραία της τηλεόρασης."], "correct": 2, "img": null}, {"chapter": "A", "num": 501, "question": "Αν ο ραδιοερασιτεχνικός σταθμός εκπέμπει ισχυρές αρμονικές, τι μέτρα πρέπει να λάβουμε ώστε να αποφύγουμε παρεμβολές στην τηλεόραση του γείτονα:", "answers": ["Να σταματήσουμε τις εκπομπές.", "Να γειώσουμε την κεραία εκπομπής.", "Να τοποθετήσουμε φίλτρο εξασθένισης αρμονικών στον πομπό.", "Να τοποθετήσουμε φίλτρο καταπίεσης αρμονικών στην τηλεόραση του γείτονα."], "correct": 3, "img": null}, {"chapter": "A", "num": 503, "question": "Αν στη διάρκεια της εκπομπής μας ακούει ο γείτονας στο ενσύρματο τηλέφωνό του Ποιό πρώτο μέτρο μπορούμε να λάβουμε;", "answers": ["Να του δώσουμε ένα άλλο τηλέφωνο.", "Να μειώσουμε την ισχύ εξόδου στο 20%.", "Να τοποθετήσουμε ένα φίλτρο γραμμής 600 Ohm στο τηλέφωνο του.", "Να γειώσουμε τον πομπό."], "correct": 3, "img": null}, {"chapter": "A", "num": 513, "question": "Ποια είναι τα αίτια παρεμβολών από ένα ραδιοερασιτεχνικό σταθμό σε οικιακές ηλεκτρονικές συσκευές;", "answers": ["Ένταση ηλεκτρομαγνητικού πεδίου από το σταθμό στην οικιακή συσκευή μεγαλύτερη από το προδιαγραφόμενο όριο αντοχής της.", "Οι ανεπιθύμητες αρμονικές και παρασιτικές εκπομπές του σταθμού.", "Η μεγάλη γειτνίαση σταθμού και συσκευής.", "Όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 514, "question": "Ποια είναι τα βασικά μέτρα για την πρόληψη ή και εξάλειψη των παρεμβολών σε μία συσκευή;", "answers": ["Η αποσύζευξη της συσκευής από τον πομπό.", "Το φιλτράρισμα των γραμμών εισόδου και εξόδου της συσκευής.", "Η καλύτερη θωράκιση της συσκευής.", "Όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "A", "num": 515, "question": "Ποια ηλεκτρονικά καταναλωτικά μηχανήματα είναι ποιό ανθεκτικά σε παρεμβολές;", "answers": ["Τα βιομηχανικού τύπου χωρίς πιστοποίηση της Ευρ. Ένωσης.", "Όσα έχουν κατασκευασθεί παλαιότερα.", "Όσα περιέχουν ημιαγωγούς.", "Όσα έχουν πιστοποίηση για αντοχή σε παρεμβολές (EMC) από την Έυρ. Ένωση."], "correct": 4, "img": null}, {"chapter": "A", "num": 516, "question": "Ποια μέτρα λαμβάνουμε για την προστασία του δέκτη μας από παρεμβολές γειτονικής ζώνης συχνοτήτων;", "answers": ["Χαμηλώνουμε την ένταση ακουστικών συχνοτήτων (volume).", "Αυξάνουμε την ευαισθησία του δέκτη μας.", "Χρησιμοποιούμε κατάλληλα ζωνοπερατά φίλτρα.", ""], "correct": 3, "img": null}, {"chapter": "A", "num": 517, "question": "Ποιο είδος διαμόρφωσης είναι ανθεκτικότερο στις παρεμβολές;", "answers": ["Η διαμόρφωση ΑΜ.", "Η διαμόρφωση FM.", "Η ανθεκτικότητα στις παρεμβολές, εξαρτάται από την απόσταση μεταξύ της πηγής παρεμβολών και του δέκτη μας.", "Η διαμόρφωση FM παρουσιάζει την ίδια ακριβώς ανθεκτικότητα στις παρεμβολές σε σχέση με την διαμόρφωση AM."], "correct": 2, "img": null}, {"chapter": "G", "num": 534, "question": "Τι είναι η «Ηλεκτρομαγνητική συμβατότητα» ;", "answers": ["Ο θόρυβος ηλεκτρομαγνητικής προέλευσης ή το ανεπιθύμητο σήμα που δημιουργεί προβλήματα λειτουργίας σε ηλεκτρικές ή ηλεκτρονικές συσκευές.", "Η ικανότητα του εξοπλισμού να λειτουργεί ικανοποιητικά στο ηλεκτρομαγνητικό (Η/Μ) του περιβάλλον, χωρίς να προκαλεί απαράδεκτες Η/Μ διαταραχές σε άλλο εξοπλισμό που ευρίσκεται στο περιβάλλον αυτό.", "Η ατρωσία μιας (ηλεκτρονικής ή ηλεκτρικής) διάταξης, συσκευής ή συστήματος έναντι ηλεκτρομαγνητικών διαταραχών.", "Η ηλεκτρομαγνητική συμπεριφορά μια ηλεκτρονικής συσκευής."], "correct": 2, "img": null}, {"chapter": "A", "num": 535, "question": "Τι πρέπει πρώτιστα να κάνουμε αν η εκπομπή του σταθμού επηρεάζει τη λειτουργία του τροφοδοτικού του;", "answers": ["Να γειώσουμε το πομπό.", "Να φιλτράρουμε με φερρίτες τη γραμμή 220V του τροφοδοτικού.", "Να μειώσουμε με χαμηλοπερατό (lowpass) φίλτρο τις αρμονικές του πομπού.", "Να φιλτράρουμε με φερρίτες ή και χαμηλοπερατό φίλτρο τη γραμμή συνεχούς ρεύματος από το τροφοδοτικό κοντά στον πομπό."], "correct": 4, "img": null}, {"chapter": "A", "num": 539, "question": "Εάν ο κινητός πομποδέκτης σας λειτουργεί στο αυτοκίνητό σας αλλά όχι στο σπίτι σας, τι θα έπρεπε να ελέγξετε πρώτα;", "answers": ["Την παροχή ηλεκτρικού ρεύματος (τροφοδοσία).", "Το μεγάφωνο.", "Το μικρόφωνο.", "Την κεραία σας με μετρητή στασίμων κυμάτων (SWR)."], "correct": 1, "img": null}, {"chapter": "A", "num": 544, "question": "Η ισχύς εκπομπής ενός πομπού αυξάνει :", "answers": ["Όσο μεγαλώνει η συχνότητα λειτουργίας του πομπού.", "Όταν ο πομπός λειτουργεί \"στα FM\".", "Όσο αυξάνουμε 2, "img": null}, {"chapter": "G", "num": 721, "question": "Η λήξη ισχύος της άδειας λειτουργίας ραδιοερασιτεχνικού σταθμού, τι συνέπειες έχει για τον κάτοχο της;", "answers": ["Με τη λήξη ισχύος της ραδιοερασιτεχνικής άδειας αίρονται όλα τα δικαιώματα άσκησης ραδιοερασιτεχνικών δραστηριοτήτων εκτός από την χρησιμοποίηση ραδιοερασιτεχνικών αναμεταδοτών.", "Με τη λήξη ισχύος της ραδιοερασιτεχνικής άδειας αίρεται αυτομάτως κάθε δικαίωμα άσκησης ραδιοερασιτεχνικών δραστηριοτήτων, συμπεριλαμβανόμενων και των δικαιωμάτων εγκατάστασης κεραίας ραδιοερασιτεχνικού σταθμού.", "Ο ραδιοερασιτέχνης πρέπει να ζητήσει την σφράγιση των πομποδεκτών του από την αρμόδια υπηρεσία της Περιφέρειας.", "Με τη λήξη ισχύος της ραδιοερασιτεχνικής άδειας, ο κάτοχος της πρέπει να μεριμνήσει για την ακύρωση του πτυχίου του."], "correct": 2, "img": null}, {"chapter": "G", "num": 722, "question": "Η χρήση ψευδών διακριτικών κλήσης ή ψευδών και ανεξακρίβωτων ειδήσεων επιτρέπεται:", "answers": ["Την πρωταπριλιά για εθιμικούς λόγους.", "Σε περιπτώσεις ειδικών μυστικών ανταποκρίσεων.", "Ποτέ.", "Για λόγους εθνικής ασφάλειας."], "correct": 3, "img": null}, {"chapter": "G", "num": 723, "question": "Ο ερασιτέχνης απαγορεύει τη χρήση του σταθμού του:", "answers": ["Στους ανηλίκους.", "Στους συνοικούντες και συγγενείς του.", "Σε οποιονδήποτε που δεν διαθέτει τα νόμιμα προσόντα και όταν δεν είναι παρών ο ίδιος.", "Σε αλλοδαπούς."], "correct": 3, "img": null}, {"chapter": "G", "num": 724, "question": "Ο ερασιτέχνης τηρεί ημερολόγιο λειτουργίας του σταθμού όπου αναγράφει:", "answers": ["Την ημερομηνία, ώρα, διάρκεια της ανταπόκρισης.", "Το διακριτικό κλήσης του σταθμού, την ισχύ και τη συχνότητα λειτουργίας.", "Τον τύπο εκπομπής και τον τόπο εγκατάστασης του σταθμού.", "όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "G", "num": 725, "question": "Οι άδειες λειτουργίας ερασιτεχνικού σταθμού έχουν διάρκεια:", "answers": ["30 ετών", "ισόβιες", "3 ετών", "10 ετών"], "correct": 4, "img": null}, {"chapter": "G", "num": 726, "question": "Οι ραδιοερασιτέχνες κάτοχοι άδειας «Κατηγορίας Εισαγωγικού Επιπέδου», δεν επιτρέπεται να εγκαθιστούν κεραίες με μέγιστο κέρδος μεγαλύτερο των τριών (3) dbi:", "answers": ["Σωστό.", "Λάθος.", "Επιτρέπεται μόνο εφόσον η κεραία είναι Yagi.", ""], "correct": 1, "img": null}, {"chapter": "G", "num": 727, "question": "Οριστική ανάκληση η αναστολή της άδειας λειτουργίας αναλόγως της βαρύτητας της παράβασης γίνεται:", "answers": ["Όταν ο ερασιτεχνικός σταθμός χρησιμοποιείται για εμπορικούς σκοπούς η διαφημίσεις.", "Όταν ο αδειούχος είναι υπαίτιος παρεμβολής ή επιζήμιας παρεμβολής.", "Όταν ο αδειούχος εκπέμπει μουσική η φωνητικά προγράμματα με η χωρίς αμοιβή.", "Για οτιδήποτε από τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "G", "num": 728, "question": "Ποια είναι η αρμόδια Αρχή για τα θέματα ραδιοεξοπλισμού (δηλαδή για την εφαρμογή του Π.∆. 44/2002 περί του ραδιοεξοπλισμού και τηλεπικοινωνιακού τερματικού εξοπλισμού κλπ);", "answers": ["Ο Συνήγορος του Πολίτη.", "Η Εθνική Επιτροπή Τηλεπικοινωνιών και Ταχυδρομείων (ΕΕΤΤ).", "Οι υπηρεσίες Μεταφορών και Επικοινωνιών των Περιφερειών.", "Η Αρχή ∆ιασφάλισης Απορρήτου των Επικοινωνιών (Α∆ΑΕ)."], "correct": 2, "img": null}, {"chapter": "G", "num": 729, "question": "Ποια είναι η διάρκεια ισχύος των ραδιοερασιτεχνικών αδειών;", "answers": ["Πέντε έτη.", "∆έκα έτη.", "∆εν υπάρχει λήξη ισχύος.", ""], "correct": 2, "img": null}, {"chapter": "G", "num": 731, "question": "Ποιοι από τους παρακάτω φορείς έχουν δικαίωμα να λάβουν άδεια;", "answers": ["Η Εθνική Επιτροπή Τηλεπικοινωνιών και Ταχυδρομείων.", "Η Γενική Γραμματεία Πολιτικής Προστασίας.", "Τα τμήματα των τριτοβάθμιων εκπαιδευτικών ιδρυμάτων με αντικείμενο τις ασύρματες επικοινωνίες.", "Οποιοσδήποτε από τους παραπάνω."], "correct": 4, "img": null}, {"chapter": "G", "num": 733, "question": "Ποιος από τους παρακάτω δεν έχει δικαίωμα να λειτουργεί σταθμό ραδιοερασιτέχνη;", "answers": ["Αυτός που του έχει αφαιρεθεί οριστικά η άδεια.", "Πρόσωπα άνω των 65 ετών.", "Τα μη κερδοσκοπικά σωματεία και σύλλογοι ραδιοερασιτεχνών.", "Η Γενική Γραμματεία Πολιτικής Προστασίας."], "correct": 1, "img": null}, {"chapter": "G", "num": 734, "question": "Ποιος δημόσιος φορέας είναι αρμόδιος για την προφύλαξη του κοινού από ηλεκτρομαγνητικά πεδία;", "answers": ["Η Εθνική Επιτροπή Επικοινωνιών και Ταχυδρομείων (ΕΕΤΤ).", "Η Αρμόδια Περιφερειακή Υπηρεσία (ΑΠΥ).", "Η Εθνική Επιτροπή Ατομικής Ενέργειας (ΕΕΑΕ).", "Το Υπουργείο Υποδομών Μεταφορών και ∆ικτύων (ΥΥΜ∆)."], "correct": 3, "img": null}, {"chapter": "G", "num": 736, "question": "Ποιος έχει δικαίωμα να λειτουργεί ραδιοερασιτεχνικό σταθμό;", "answers": ["Όποιος έχει νόμιμη άδεια άσκησης επαγγέλματος ραδιοηλεκτρολόγου.", "Οι επαγγελματίες ραδιοτηλεγραφητές.", "Όποιος έχει λάβει άδεια από τον ιδιοκτήτη του σταθμού.", "Ο κάτοχος σχετικής άδειας ραδιοερασιτέχνη."], "correct": 4, "img": null}, {"chapter": "G", "num": 738, "question": "Πόσων χρονών πρέπει να είναι κανείς τουλάχιστον για να πάρει άδεια λειτουργίας ραδιερασιτεχνικού σταθμού;", "answers": ["12 ετών.", "Ενήλικος και για τις δύο.", "21 για τη κατηγορία 1 και 18 για τη κατηγορία εισαγωγικού επιπέδου.", "Οτιδήποτε από τα παραπάνω."], "correct": 1, "img": null}, {"chapter": "G", "num": 739, "question": "Πού υποβάλλεται η αίτηση για τη συμμετοχή στις εξετάσεις για την απόκτηση πτυχίου;", "answers": ["Στις ∆ιευθύνσεις Μεταφορών και Επικοινωνιών της Περιφέρειας που υπάγεται ο τόπος της μόνιμης κατοικίας του υποψηφίου.", "Στην Κεντρική Υπηρεσία του Υπουργείου Υποδομών, Μεταφορών και ∆ικτύων.", "Στην Υπηρεσία αλλοδαπών.", "Στο ∆ήμο η κοινότητα του υποψηφίου."], "correct": 1, "img": null}, {"chapter": "G", "num": 740, "question": "Προβλέπεται ανανέωση των ραδιοερασιτεχνικών αδειών ;", "answers": ["Όχι. Οι άδειες εκδίδονται μόνο για μια δεκαετία και δεν ανανεώνονται περαιτέρω.", "Όχι. Οι άδειες δεν έχουν ημερομηνία λήξης και συνεπώς δεν χρειάζεται να ανανεώνονται.", "Ναι, οι άδειες ανανεώνονται αρκεί ο ραδιοερασιτέχνης να έχει πραγματοποιήσει μεγάλο αριθμό επαφών (τουλάχιστον 100) και να έχουν καταγραφεί αυτές οι επαφές στο ημερολόγιο του σταθμού.", "Με αίτηση του ενδιαφερομένου, η άδεια ανανεώνεται κάθε φορά για νέα περίοδο δέκα ετών."], "correct": 4, "img": null}, {"chapter": "G", "num": 741, "question": "Σε περίπτωση ανάγκης οι σταθμοί ραδιοερασιτεχνών χρησιμοποιούνται για παροχή ραδιοεπικοινωνιακής συνδρομής από:", "answers": ["Την Αστυνομία.", "Το Εθνικό Κέντρο Άμεσης Βοήθειας.", "Την Πυροσβεστική -Λιμενικό.", "Όποιες από τις αρμόδιες κρατικές υπηρεσίες αυτό ζητηθεί."], "correct": 4, "img": null}, {"chapter": "G", "num": 742, "question": "Σε ποιές από τις παρακάτω περιπτώσεις εκτάκτων αναγκών μπορούν να χρησιμοποιηθούν ραδιοερασιτεχνικοί σταθμοί για να παράσχουν επικοινωνιακή βοήθεια;", "answers": ["Σε θεομηνίες (σεισμοί, πλημμύρες κλπ).", "Εκτάκτως, σε περιπτώσεις που έτερος σταθμός δεν μπορεί να λάβει επαρκώς τα σήματα άλλων σταθμών κατά την διάρκεια διεθνών διαγωνισμών.", "Σε μεγάλα εορταστικά γεγονότα.", "Σε περίπτωση βλάβης του οχήματος του ραδιοερασιτέχνη προκειμένου να ειδοποιήσει την οδική βοήθεια."], "correct": 1, "img": null}, {"chapter": "G", "num": 743, "question": "Η Ελληνική άδεια \"Κατηγορίας 1\" είναι ισοδύναμη-αντίστοιχη:", "answers": ["Με την άδεια CEPT της Σύστασης T/R 61-01.", "Με την άδεια \"NOVICE\".", "Με την άδεια \"ENTRY LEVEL\" που προβλέπεται στο ECC-REPORT-89.", ""], "correct": 1, "img": null}, {"chapter": "G", "num": 744, "question": "Με την Ελληνική άδεια \"Κατηγορίας 1\", δικαιούται ο ραδιοερασιτέχνης να λειτουργήσει τον ραδιοερασιτεχνικό του σταθμό σε οποιαδήποτε άλλη χώρα που έχει αποδεχτεί την Σύσταση T/R 61-01 της CEPT;", "answers": ["Ναι, αλλά για χρονικό διάστημα μέχρι 12 μήνες χωρίς να έχει καμία επιπλέον υποχρέωση. Μετά το πέρας των 12 μηνών πρέπει να εκδοθεί ειδική άδεια.", "Ναι, αλλά για περιορισμένο χρονικό διάστημα και εφόσον τηρεί τυχόν ιδιαίτερους κανόνες που υπάρχουν στην υπόψη χώρα.", "Ναι, για όσο χρονικό διάστημα επιθυμεί ο ραδιοερασιτέχνης, χωρίς να έχει καμία επιπλέον υποχρέωση.", "Όχι, παρά μόνο κατόπιν ειδικής γραπτής βεβαίωσης από τις αρμόδιες Αρχές της υπόψη χώρας."], "correct": 2, "img": null}, {"chapter": "G", "num": 745, "question": "Οι \"χώρες CEPT\" είναι χώρες της Ευρώπης και της Αφρικής:", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 2, "img": null}, {"chapter": "G", "num": 747, "question": "Τα ραδιοερασιτεχνικά πτυχία κατηγορίας \"NOVICE\" χώρας CEPT, θεωρούνται ισοδύναμα με τα ελληνικά πτυχία \"Εισαγωγικού Επιπέδου\" (Entry Level):", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 2, "img": null}, {"chapter": "G", "num": 748, "question": "Επιτρέπεται δύο φίλοι ραδιοερασιτέχνες να επικοινωνούν στην συχνότητα 147 ΜΗz;", "answers": ["Απαγορεύεται.", "Επιτρέπεται.", "Επιτρέπεται μόνο για σύντομο χρονικό διάστημα.", ""], "correct": 1, "img": null}, {"chapter": "G", "num": 749, "question": "Επιτρέπεται δύο φίλοι ραδιοερασιτέχνες να επικοινωνούν στην συχνότητα 429 ΜΗz;", "answers": ["∆εν υπάρχει κανένα πρόβλημα.", "Επιτρέπεται σε καταστάσεις έκτακτης ανάγκης.", "Απαγορεύεται.", ""], "correct": 3, "img": null}, {"chapter": "G", "num": 750, "question": "Επιτρέπεται ένας ραδιοερασιτέχνης με άδεια \"Εισαγωγικού Επιπέδου\" να εκπέμπει στην υποζώνη συχνοτήτων 7,0 - 7,1 MHz;", "answers": ["Ναι, αλλά μέχρι 1 Watt.", "Ναι, αλλά με μέγιστη επιτρεπόμενη ισχύ κορυφής (PEP) εξόδου πομπού 10 Watt", "Όχι απαγορεύεται.", ""], "correct": 3, "img": null}, {"chapter": "G", "num": 751, "question": "Επιτρέπεται οι ραδιοερασιτέχνες να επικοινωνούν στην συχνότητα 792 ΜΗz;", "answers": ["Απαγορεύεται.", "Επιτρέπεται.", "", ""], "correct": 1, "img": null}, {"chapter": "G", "num": 753, "question": "Ο ραδιοερασιτέχνης υποχρεούται να έχει διαρκώς αναρτημένη κοντά στη βάση της κεραίας του, ευανάγνωστη ανεξίτηλη πινακίδα, στην οποία θα αναγράφονται τα στοιχεία του και το διακριτικό κλήσης του:", "answers": ["Όχι, δεν έχει τέτοια υποχρέωση.", "Ναι, υποχρεούται.", "Υποχρεούται μόνο αν η κεραία είναι εγκατεστημένη σε κοινόχρηστο χώρο πολυκατοικίας.", "Υποχρεούται μόνο αν η κεραία είναι εγκατεστημένη σε περιοχή εκτός αστικών περιοχών."], "correct": 2, "img": null}, {"chapter": "G", "num": 754, "question": "Οι χώρες CEPT είναι χώρες της ∆ιεθνούς Ένωσης Τηλεπικοινωνιών Περιοχή 1 (ITU Region 1):", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 1, "img": null}, {"chapter": "G", "num": 755, "question": "Σε περιπτώσεις παύσης της νόμιμης λειτουργίας του ραδιοερασιτεχνικού σταθμού για οποιονδήποτε λόγο (ανάκληση, παύση ισχύος της άδειας κλπ), τι υποχρεώσεις έχει ο κάτοχος του σταθμού σε σχέση με τις κεραίες του;", "answers": ["Καμία υποχρέωση.", "Οφείλει να \"κατεβάσει\" μόνο τις κατευθυντικές κεραίες του.", "Οφείλει να κατεδαφίζει τις κεραίες του σταθμού του και να τις απομακρύνει από τον χώρο εγκατάστασής τους, εφόσον του ζητηθεί από τους περίοικους.", "Οφείλει αμελλητί να κατεδαφίζει τις κατασκευές κεραίας του σταθμού και να τις απομακρύνει από τον χώρο εγκατάστασής τους, αποκαθιστώντας τυχόν ζημίες ή φθορές."], "correct": 4, "img": null}, {"chapter": "G", "num": 756, "question": "Σε ποια γεωγραφική περιοχή της IΑRU ανήκει η Ελλάδα:", "answers": ["Στην περιοχή 1.", "Στην περιοχή 2.", "Στην περιοχή 3.", "Σε όλες τις περιοχές γιατί είναι χώρα της ΕΕ."], "correct": 1, "img": "SY_Q756.jpg"}, {"chapter": "G", "num": 758, "question": "Τι ονομάζουμε \"σταθμό ραδιοερασιτέχνη\";", "answers": ["Ένας ή περισσότεροι πομποί ή δέκτες συμπεριλαμβανομένων κεραιών και παρελκομένων, σε ορισμένη θέση, που είναι αναγκαίοι για τη διεξαγωγή της υπηρεσίας ραδιοερασιτέχνη.", "Η Υπηρεσία ραδιοεπικοινωνίας που έχει ως σκοπό την αυτοδιδασκαλία, την αλληλοεπικοινωνία, την έρευνα και την τηλεπικοινωνιακή υποστήριξη επιχειρήσεων βοήθειας σε περιπτώσεις εκτάκτων αναγκών.", "Τη μετάδοση, εκπομπή ή λήψη σημάτων γραπτού κειμένου, εικόνων και ήχων κάθε είδους, που πραγματοποιείται με ασύρματα ραδιοηλεκτρικά συστήματα.", "Ο σταθμός που εκπέμπει στα FM τραγούδια και λοιπά ψυχαγωγικά προγράμματα."], "correct": 1, "img": null}, {"chapter": "G", "num": 760, "question": "Τι ονομάζουμε \"υπηρεσία ραδιοερασιτέχνη\";", "answers": ["Ο σταθμός που εκπέμπει στα FM τραγούδια και λοιπά ψυχαγωγικά προγράμματα.", "Η Υπηρεσία ραδιοεπικοινωνίας που έχει ως σκοπό την αυτοδιδασκαλία, την αλληλοεπικοινωνία, την έρευνα και την τηλεπικοινωνιακή υποστήριξη επιχειρήσεων βοήθειας σε περιπτώσεις εκτάκτων αναγκών.", "Τη μετάδοση, εκπομπή ή λήψη σημάτων γραπτού κειμένου, εικόνων και ήχων κάθε είδους, που πραγματοποιείται με ασύρματα ραδιοηλεκτρικά συστήματα.", "Ένας ή περισσότεροι πομποί ή δέκτες συμπεριλαμβανομένων κεραιών και παρελκομένων, σε ορισμένη θέση, που είναι αναγκαίοι για τη διεξαγωγή της υπηρεσίας ραδιοερασιτέχνη."], "correct": 2, "img": null}, {"chapter": "D", "num": 761, "question": "Η χρησιμοποίηση επαναληπτών για επαφή μεταξύ δυο σταθερών σταθμών πρέπει να γίνεται:", "answers": ["Πάντοτε για να έχουμε καλύτερα αποτελέσματα και να μας ακούνε περισσότεροι σταθμοί.", "Σε εξαιρετικές περιπτώσεις όταν δεν είναι εφικτή η απευθείας (Simplex) επικοινωνία.", "Μόνο όταν οι δύο σταθμοί είναι πολύ κοντά μεταξύ τους για την αποφυγή ενδοδιαμορφώσεων.", ""], "correct": 2, "img": null}, {"chapter": "D", "num": 762, "question": "Για την καλύτερη προστασία από ηλεκτροπληξία, τι πρέπει να είναι γειωμένο στον σταθμό σου;", "answers": ["Μόνο η κάθοδος.", "Η γραμμή του ηλεκτρικού δικτύου (των 220 Volts).", "Μόνο το τροφοδοτικό.", "Όλες τις συσκευές που απαρτίζουν τον σταθμό."], "correct": 4, "img": null}, {"chapter": "D", "num": 763, "question": "Γιατί πρέπει να \"γειώνεις\" όλες τις κεραίες όταν δεν λειτουργείς τον σταθμό σου;", "answers": ["Για να προστατεύεις τον σταθμό και το κτίριο από κεραυνούς.", "Για να \"κλειδώσεις\" την κεραία προς μια κατεύθυνση.", "Για να μην προκαλείς παρεμβολές.", ""], "correct": 1, "img": null}, {"chapter": "D", "num": 764, "question": "Εάν η γέφυρα στασίμων κυμάτων του σταθμού δείχνει 1:1, αυτό σημαίνει ότι έχει επιτευχθεί η \"καλύτερη\" προσαρμογή της σύνθετης αντίστασης:", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 1, "img": null}, {"chapter": "D", "num": 765, "question": "Εάν ο κινητός πομποδέκτης λειτουργεί στο αυτοκίνητο αλλά δε λειτουργεί καθόλου στο σπίτι, τι ελέγχουμε κατ' αρχήν;", "answers": ["Το μεγάφωνο.", "Το μικρόφωνο.", "Την γέφυρα στασίμων κυμάτων.", "Το τροφοδοτικό."], "correct": 4, "img": null}, {"chapter": "D", "num": 766, "question": "Εάν ο πομποδέκτης \"λαμβάνει\" κανονικά ενώ κατά την εκπομπή \"σβήνει\", τι από τα παρακάτω μπορεί να συμβαίνει;", "answers": ["Υπάρχει πρόβλημα στην τροφοδοσία.", "Έχει αποσυνδεθεί το antenna tuner.", "∆εν λειτουργεί το μικρόφωνο.", ""], "correct": 1, "img": null}, {"chapter": "D", "num": 767, "question": "Ενας σταθμός δεν μπορεί να λειτουργήσει στα βραχέα κύματα (HF) χωρίς να διαθέτει \"Antenna tuner\":", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 2, "img": null}, {"chapter": "D", "num": 768, "question": "Ένας σύνδεσμος (connector) τύπου \"BNC\", με ποιο τρόπο συνδέεται με την αντίστοιχη υποδοχή, σε ένα πομποδέκτη;", "answers": ["Απλά πιέζοντας τον σύνδεσμο \"προς τα μέσα\" στην υποδοχή.", "Με βυσμάτωση \"προς τα μέσα\" και στη συνέχεια με πολλαπλό δεξιόστροφο βίδωμα.", "Με βυσμάτωση προς τα μέσα και στη συνέχεια με δεξιά περιστροφή για να \"κουμπώσει\".", "\"Συρταρωτά\" από τα αριστερά προς τα δεξιά."], "correct": 3, "img": null}, {"chapter": "D", "num": 769, "question": "Ένας σύνδεσμος (connector) τύπου \"Ν\" συνδέεται με την αντίστοιχη υποδοχή σε ένα πομποδέκτη;", "answers": ["Απλά πιέζοντας τον σύνδεσμο \"προς τα μέσα\" στην υποδοχή.", "Με βυσμάτωση \"προς τα μέσα\" και στη συνέχεια με πολλαπλό δεξιόστροφο βίδωμα.", "Με βυσμάτωση \"προς τα μέσα\" και στη συνέχεια μισή δεξιά περιστροφή για να \"κουμπώσει\".", "\"Συρταρωτά\" από αριστερά προς τα δεξιά."], "correct": 2, "img": null}, {"chapter": "D", "num": 770, "question": "Η \"πρίζα\" \"CAT\" σε ένα πομποδέκτη έχει σκοπό:", "answers": ["Την σύνδεση ακουστικών στον πομποδέκτη.", "Τον έλεγχο του πομποδέκτη από τον υπολογιστή μέσω ενός σειριακού καλωδίου.", "Την σύνδεση του πομποδέκτη με το τροφοδοτικό.", "Την σύνδεση της κεραίας."], "correct": 2, "img": null}, {"chapter": "D", "num": 771, "question": "Η ισχύς εξόδου του πομπού πρέπει να ρυθμίζεται:", "answers": ["Πάντα στο μέγιστο δυνατόν για καλύτερη εκπομπή.", "Πάντα στην ελάχιστη απαραίτητη για την διεξαγωγή της συγκεκριμένης επικοινωνίας.", "Στο μέσο του αντιστοίχου διακόπτη επιλογής ισχύος.", ""], "correct": 2, "img": null}, {"chapter": "D", "num": 772, "question": "Η συσκευή που έχει την οθόνη του σχήματος, μπορεί να είναι:", "answers": ["Οικιακή συσκευή τηλεφώνου.", "Πομποδέκτης.", "Τροφοδοτικό.", "Antenna tuner."], "correct": 2, "img": "SY_Q772.jpg"}, {"chapter": "D", "num": 773, "question": "Κατά την \"dublex\" λειτουργία του σταθμού εκπέμπουμε και λαμβάνουμε στην ίδια συχνότητα;", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 2, "img": null}, {"chapter": "D", "num": 774, "question": "Κατά την διάρκεια της εκπομπής στις συχνότητες των VHF δεν χρειάζεται να ανακοινώνεται το διακριτικό κλίσης του σταθμού γιατί οι αποστάσεις που καλύπτονται στα VHF είναι μικρές.", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 2, "img": null}, {"chapter": "D", "num": 775, "question": "Με βάση την οθόνη του σχήματος, ο πομποδέκτης λειτουργεί με διαμόρφωση:", "answers": ["Πάνω πλευρικής ζώνης.", "Κάτω πλευρικής ζώνης.", "FM.", ""], "correct": 1, "img": "SY_Q775.jpg"}, {"chapter": "D", "num": 776, "question": "Με ένα \"Antenna Tuner\" μπορούμε να λειτουργήσουμε το σταθμό μας σε μια συχνότητα χρησιμοποιώντας κεραία που έχει σχεδιαστεί για διαφορετική συχνότητα αλλά σε \"κοντινή\" ζώνη συχνοτήτων:", "answers": ["Σωστό.", "Λάθος.", "", ""], "correct": 1, "img": null}, {"chapter": "D", "num": 777, "question": "Με ποιο όργανο μετράμε την τάση στην έξοδο του τροφοδοτικού μας;", "answers": ["Με την γέφυρα στασίμων κυμάτων.", "Με ένα αμπερόμετρο.", "Με ένα βολτόμετρο.", "Με το \"Antenna tuner\"."], "correct": 3, "img": null}, {"chapter": "D", "num": 778, "question": "Ο επιλογέας \"RIT\" σε ένα δέκτη:", "answers": ["Ρυθμίζει σταδιακά (μικρομετρικά) την συχνότητα (receiver incremental tuning).", "Επιλέγει τον διεθνή τόνο εκπομπής (receiver international tone).", "Καθαρίζει τα παράσιτα.", "Αυξάνει την ισχύ."], "correct": 1, "img": "SY_Q778.jpg"}, {"chapter": "D", "num": 779, "question": "Οι Ραδιοερασιτεχνικοί Επαναλήπτες χρησιμοποιούνται:", "answers": ["Αποκλειστικά από τα μέλη του συλλόγου που τους έχει εγκαταστήσει.", "Από όλους τους αδειούχους ραδιοερασιτέχνες.", "Από όσους ασχολούνται με διάφορα \"Χόμπι\" όπως κυνηγοί κ.λ.π.", "Αποκλειστικά από την \"Πολιτική Προστασία\"."], "correct": 2, "img": null}, {"chapter": "D", "num": 780, "question": "Παρατηρώντας το όργανο του σχήματος, κατά την ακρόαση έτερου σταθμού τι συμπεραίνουμε;", "answers": ["Ο έτερος σταθμός εκπέμπει με 80 watts.", "Ο δικός μας σταθμός εκπέμπει με 80 watts.", "Τα σήματα του έτερου σταθμού είναι πολύ ισχυρά της τάξεως 9 plus 50.", ""], "correct": 3, "img": "SY_Q780.jpg"}, {"chapter": "D", "num": 781, "question": "Ποια είναι η χρησιμότητα του διπλού \"VFO\" σ’ έναν πομποδέκτη;", "answers": ["Για να μπορούμε να εκπέμπουμε σε δύο συχνότητες ταυτόχρονα.", "Για να μπορούμε να παρακολουθούμε εύκολα τις συχνότητες εκπομπής και λήψης όταν δεν είναι ίδιες.", "Για να κάνουμε εκπομπή full duplex, δηλαδή εκπομπή και λήψη μαζί.", ""], "correct": 2, "img": null}, {"chapter": "D", "num": 782, "question": "Ποια η χρησιμότητα ενός επεξεργαστή ψηφιακού σήματος (Digital Signal Processor) σ’ έναν ερασιτεχνικό σταθμό;", "answers": ["Απορρίπτει το θόρυβο από τα λαμβανόμενα σήματα.", "Αυξάνει το κέρδος της κεραίας.", "Αυξάνει το εύρος ζώνης της κεραίας.", "Καθιστά επαρκή γείωση."], "correct": 1, "img": null}, {"chapter": "D", "num": 783, "question": "Ποια περιοχή συχνοτήτων καταλαμβάνεται από ένα σήμα 3 kHz LSB όταν η εμφανιζόμενη συχνότητα φέροντος είναι ρυθμισμένη στα 7,178 MHz;", "answers": ["7,178 με 7,181 MHz", "7,175 με 7,178 MHz", "7,1765 με 7,1795 MHz", "7,178 με 7,184 MHz"], "correct": 2, "img": null}, {"chapter": "D", "num": 784, "question": "Ποια περιοχή συχνοτήτων καταλαμβάνεται από ένα σήμα 3 kHz USB όταν η συχνότητα φέροντος είναι ρυθμισμένη στα 14,347 MHz;", "answers": ["14,347 με 14,350 MHz", "14,3455 με 14,3485 MHz", "14,344 με 14,347 MHz", "14,347 με 14,647 MHz"], "correct": 1, "img": null}, {"chapter": "D", "num": 785, "question": "Ποια συσκευή μπορεί να χρησιμοποιηθεί για να γίνει το \"ταίριασμα\" της εξόδου του πομπού σε κεραία με σύνθεση αντίσταση (impedance) διαφορετική από 50 ohm;", "answers": ["Ένα εικονικό φορτίο (Dummy load).", "Ένας ισορροπημένος διαμορφωτής (Balanced modulator).", "Μια γέφυρα στασίμων κυμάτων (SWR).", "Ένα \"Antenna coupler\"."], "correct": 4, "img": null}, {"chapter": "D", "num": 786, "question": "Ποιο από τα παρακάτω αποτελεί καλή ραδιοερασιτεχνική πρακτική όταν επιλέγουμε μια συχνότητα για να ξεκινήσουμε μια κλήση \"CQ\";", "answers": ["Επιλέγουμε την συχνότητα με βάση τα δικαιώματα της αδείας μας.", "Επιλέγουμε την συχνότητα με βάση το band plan της IARU και ανάλογα με το \"mode\" που θέλουμε να χρησιμοποιήσουμε.", "Ελέγχουμε να δούμε αν το κανάλι χρησιμοποιείται από άλλον σταθμό.", "Όλα τα παραπάνω."], "correct": 4, "img": null}, {"chapter": "D", "num": 787, "question": "Ποιο από τα παρακάτω αποτελεί πλεονέκτημα όταν χρησιμοποιούμε διαμόρφωση μονής πλευρικής ζώνης (single sideband) σε σύγκριση με άλλες αναλογικές διαμορφώσεις (modes) φωνής στις ραδιοερασιτεχνικές μπάντες των HF;", "answers": ["Γίνεται καλύτερος συντονισμός στη λήψη και καλύτερη προστασία από θόρυβο.", "Το σήμα υπόκειται σε λιγότερα \"ατμοσφαιρικά\" (static crashes, atmospherics).", "Πολύ υψηλή πιστότητα στη διαμόρφωση φωνής.", "Χρησιμοποιείται λιγότερο εύρος ζώνης και υπάρχει μεγαλύτερη απόδοση ισχύος."], "correct": 4, "img": null}, {"chapter": "D", "num": 788, "question": "Ποιο από τα παρακάτω είναι σωστό για τη λειτουργία SSB VOX;", "answers": ["Το \"VOX\" επιτρέπει να μιλάμε χωρίς να χρησιμοποιούμε τα χέρια μας (\"hands free\" operation).", "Το σήμα λήψης ακούγεται πιο φυσικό.", "∆ιατηρείται το φάσμα συχνοτήτων.", "∆ίνει μεγαλύτερη ισχύ στην έξοδο."], "correct": 1, "img": null}, {"chapter": "D", "num": 789, "question": "Ποιος από τους παρακάτω τύπους διαμόρφωσης (modes) χρησιμοποιείται συνήθως για επικοινωνίες φωνής στις μπάντες των 20, 15 και 10 μέτρων;", "answers": ["Πάνω πλευρική Ζώνη (Upper sideband).", "Κάτω πλευρική Ζώνη (Lower sideband).", "Υποτυπώδης πλευρική Ζώνη (Vestigial sideband).", "∆ιπλή πλευρική Ζώνη (Double sideband)."], "correct": 1, "img": null}, {"chapter": "D", "num": 790, "question": "Ποιος από τους παρακάτω τύπους διαμόρφωσης (modes) χρησιμοποιείται συνήθως για επικοινωνίες φωνής στις μπάντες των 80 και 40 μέτρων;", "answers": ["Πάνω πλευρική Ζώνη (Upper sideband).", "Κάτω πλευρική Ζώνη (Lower sideband).", "∆ιπλή πλευρική Ζώνη (Double sideband).", "Tριπλή πλευρική Ζώνη."], "correct": 2, "img": null}, {"chapter": "D", "num": 791, "question": "Ποιος από τους παρακάτω είναι ο ενδεικνυόμενος τρόπος για να συμμετάσχουμε σε μια συζήτηση σε επικοινωνία φωνής;", "answers": ["Λέμε \"QRZ\" αρκετές φορές και μετά αναφέρουμε το χαρακτηριστικό μας (callsign).", "Λέμε \"∆ιακοπή\" πολλές φορές ( \"Break Break Break\") και αναμένουμε απάντηση.", "Λέμε το χαρακτηριστικό μας (callsign) σ’ ένα διάλειμμα ανάμεσα στις ομιλίες των άλλων σταθμών που συμμετέχουν στη συζήτηση.", "Λέμε \"CQ\" και μετά τα χαρακτηριστικά (callsign) των άλλων σταθμών που συμμετέχουν στη συζήτηση."], "correct": 3, "img": null}, {"chapter": "D", "num": 792, "question": "Ποιος από τους παρακάτω είναι ο σωστός τρόπος να καλείς \"CQ\" σε κλήσεις φωνής;", "answers": ["Λες \"CQ\" τρεις φορές, ακολουθούμενο από την λέξη \"από\" (this is), ακολουθούμενη από το διακριτικό σου τρεις φορές.", "Λες \"CQ\" μια φορά, ακολουθούμενο από την λέξη \"από\" (this is), ακολουθούμενη από το διακριτικό σου δέκα φορές.", "Λες \"CQ\" τουλάχιστον πέντε φορές, από την λέξη \"από\" (this is), ακολουθούμενη από το διακριτικό σου.", "Λες την λέξη \"από\" (this is), τρεις φορές ακολουθούμενη από το διακριτικό σου τρεις φορές και μετά το \"CQ\""], "correct": 1, "img": null}, {"chapter": "D", "num": 793, "question": "Ποιος είναι ο ενδεδειγμένος τρόπος για να γίνει κατανοητό το διακριτικό σου σε μια φωνητική επαφή, υπό δυσμενείς συνθήκες ακρόασης του άλλου σταθμού;", "answers": ["Χρησιμοποιείς οποιεσδήποτε λέξεις που ξεκινάνε με τα ίδια γράμματα που αντιστοιχούν στα γράμματα του διακριτικού σου.", "Μιλάς πιο \"σιγανά\" (χαμηλότερη ένταση φωνής).", "Χρησιμοποιείς το διεθνές φωνητικό αλφάβητο για κάθε γράμμα του διακριτικού σου.", ""], "correct": 3, "img": null}, {"chapter": "D", "num": 794, "question": "Ποιος είναι ο ενδεδειγμένος τρόπος πραγματοποίησης μιας επαφής σε ένα επαναλήπτη;", "answers": ["Λες το όνομα του άλλου ερασιτέχνη και μετά το διακριτικό σου τρεις φορές.", "Λες το διακριτικό του σταθμού που θες να επικοινωνήσεις και μετά το δικό σου διακριτικό.", "Λες \"διακοπή διακοπή διακοπή\".", "Λες το διακριτικό του σταθμού που θες να επικοινωνήσεις τρεις φορές."], "correct": 2, "img": null}, {"chapter": "D", "num": 795, "question": "Ποιος είναι ο λόγος που χρησιμοποιούμε τη \"λειτουργία attenuator\" που υπάρχει σε πολλούς πομποδέκτες βραχέων (HF);", "answers": ["Για να μειωθεί η κατανάλωση ισχύος όταν λειτουργούμε με μπαταρίες.", "Για να μειωθεί η υπερφόρτωση του σήματος (signal overload) λόγω ισχυρών σημάτων λήψης.", "", ""], "correct": 2, "img": null}, {"chapter": "D", "num": 796, "question": "Ποιος είναι ο σκοπός του φίλτρου notch που υπάρχει σε πολλούς πομποδέκτες βραχέων (HF);", "answers": ["Να περιορίσει το εύρος ζώνης φωνής του πομποδέκτη.", "Να ενισχύσει τη λήψη μιας συγκεκριμένης συχνότητας σε μια φορτωμένη μπάντα.", "Να μειώσει τα παράσιτα από φέροντα κύματα στη ζώνη διέλευσης του δέκτη.", ""], "correct": 3, "img": null}, {"chapter": "D", "num": 797, "question": "Ποιος τύπος διαμόρφωσης (mode) χρησιμοποιείται συνήθως για επικοινωνίες φωνής στις μπάντες υψηλών συχνοτήτων (HF) των ραδιοερασιτεχνών;", "answers": ["∆ιαμόρφωση συχνότητας (Frequency modulation).", "∆ιπλής πλευρικής ζώνης (Double sideband).", "Μονής πλευρικής ζώνης (Single sideband).", "∆ιαμόρφωση φάσης (Phase modulation)."], "correct": 3, "img": null}, {"chapter": "D", "num": 798, "question": "Πόση είναι συνήθως η τάση της μπαταρίας των επιβατικών αυτοκινήτων (προκειμένου να εγκαταστήσουμε \"κινητό\" σταθμό);", "answers": ["220 volts", "9 volts", "12 volts", "110 Watts"], "correct": 3, "img": null}, {"chapter": "D", "num": 799, "question": "Πόσο πολύ πρέπει να αυξηθεί η ισχύς εξόδου ενός πομπού για να αλλάξει η ένδειξη του οργάνου \"S-meter\" σε έναν απομακρισμένο δέκτη από S8 σε S9;", "answers": ["Περίπου 2 φορές.", "Περίπου 8 φορές.", "Περίπου 4 φορές.", "Περίπου 1,5 φορά."], "correct": 3, "img": null}, {"chapter": "D", "num": 800, "question": "Πού συναντάμε συνήθως ένα όργανο \"s-meter\";", "answers": ["Σε μια γέφυρα στασίμων κυμάτων SWR.", "Σ’ έναν πομπό.", "Σ’ έναν δέκτη.", "Σε μια γέφυρα αγωγιμότητας."], "correct": 3, "img": null}, {"chapter": "D", "num": 801, "question": "Πού συνδέεται ένα \"balun\" για να προσαρμοστεί μια κεραία διπόλου σε ένα ομοαξονικό καλώδιο 50 ohm;", "answers": ["Μεταξύ της κεραίας και της γείωσης.", "Μεταξύ του πομποδέκτη και του καλωδίου καθόδου.", "Μεταξύ του καλωδίου καθόδου και της γείωσης.", "Μεταξύ της κεραίας και του καλωδίου καθόδου."], "correct": 4, "img": null}, {"chapter": "D", "num": 802, "question": "Πριν κάνεις κλήση \"CQ\" σε μία συχνότητα που δεν ακούς τίποτα, γιατί επιπροσθέτως πρέπει να ρωτήσεις αν η συχνότητα είναι σε χρήση (is this frequency in use?);", "answers": ["Μόνο για λόγους ευγένειας.", "∆ιότι ένας σταθμός, μέρος ενός QSO, ο οποίος βρίσκεται στη ζώνη σιγής ως προς την δική σου περιοχή, μπορεί να εκπέμπει στην συχνότητα και να μην τον ακούς.", "Γιατί μπορεί η συχνότητα να είναι \"κλειδωμένη\".", "Απλά είναι ένας εναλλακτικός τρόπος κλήσης."], "correct": 2, "img": null}, {"chapter": "D", "num": 803, "question": "Πώς \"συνδέεται\" συνήθως ο πομποδέκτης με το τροφοδοτικό του;", "answers": ["Με έναν ειδικό \"κοτσαδόρο\".", "Με ένα εύκαμπτο, διπολικό καλώδιο χρώματος κόκκινου για το (+) και μαύρου για το (-).", "Με ένα ομοαξονικό καλώδιο 50 Ohm χρώματος μαύρου.", "Με μία πρίζα \"σούκο\"."], "correct": 2, "img": null}, {"chapter": "D", "num": 804, "question": "Πώς καλείτε έναν άλλο σταθμό μέσω επαναλήπτη εάν ξέρετε το διακριτικό κλήσης του;", "answers": ["Αρχικά λέτε \"Message to\" ή \" Μήνυμα στον\" κι έπειτα εκφωνείτε το διακριτικό κλήσης του σταθμού.", "Αρχικά εκφωνείτε το διακριτικό κλήσης του σταθμού, τη συντομογραφία \"DE\" και κατόπιν αναφέρετε το διακριτικό του σταθμού σας.", "Λέτε \"CQ\" τρεις φορές και κατόπιν εκφωνείτε το διακριτικό κλήσης του σταθμού.", "Περιμένετε να σας καλέσει αυτός."], "correct": 2, "img": null}, {"chapter": "D", "num": 805, "question": "Σε κάποιον πομποδέκτη, αυξάνοντας την ένταση ήχου του μεγαφώνου (volume), πως επηρεάζεται η ισχύς του εκπεμπόμενου ηλεκτρομαγνητικού κύματος;", "answers": ["Μειώνεται ανάλογα.", "Αυξάνεται ανάλογα.", "∆εν επηρεάζεται.", "Εξαρτάται από τη χρησιμοποιούμενη διαμόρφωση."], "correct": 3, "img": null}, {"chapter": "D", "num": 806, "question": "Στη διπλανή εικόνα απεικονίζεται:", "answers": ["Ένα βολτόμετρο", "Ένα μικρόφωνο", "Ακουστικά", "Ρυθμιστής συχνότητας"], "correct": 3, "img": "SY_Q806.jpg"}, {"chapter": "D", "num": 807, "question": "Στη διπλανή εικόνα, ο επιλογέας \"METER\" χρησιμοποιείται:", "answers": ["Για την αυξομείωση του \"ALC\".", "Για την αύξηση της έντασης φωνής.", "Για το άνοιγμα - κλείσιμο του πομποδέκτη.", "Για την επιλογή λειτουργιών του οργάνου."], "correct": 4, "img": "SY_Q807.jpg"}, {"chapter": "D", "num": 808, "question": "Στη θέση \"Phones\" ενός πομποδέκτη τι εξάρτημα συνδέουμε;", "answers": ["Ακουστικά.", "Μικρόφωνο.", "Τροφοδοτικό.", "Αμπερόμετρο."], "correct": 1, "img": null}, {"chapter": "D", "num": 809, "question": "Στην εικόνα απεικονίζεται ένα χειριστήριο για την ε var DIST={SV:{A:50,B:30,G:20},SY:{A:20,B:20,G:20,D:40}};
var CN={
  A:'Αʹ – Τεχνικά Θέματα',
  B:'Βʹ – Λειτουργικοί Κανόνες',
  G:'Γʹ – Εθνικό & Διεθνές Νομικό Πλαίσιο',
  D:'Δʹ – Βασικά Πρακτικά Θέματα'
};
var cat=null,mode='instant',EQ=[],qi=0,sc=0,ac=0,st={},pa=null;

function selCat(c){
  cat=c;
  document.querySelectorAll('.cat-card').forEach(function(x){x.classList.remove('selected');});
  document.getElementById('cat-'+c.toLowerCase()).classList.add('selected');
  document.getElementById('start-btn').disabled=false;
}
function selMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(function(x){x.classList.remove('selected');});
  document.getElementById('mode-'+m).classList.add('selected');
}
function shuffle(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}
function buildExam(c){
  var all=AQ[c],d=DIST[c],bc={};
  all.forEach(function(q){if(!bc[q.chapter])bc[q.chapter]=[];bc[q.chapter].push(q);});
  var r=[];
  Object.keys(d).forEach(function(k){r=r.concat(shuffle(bc[k]||[]).slice(0,d[k]));});
  return shuffle(r);
}
function startExam(){
  if(!cat)return;
  EQ=buildExam(cat);qi=0;sc=0;ac=0;st={};
  Object.keys(DIST[cat]).forEach(function(k){st[k]={c:0,t:0};});
  showScreen('exam');
  document.getElementById('live-score').textContent=mode==='instant'?'0/0':'';
  renderQ();
}
function renderQ(){
  var q=EQ[qi],tot=EQ.length;
  pa=null;
  document.getElementById('prog-text').textContent='Ερώτηση '+(qi+1)+' / '+tot;
  document.getElementById('progress-fill').style.width=((qi/tot)*100)+'%';
  if(mode==='instant')document.getElementById('live-score').textContent=sc+'/'+ac;
  document.getElementById('q-num-label').textContent='#'+q.num;
  var b=document.getElementById('q-chapter-badge');
  b.textContent=CN[q.chapter]||q.chapter;
  b.className='q-chapter-badge chapter-'+q.chapter;

  // Image area
  var imgArea=document.getElementById('question-image-area');
  imgArea.innerHTML='';
  if(q.img){
    var wrap=document.createElement('div');
    wrap.className='question-image-wrap';
    var imgEl=document.createElement('img');
    imgEl.src='images/'+q.img;
    imgEl.alt='Σχήμα ερώτησης #'+q.num;
    imgEl.onerror=function(){
      wrap.innerHTML='<div class="img-placeholder">'+
        '<div class="img-ph-icon">&#128444;</div>'+
        '<div class="img-ph-file">images/'+q.img+'</div>'+
        '<div class="img-ph-hint">Τοποθετήστε την εικόνα στον φάκελο <strong>images/</strong> δίπλα από το HTML</div>'+
        '</div>';
    };
    wrap.appendChild(imgEl);
    // Question text inside the wrap
    var qt=document.createElement('div');
    qt.className='question-text';
    qt.style.marginTop='16px';
    qt.style.marginBottom='0';
    qt.textContent=q.question;
    wrap.appendChild(qt);
    imgArea.appendChild(wrap);
  } else {
    var wrap2=document.createElement('div');
    wrap2.className='question-no-image';
    var qt2=document.createElement('div');
    qt2.className='question-text';
    qt2.style.marginBottom='0';
    qt2.textContent=q.question;
    wrap2.appendChild(qt2);
    imgArea.appendChild(wrap2);
  }

  var L=['Α','Β','Γ','Δ'],list=document.getElementById('answers-list');
  list.innerHTML='';
  q.answers.forEach(function(a,i){
    if(!a&&i>=2)return;
    var btn=document.createElement('button');
    btn.className='answer-btn';
    btn.innerHTML='<div class="ans-letter">'+L[i]+'</div><div class="ans-text">'+(a||'—')+'</div><div class="result-badge"></div>';
    btn.addEventListener('click',(function(n){return function(){pickAns(n+1);};})(i));
    list.appendChild(btn);
  });
  document.getElementById('feedback-box').style.display='none';
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('confirm-btn').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('next-btn-text').textContent=qi===EQ.length-1?'Ολοκλήρωση ✓':'Επόμενη →';
}
function pickAns(n){
  var btns=document.querySelectorAll('.answer-btn');
  if(btns.length&&btns[0].disabled)return;
  pa=n;
  btns.forEach(function(b,i){b.classList.remove('selected');if(i===n-1)b.classList.add('selected');});
  document.getElementById('confirm-btn').style.display='inline-block';
}
function confirmAnswer(){
  if(pa===null)return;
  var q=EQ[qi],n=pa,btns=document.querySelectorAll('.answer-btn');
  btns.forEach(function(b){b.disabled=true;b.classList.remove('selected');});
  ac++;
  if(!st[q.chapter])st[q.chapter]={c:0,t:0};
  st[q.chapter].t++;
  var ok=n===q.correct;
  if(ok){sc++;st[q.chapter].c++;}
  document.getElementById('confirm-btn').style.display='none';
  if(mode==='instant'){
    var cb=btns[n-1];
    if(cb){cb.classList.add(ok?'correct':'wrong');cb.querySelector('.result-badge').textContent=ok?'✓':'✗';}
    if(!ok){var rb=btns[q.correct-1];if(rb){rb.classList.add('reveal-correct');rb.querySelector('.result-badge').textContent='✓';rb.querySelector('.result-badge').style.display='block';}}
    var L=['Α','Β','Γ','Δ'],fb=document.getElementById('feedback-box');
    fb.className='feedback-box '+(ok?'correct-fb':'wrong-fb');
    fb.innerHTML=(ok?'✅':'❌')+' <span>'+(ok?'Σωστά! Η απάντηση είναι':'Λάθος. Η σωστή ήταν')+' η <strong>'+L[q.correct-1]+'</strong>.</span>';
    fb.style.display='flex';
    document.getElementById('live-score').textContent=sc+'/'+ac;
  } else {
    if(btns[n-1])btns[n-1].classList.add('selected');
    nextQ();
    return;
  }
  document.getElementById('next-btn').style.display='inline-block';
}
function nextQ(){qi++;if(qi>=EQ.length)showResults();else renderQ();}
function showResults(){
  showScreen('results');
  var tot=EQ.length,pct=Math.round((sc/tot)*100),pass=pct>=80;
  document.getElementById('results-icon').textContent=pass?'&#127942;':'&#128214;';
  var t=document.getElementById('results-title');
  t.textContent=pass?'Συγχαρητήρια!':'Δοκίμασε Ξανά';
  t.className='results-title '+(pass?'pass':'fail');
  document.getElementById('results-subtitle').textContent=pass?'Πέρασες επιτυχώς!':'Χρειάζεσαι 80%. Συνέχισε την προετοιμασία!';
  var fr=document.getElementById('score-fraction');
  fr.textContent=sc+'/'+tot;fr.className='score-fraction '+(pass?'pass':'fail');
  document.getElementById('score-pct').textContent=pct+'%';
  var bf=document.getElementById('score-bar-fill');
  bf.className='score-bar-fill '+(pass?'pass':'fail');
  setTimeout(function(){bf.style.width=pct+'%';},100);
  var CL={A:'Α΄',B:'Β΄',G:'Γ΄',D:'Δ΄'},bd=document.getElementById('chapter-breakdown');
  bd.innerHTML='';
  Object.keys(st).forEach(function(k){
    var s=st[k],p=s.t>0?Math.round((s.c/s.t)*100):0;
    var d=document.createElement('div');d.className='chap-stat';
    d.innerHTML='<div class="chap-stat-label">'+(CL[k]||k)+'</div><div class="chap-stat-val" style="color:'+(p>=80?'var(--correct)':'var(--wrong)')+'">'+s.c+'/'+s.t+'</div><div class="chap-stat-sub">'+p+'%</div>';
    bd.appendChild(d);
  });
}

function showScreen(n){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+n).classList.add('active');
}
</script></body></html>
