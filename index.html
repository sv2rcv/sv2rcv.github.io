<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SV2RCV — Ραδιοερασιτεχνισμός</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2234;
  --border: #1e2d45;
  --accent: #3b82f6;
  --accent2: #06b6d4;
  --text: #e2e8f0;
  --muted: #64748b;
  --glow: rgba(59,130,246,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated background grid */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridDrift 20s linear infinite;
  pointer-events: none;
}

@keyframes gridDrift {
  0% { transform: translate(0,0); }
  100% { transform: translate(48px, 48px); }
}

/* Glowing orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  animation: orbPulse 6s ease-in-out infinite;
}
.orb-1 {
  width: 500px; height: 500px;
  background: rgba(59,130,246,0.08);
  top: -150px; left: -100px;
  animation-delay: 0s;
}
.orb-2 {
  width: 400px; height: 400px;
  background: rgba(6,182,212,0.07);
  bottom: -100px; right: -100px;
  animation-delay: 3s;
}
@keyframes orbPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.7; }
}

/* Scan line effect */
.scanline {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Main content */
.container {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 40px 24px;
  max-width: 800px;
  width: 100%;
  animation: fadeUp 0.8s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Callsign badge */
.callsign {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 20px;
  margin-bottom: 40px;
  animation: fadeUp 0.8s 0.1s ease both;
}

.callsign-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent2);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; box-shadow: 0 0 6px var(--accent2); }
  50% { opacity: 0.3; box-shadow: none; }
}

.callsign-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent2);
  letter-spacing: 3px;
}

/* Hero icon */
.hero-icon {
  width: 96px; height: 96px;
  margin: 0 auto 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  box-shadow:
    0 0 0 1px rgba(59,130,246,0.3),
    0 0 40px rgba(59,130,246,0.2),
    0 0 80px rgba(59,130,246,0.1);
  animation: fadeUp 0.8s 0.15s ease both, iconGlow 3s ease-in-out infinite;
}
@keyframes iconGlow {
  0%,100% { box-shadow: 0 0 0 1px rgba(59,130,246,0.3), 0 0 40px rgba(59,130,246,0.2), 0 0 80px rgba(59,130,246,0.1); }
  50%      { box-shadow: 0 0 0 1px rgba(6,182,212,0.4),  0 0 60px rgba(6,182,212,0.25), 0 0 100px rgba(6,182,212,0.12); }
}

/* Title */
.hero-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 7vw, 56px);
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 16px;
  animation: fadeUp 0.8s 0.2s ease both;
}

.hero-title span {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-bottom: 56px;
  animation: fadeUp 0.8s 0.25s ease both;
}

/* Nav links row */
.nav-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  animation: fadeUp 0.8s 0.35s ease both;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  text-decoration: none;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.nav-link::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(6,182,212,0.05));
  opacity: 0;
  transition: opacity 0.25s;
}

.nav-link:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(59,130,246,0.2);
}
.nav-link:hover::before { opacity: 1; }

.nav-link .link-icon {
  font-size: 18px;
}

.nav-link.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 20px rgba(59,130,246,0.3);
}
.nav-link.primary::before {
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
}
.nav-link.primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(59,130,246,0.45);
  border-color: transparent;
}

.nav-link.disabled {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
}

.soon-badge {
  font-size: 9px;
  font-family: 'IBM Plex Mono', monospace;
  padding: 2px 7px;
  border-radius: 20px;
  background: rgba(100,116,139,0.2);
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Footer */
.footer {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  animation: fadeUp 0.8s 0.5s ease both;
}

@media (max-width: 480px) {
  .nav-link { padding: 14px 20px; font-size: 12px; }
  .hero-icon { width: 76px; height: 76px; font-size: 38px; border-radius: 22px; }
}
</style>
